<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash to the Match</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --wim-green: #00563f;
            --wim-purple: #4a2c7a;
            --amex-blue: #006fcf;
            --gold: #c9a84c;
            --gold-light: #f0d070;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: #050505;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            font-family: 'Georgia', 'Times New Roman', serif;
            user-select: none; overflow: hidden;
        }
        #game-container {
            height: 100vh; width: auto; aspect-ratio: 9/16; max-width: 100vw;
            position: relative; overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
        }
        #webgl-canvas {
            width: 100%; height: 100%; display: block;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* ── Score HUD (Flashes gold) ── */
        #score-hud {
            position: absolute; top: 4%; left: 5%;
            text-align: left; color: #fff;
            display: flex; flex-direction: column; align-items: flex-start;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }
        #score-label {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(6px, 0.9vh, 10px);
            font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; font-variant: small-caps;
            color: rgba(255,255,255,0.55);
        }
        #score-val {
            font-size: clamp(12px, 2.6vh, 24px);
            font-weight: 900; line-height: 1;
            color: white; text-shadow: 0 2px 12px rgba(0,0,0,0.5);
            transition: color 0.2s ease;
        }

        @keyframes flashGold {
            0% { color: white; transform: scale(1); text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
            50% { color: #ffd700; transform: scale(1.3); text-shadow: 0 0 20px rgba(255, 215, 0, 0.9); }
            100% { color: white; transform: scale(1); text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
        }
        .score-flash {
            animation: flashGold 0.3s ease-out;
        }

        #score-hud.x2-active #score-val { color: #40e0ff; text-shadow: 0 0 15px rgba(64,224,255,0.6); }

        #multiplier-text {
            display: none; font-size: clamp(8px,0.9vh,12px); font-weight: 800;
            letter-spacing: 2px; color: #40e0ff; margin-top: 4px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #score-hud.x2-active #multiplier-text { display: block; }

        /* ── Analogue Clock ── */
        #clock-hud {
            position: absolute; top: 2%; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
            filter: drop-shadow(0 3px 16px rgba(0,0,0,0.55));
            transition: all 0.3s ease;
        }
        #clock-svg {
            width: clamp(75px, 12vh, 120px);
            height: clamp(75px, 12vh, 120px);
            overflow: visible;
        }

        #clock-hud.danger #clock-hour-markers rect { stroke: #ff4444; }
        #clock-hud.danger #clock-arm-group rect { fill: #ff4444; }
        #clock-hud.danger #clock-svg circle { stroke: #ff4444; }

        @keyframes clockShake {
            0% { transform: translateX(-50%) rotate(0deg); filter: drop-shadow(0 3px 20px rgba(255,0,0,0.9)); }
            20% { transform: translateX(-55%) rotate(-8deg); }
            40% { transform: translateX(-45%) rotate(8deg); }
            60% { transform: translateX(-53%) rotate(-5deg); }
            80% { transform: translateX(-47%) rotate(5deg); }
            100% { transform: translateX(-50%) rotate(0deg); filter: drop-shadow(0 3px 16px rgba(0,0,0,0.55)); }
        }
        #clock-hud.clock-hit {
            animation: clockShake 0.4s ease-in-out;
        }
        #clock-hud.clock-hit #clock-svg circle { stroke: #ff4444; }
        #clock-hud.clock-hit #clock-arm-group rect { fill: #ff4444; }

        /* ── Bottom Progress Bar ── */
        #bottom-progress {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 0 5% clamp(12px, 2.5vh, 26px);
            pointer-events: none;
        }
        #progress-stage-labels {
            display: flex; justify-content: space-between; margin-bottom: 5px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(5px, 0.7vh, 8px); font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: rgba(255,255,255,0.60);
        }
        #progress-track {
            position: relative; height: 6px;
            background: rgba(255,255,255,0.25);
            border-radius: 4px; overflow: visible;
        }
        #progress-fill {
            position: absolute; top: 0; left: 0;
            height: 100%; width: 0%;
            background: #ffffff;
            border-radius: 4px; transition: width 0.25s ease;
        }
        .stage-pip {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 12px; height: 12px; border-radius: 50%;
            background: rgba(255,255,255,0.30);
            border: 2px solid rgba(255,255,255,0.50);
            transition: background 0.35s, border-color 0.35s;
        }
        .stage-pip.reached {
            background: #ffffff; border-color: #ffffff;
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        #action-indicator {
            position: absolute; bottom: 16%; left: 50%; transform: translateX(-50%);
            font-size: clamp(10px,1.5vh,16px); font-weight:800; letter-spacing:3px;
            color: #fff; text-transform: uppercase; opacity:0;
            transition: opacity 0.15s; text-shadow: 0 0 20px rgba(255,255,255,0.8);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            pointer-events: none;
        }

        /* INTRO / END SCREENS */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            background: rgba(74,44,122,0.6);
        }
        #intro-overlay.visible { opacity: 1; pointer-events: auto; }
        #intro-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900; font-size: clamp(28px, 5.5vh, 56px);
            color: #ffffff; text-transform: uppercase; letter-spacing: 3px;
            text-align: center; line-height: 1.15; text-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }
        #intro-subtitle {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400;
            font-size: clamp(10px, 1.6vh, 16px); color: rgba(255,255,255,0.7);
            text-transform: uppercase; letter-spacing: 4px; margin-top: 8px;
        }
        #countdown-ring { margin-top: 28px; width: 52px; height: 52px; }
        #countdown-ring circle { fill: none; stroke-width: 3; }
        #countdown-ring .ring-bg { stroke: rgba(255,255,255,0.15); }
        #countdown-ring .ring-fg {
            stroke: #ffffff; stroke-linecap: round;
            transform: rotate(-90deg); transform-origin: center;
            transition: stroke-dashoffset 0.05s linear;
        }

        /* Blurred transparent end screen */
        .end-screen {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: auto; z-index: 100; text-align: center; padding: 5%;
        }
        .end-screen h1 {
            margin: 0 0 4%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900; font-size: clamp(26px, 5vh, 56px); color: #ffffff;
            text-transform: uppercase; letter-spacing: 3px; line-height: 1.15;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }
        .end-screen .end-score {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400;
            font-size: clamp(10px, 1.6vh, 16px); color: rgba(255,255,255,0.7);
            text-transform: uppercase; letter-spacing: 4px; margin-bottom: 6%;
        }
        .end-screen .end-score span {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: 900; color: #ffffff; font-size: clamp(28px, 4.5vh, 52px);
            display: block; margin-top: 6px; letter-spacing: 1px;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8);
        }
        .end-btn {
            margin-top: 5%; padding: 2.5% 8%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(11px,1.5vh,18px); font-weight: 800; text-transform: uppercase;
            letter-spacing: 3px; background: transparent; color: white;
            border: 2px solid rgba(255,255,255,0.6); border-radius: 40px;
            cursor: pointer; transition: all 0.2s;
        }
        .end-btn:hover { background: rgba(255,255,255,0.3); border-color: #fff; }

        #victory-screen { display: none; opacity: 0; transition: opacity 1.5s ease; }
        #victory-screen.fade-in { display: flex; opacity: 1; }

        /* ── Body Tracking Preview ── */
        #pose-preview {
            position: absolute; bottom: 8%; right: 3%;
            width: clamp(60px, 12vh, 110px); aspect-ratio: 4/3;
            border: 2px solid rgba(255,255,255,0.4); border-radius: 8px;
            overflow: hidden; z-index: 60; pointer-events: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        #pose-canvas {
            width: 100%; height: 100%; display: block;
            transform: scaleX(-1); /* mirror */
        }
        #pose-video { display: none; }
        #pose-label {
            position: absolute; bottom: 2px; left: 0; width: 100%;
            text-align: center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 8px; font-weight: 700; color: #44ff88;
            letter-spacing: 1px; text-transform: uppercase;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div id="score-hud">
            <span id="score-label">SCORE</span>
            <div id="score-val">0</div>
            <span id="multiplier-text">× 2</span>
        </div>

        <div id="clock-hud">
            <svg id="clock-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="2.5"/>
                <circle cx="50" cy="50" r="45" fill="rgba(255,255,255,0.07)"/>
                <g id="clock-min-ticks"></g>
                <g id="clock-hour-markers"></g>
                <g id="clock-arm-group" style="transform-origin:50px 50px; transform:rotate(0deg)">
                    <rect x="48.2" y="13" width="3.6" height="37" rx="1.8" fill="white"/>
                    <rect x="48.2" y="51" width="3.6" height="11" rx="1.5" fill="white" opacity="0.55"/>
                </g>
                <circle cx="50" cy="50" r="4" fill="white"/>
                <circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.5)"/>
            </svg>
        </div>

        <div id="action-indicator"></div>

        <div id="bottom-progress">
            <div id="progress-stage-labels">
                <span>Queue</span>
                <span>Hill</span>
                <span>Outdoor Courts</span>
                <span>Centre Court</span>
            </div>
            <div id="progress-track">
                <div id="progress-fill"></div>
                <div class="stage-pip" id="pip-1" style="left:25%"></div>
                <div class="stage-pip" id="pip-2" style="left:50%"></div>
                <div class="stage-pip" id="pip-3" style="left:75%"></div>
                <div class="stage-pip" id="pip-4" style="left:100%"></div>
            </div>
        </div>
    </div>

    <div id="intro-overlay">
        <div id="intro-title">DASH TO<br>THE MATCH</div>
        <div id="intro-subtitle"> </div>
        <svg id="countdown-ring" viewBox="0 0 52 52">
            <circle class="ring-bg" cx="26" cy="26" r="23"/>
            <circle class="ring-fg" id="ring-progress" cx="26" cy="26" r="23" stroke-dasharray="144.51" stroke-dashoffset="0"/>
        </svg>
    </div>

    <div id="game-over-screen" class="end-screen">
        <h1>TIME'S UP</h1>
        <div class="end-score">Final Score<span id="final-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>

    <div id="victory-screen" class="end-screen">
        <h1>YOU MADE IT!</h1>
        <div class="end-score">CENTRE COURT AWAITS<span id="victory-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>

    <video id="pose-video" width="320" height="240" autoplay playsinline></video>
    <div id="pose-preview">
        <canvas id="pose-canvas" width="320" height="240"></canvas>
        <div id="pose-label">Starting cam…</div>
    </div>
</div>

<script>
if (typeof THREE === 'undefined') { throw new Error('Three.js failed to load.'); }

// ─── THREE SETUP ───────────────────────────────────────────────────────────────
const canvas   = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
renderer.setClearColor(0x4a6a8a, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x4a6a8a);
scene.fog = new THREE.FogExp2(0x7088a0, 0.007);

// Extended camera far plane so we can see the horizon cleanly
const camera = new THREE.PerspectiveCamera(62, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
camera.position.set(0, 7.5, 12);
camera.lookAt(0, 2.5, -5);

const ambientLight = new THREE.AmbientLight(0xffeedd, 0.9); scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffd4a0, 0.85);
dirLight.position.set(-12, 28, 8);
dirLight.castShadow = true;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far  = 200;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

function enableShadows(obj) {
    obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
}

// ─── TEXTURES ─────────────────────────────────────────────────────────────────
function makeHatBandTex() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 64;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#00175a'; ctx.fillRect(0,0,256,64);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,8,256,48);
    ctx.fillStyle = '#00563f'; ctx.fillRect(0,18,256,28);
    return new THREE.CanvasTexture(c);
}
function makeTennisTex() {
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#cfdb1c'; ctx.fillRect(0,0,128,128);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.arc(0,64,44,-Math.PI/2,Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(128,64,44,Math.PI/2,3*Math.PI/2); ctx.stroke();
    return new THREE.CanvasTexture(c);
}

const hatBandTex = makeHatBandTex();
const tennisTex  = makeTennisTex();

// ─── EXTENDED ENVIRONMENT ─────────────────────────────────────────────────────
// Ground planes extended heavily to hide any sharp geometry cutoffs in the fog
const trackMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(8.5, 2000),
    new THREE.MeshStandardMaterial({ color: 0x4a8f3f, roughness: 0.9 })
);
trackMesh.rotation.x = -Math.PI/2;
trackMesh.position.z = -900;
trackMesh.receiveShadow = true; scene.add(trackMesh);

const purpleLineMat = new THREE.MeshBasicMaterial({ color: 0x4a2c7a });
[-4.1, 4.1].forEach(x => {
    const pl = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 2000), purpleLineMat);
    pl.rotation.x = -Math.PI/2;
    pl.position.set(x, 0.01, -900);
    scene.add(pl);
});

const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a8f3f, roughness: 1.0 });
const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(200, 2000), grassMat);
groundMesh.rotation.x = -Math.PI/2;
groundMesh.position.set(0, 0.005, -900);
groundMesh.receiveShadow = true; scene.add(groundMesh);

// Stands restored to the "Goldilocks" framing height
const standMat = new THREE.MeshStandardMaterial({ color: 0x1e4a18, roughness: 0.9 });
const standMeshes = [];
for (let tier = 0; tier < 4; tier++) {
    const th = 2.2, td = 2.8;
    const yBase = tier * th + 0.5;
    const xL = -14.5 - tier * td, xR = 14.5 + tier * td;
    [[xL, Math.PI/6],[xR,-Math.PI/6]].forEach(([x, ry]) => {
        const s = new THREE.Mesh(new THREE.BoxGeometry(td, th, 2000), standMat);
        s.position.set(x, yBase-th/2, -900); s.receiveShadow = true; scene.add(s);
        standMeshes.push(s);
    });
}
// Hide stands at start (Queue section has no stands)
standMeshes.forEach(s => { s.visible = false; });

// ── TREE ROWS (Queue section — replaces stands visually) ──
// London plane / oak style trees lining both sides, matching stand footprint
const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.9 });
const treeLeafMats = [
    new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.85 }),
    new THREE.MeshStandardMaterial({ color: 0x3a6828, roughness: 0.8 }),
    new THREE.MeshStandardMaterial({ color: 0x1e4a15, roughness: 0.9 }),
];
const queueTreeRows = [];
function createTreeRow(xCenter, z) {
    const group = new THREE.Group();
    // 3 trees staggered across the stand width (~11 units wide, from x±14.5 to x±22.9)
    const offsets = [-3.5, 0, 3.5];
    offsets.forEach(dx => {
        const leafMat = treeLeafMats[Math.floor(Math.random() * treeLeafMats.length)];
        const treeH = 5.5 + Math.random() * 3; // ~5.5-8.5 tall — fills the stand height
        const canopyR = 2.2 + Math.random() * 1.2;

        // Trunk
        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.25, 0.4, treeH * 0.45, 6),
            treeTrunkMat
        );
        trunk.position.set(dx + (Math.random()-0.5)*1.5, treeH * 0.22, (Math.random()-0.5)*2);
        trunk.castShadow = true;
        group.add(trunk);

        // Main canopy — big rounded crown (London plane style)
        const canopy = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR, 8, 6),
            leafMat
        );
        canopy.position.set(trunk.position.x, treeH * 0.55 + canopyR * 0.4, trunk.position.z);
        canopy.scale.set(1, 0.8, 1); // slightly squashed like a real broad crown
        canopy.castShadow = true;
        group.add(canopy);

        // Secondary smaller canopy cluster for fullness
        const c2 = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR * 0.6, 6, 5),
            leafMat
        );
        c2.position.set(
            trunk.position.x + (Math.random()-0.5)*canopyR,
            canopy.position.y - canopyR * 0.3,
            trunk.position.z + (Math.random()-0.5)*1.5
        );
        c2.castShadow = true;
        group.add(c2);
    });

    group.position.set(xCenter, 0, z);
    scene.add(group);
    group.visible = true;
    return { group };
}

// Place tree rows along both sides, same z spacing as parallax items
for (let z = -800; z < 40; z += 18) {
    queueTreeRows.push(createTreeRow(-18.5, z)); // left side — centred in stand zone
    queueTreeRows.push(createTreeRow(18.5, z));   // right side
}

// ─── PARALLAX SCENERY ─────────────────────────────────────────────────────────
// Shared mini-figure materials (reused across queue bystanders and court players)
const miniSkin    = new THREE.MeshStandardMaterial({ color: 0xfcdab7 });
const miniWhite   = new THREE.MeshStandardMaterial({ color: 0xffffff });
const miniRacket  = new THREE.MeshStandardMaterial({ color: 0x333333 });

function buildHabboPlayer() {
    const g = new THREE.Group();
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), miniSkin);
    head.position.y = 0.4; g.add(head);
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 0.15), miniWhite);
    body.position.y = 0.15; g.add(body);
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.08), miniSkin);
    legL.position.set(-0.05, -0.05, 0); g.add(legL);
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.08), miniSkin);
    legR.position.set(0.05, -0.05, 0); g.add(legR);
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.2, 0.06), miniSkin);
    arm.position.set(0.15, 0.15, 0); arm.rotation.z = -Math.PI/4; g.add(arm);
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.15, 0.03), miniRacket);
    handle.position.set(0.25, 0.05, 0); handle.rotation.z = -Math.PI/4; g.add(handle);
    const headR = new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.015, 4, 12), miniRacket);
    headR.position.set(0.31, -0.01, 0); headR.rotation.x = Math.PI/2; g.add(headR);
    g.castShadow = true; g.traverse(c => { if(c.isMesh) c.castShadow = true; });
    return g;
}

// ── Bystander (diverse global mix, occasional panama hat) ──
const bystanderColors = [0xff5555, 0x5588dd, 0x44aa66, 0xddaa33, 0xcc66aa, 0xffffff, 0x8866bb, 0xee8844, 0x66aacc, 0x334455, 0xaa4466];
const skinTones = [
    0xfcdab7, // light
    0xf0c8a0, // fair
    0xd4a574, // medium
    0xc68c53, // olive/tan
    0xa0714a, // brown
    0x8d5524, // dark brown
    0x6b3f23, // deep brown
    0x4a2912, // very dark
];
const panamaStrawMat = new THREE.MeshStandardMaterial({ color: 0xf5e6c8, roughness: 0.7 });
const panamaBandMat  = new THREE.MeshStandardMaterial({ color: 0x1a1a3a, roughness: 0.8 });

function buildBystander(facingX, withHat) {
    const g = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: skinTones[Math.floor(Math.random() * skinTones.length)] });
    const clothesMat = new THREE.MeshStandardMaterial({ color: bystanderColors[Math.floor(Math.random()*bystanderColors.length)] });
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), skinMat);
    head.position.y = 0.4; g.add(head);
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 0.15), clothesMat);
    body.position.y = 0.15; g.add(body);
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.08), skinMat);
    legL.position.set(-0.05, -0.05, 0); g.add(legL);
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.08), skinMat);
    legR.position.set(0.05, -0.05, 0); g.add(legR);

    // Mini panama hat
    if (withHat) {
        const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.17, 0.02, 10), panamaStrawMat);
        brim.position.y = 0.52; g.add(brim);
        const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.08, 10), panamaStrawMat);
        crown.position.y = 0.57; g.add(crown);
        const band = new THREE.Mesh(new THREE.CylinderGeometry(0.101, 0.101, 0.025, 10), panamaBandMat);
        band.position.y = 0.535; g.add(band);
    }

    g.rotation.y = facingX > 0 ? Math.PI / 2 : -Math.PI / 2;
    g.castShadow = true; g.traverse(c => { if(c.isMesh) c.castShadow = true; });
    return g;
}

// ── Beach tent (open-front sun shelter, like a real beach tent) ──
const beachTentColors = [0x3366aa, 0xcc4444, 0x2288aa, 0xdd8833, 0x55aa55, 0x7755aa, 0xcc6688];
function buildBeachTent() {
    const g = new THREE.Group();
    const col = beachTentColors[Math.floor(Math.random() * beachTentColors.length)];
    const fabricMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.95, side: THREE.DoubleSide });
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.6 });

    const tentW = 0.9 + Math.random() * 0.2;
    const tentH = 0.7 + Math.random() * 0.1;
    const tentD = 0.7 + Math.random() * 0.2;

    // Back wall (vertical panel)
    const back = new THREE.Mesh(new THREE.PlaneGeometry(tentW, tentH), fabricMat);
    back.position.set(0, tentH / 2, -tentD / 2);
    g.add(back);

    // Sloping roof from top of back wall down towards front
    const roofD = tentD * 1.3;
    const roof = new THREE.Mesh(new THREE.PlaneGeometry(tentW, roofD), fabricMat);
    roof.position.set(0, tentH - 0.05, 0);
    roof.rotation.x = 0.35; // slopes forward
    g.add(roof);

    // Two thin side poles
    [-(tentW / 2 - 0.02), (tentW / 2 - 0.02)].forEach(px => {
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, tentH, 4), poleMat);
        pole.position.set(px, tentH / 2, tentD / 2);
        g.add(pole);
    });

    g.castShadow = true; g.traverse(c => { if(c.isMesh) c.castShadow = true; });
    return g;
}

// ── Parasol / umbrella ──
const parasolColors = [0xee4444, 0x3377cc, 0xeecc33, 0x44aa55, 0xdd6699, 0xffffff, 0x8855cc];
function buildParasol() {
    const g = new THREE.Group();
    const col = parasolColors[Math.floor(Math.random() * parasolColors.length)];
    const canopyMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.8, side: THREE.DoubleSide });

    g.castShadow = true; g.traverse(c => { if(c.isMesh) c.castShadow = true; });

}

// ── QUEUE parallax items (meandering queue line, beach tents, parasols) ──
const parallaxQueue = [];
function createQueueCluster(x, z) {
    const group = new THREE.Group();
    const facingX = x;

    // People in a meandering S-curve queue line running along Z
    const numPeople = 8 + Math.floor(Math.random() * 4);
    const queueLength = 9; // total Z extent of the queue segment
    for (let p = 0; p < numPeople; p++) {
        const wearHat = Math.random() < 0.2; // ~20% get a panama hat
        const person = buildBystander(facingX, wearHat);
        // Progress along the queue
        const t = p / numPeople;
        const pz = -queueLength / 2 + t * queueLength;
        // Gentle S-curve meander in X
        const px = Math.sin(t * Math.PI * 2.5) * 0.8 + (Math.random() - 0.5) * 0.25;
        person.position.set(px, 0.15, pz);
        // Face roughly forward in queue (slight variation)
        person.rotation.y = (Math.random() - 0.5) * 0.4;
        group.add(person);

        // ~20% get a parasol
        if (Math.random() < 0.2) {
            const parasol = buildParasol();
            parasol.position.set(px + 0.15, 0, pz);
            group.add(parasol);
        }
    }

    // Beach tents dotted alongside the queue (1-2 per cluster, offset to the side)
    const numTents = 1 + (Math.random() < 0.4 ? 1 : 0);
    for (let t = 0; t < numTents; t++) {
        const tent = buildBeachTent();
        // Place tent to the side of the queue line, not blocking it
        const tentX = (Math.random() < 0.5 ? -1 : 1) * (1.2 + Math.random() * 0.5);
        const tentZ = (Math.random() - 0.5) * queueLength * 0.6;
        tent.position.set(tentX, 0, tentZ);
        tent.rotation.y = x > 0 ? -Math.PI / 2 : Math.PI / 2;
        group.add(tent);
    }

    group.position.set(x, 0.02, z); scene.add(group);
    group.visible = true;
    return { group };
}

// Henman Hill material — one lush grass tone for a broad natural slope
const henmanGrassMat = new THREE.MeshStandardMaterial({ color: 0x3a8a2a, roughness: 0.95 });
const henmanGrassDark = new THREE.MeshStandardMaterial({ color: 0x2e7220, roughness: 0.95 });

function createHenmanHillSegment(x, z) {
    const group = new THREE.Group();
    const facingX = x;
    const inward = x > 0 ? -1 : 1; // slope faces inward toward the track

    // ── Broad gentle slope (Henman Hill style) ──
    // A wide, low mound — like a grassy bank spectators sit on
    const slopeW = 14;  // wide enough to fill the stand zone
    const slopeD = 16;  // depth along Z per segment
    const slopeH = 3 + Math.random() * 1.5; // gentle 3-4.5m rise
    const slopeGeo = new THREE.PlaneGeometry(slopeW, slopeD, 8, 8);
    const pos = slopeGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        const px = pos.getX(i);
        const pz = pos.getZ(i);
        // Smooth rise: highest at the outer edge, slopes down toward track
        const xNorm = (px / (slopeW/2)); // -1 (inner) to 1 (outer)
        const rise = slopeH * Math.max(0, (inward > 0 ? -xNorm : xNorm) * 0.5 + 0.5);
        // Gentle undulation for natural look
        const ripple = Math.sin(pz * 0.3 + px * 0.2) * 0.25;
        pos.setZ(i, rise + ripple);
    }
    slopeGeo.computeVertexNormals();
    const slopeMat = Math.random() < 0.6 ? henmanGrassMat : henmanGrassDark;
    const slope = new THREE.Mesh(slopeGeo, slopeMat);
    slope.rotation.x = -Math.PI / 2;
    slope.receiveShadow = true;
    group.add(slope);

    // ── People scattered across the slope (sitting on blankets) ──
    const numPeople = 5 + Math.floor(Math.random() * 5);
    for (let i = 0; i < numPeople; i++) {
        const px = (Math.random() - 0.5) * (slopeW * 0.7);
        const pz = (Math.random() - 0.5) * (slopeD * 0.6);
        // Calculate Y from the slope shape
        const xNorm = px / (slopeW/2);
        const surfaceY = slopeH * Math.max(0, (inward > 0 ? -xNorm : xNorm) * 0.5 + 0.5);

        // Blanket under some people
        if (Math.random() < 0.45) {
            const blanket = buildBlanket();
            blanket.position.set(px, surfaceY + 0.01, pz);
            group.add(blanket);
        }

        const person = buildSittingPerson(facingX, Math.random() < 0.25);
        person.position.set(px + (Math.random()-0.5)*0.3, surfaceY, pz + (Math.random()-0.5)*0.2);
        group.add(person);

        // Occasional parasol
        if (Math.random() < 0.15) {
            const parasol = buildParasol();
            parasol.position.set(px + 0.2, surfaceY, pz);
            group.add(parasol);
        }
    }

    // ── Sparse flower patches in the grass ──
    if (Math.random() < 0.4) {
        const fb = buildFlowerBed();
        const fbx = (Math.random() - 0.5) * slopeW * 0.5;
        const fbz = (Math.random() - 0.5) * slopeD * 0.4;
        const xNorm = fbx / (slopeW/2);
        const fbY = slopeH * Math.max(0, (inward > 0 ? -xNorm : xNorm) * 0.5 + 0.5);
        fb.position.set(fbx, fbY + 0.02, fbz);
        group.add(fb);
    }

    // ── Occasional tree at the crest ──
    if (Math.random() < 0.3) {
        const leafMat = treeLeafMats[Math.floor(Math.random() * treeLeafMats.length)];
        const treeH = 4 + Math.random() * 2.5;
        const canopyR = 1.8 + Math.random() * 0.8;
        const tx = (inward > 0 ? -(slopeW*0.35) : (slopeW*0.35)) + (Math.random()-0.5)*2;
        const tz = (Math.random()-0.5) * slopeD * 0.4;

        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.35, treeH * 0.45, 6), treeTrunkMat
        );
        trunk.position.set(tx, slopeH * 0.85 + treeH * 0.22, tz);
        trunk.castShadow = true;
        group.add(trunk);

        const canopy = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR, 7, 5), leafMat
        );
        canopy.position.set(tx, slopeH * 0.85 + treeH * 0.55 + canopyR * 0.3, tz);
        canopy.scale.set(1, 0.75, 1);
        canopy.castShadow = true;
        group.add(canopy);
    }

    group.position.set(x, 0.02, z);
    scene.add(group);
    group.visible = false;
    return { group };
}

// ── RED ROPE BARRIERS (Centre Court — soft velvet VIP rope on brass stanchions) ──
const ropeBarriers = [];
const ropeMat = new THREE.MeshStandardMaterial({ color: 0x9b1111, roughness: 0.85, emissive: 0x1a0000, emissiveIntensity: 0.2 });
const ropePostMat = new THREE.MeshStandardMaterial({ color: 0xd4a830, roughness: 0.25, metalness: 0.8 });
const ropeBaseMat = new THREE.MeshStandardMaterial({ color: 0xb89020, roughness: 0.35, metalness: 0.7 });

function createRopeBarrierSegment(x, z) {
    const group = new THREE.Group();
    const postSpacing = 3.0;

    // Two brass stanchions with wide bases and ball tops
    [-postSpacing/2, postSpacing/2].forEach(dz => {
        // Weighted base
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 0.08, 12), ropeBaseMat);
        base.position.set(0, 0.04, dz);
        group.add(base);
        // Post
        const post = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.9, 8), ropePostMat);
        post.position.set(0, 0.53, dz);
        group.add(post);
        // Gold ball finial
        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), ropePostMat);
        ball.position.set(0, 1.02, dz);
        group.add(ball);
    });

    // Catenary-style draped rope — a TubeGeometry following a drooping curve
    const ropePoints = [];
    const segments = 12;
    for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const pz = -postSpacing/2 + t * postSpacing;
        // Parabolic droop: deepest in the middle, attached at post tops
        const sag = 0.18 * (4 * t * (1 - t)); // max 0.18 sag at center
        const py = 0.95 - sag;
        ropePoints.push(new THREE.Vector3(0, py, pz));
    }
    const ropeCurve = new THREE.CatmullRomCurve3(ropePoints);
    const ropeGeo = new THREE.TubeGeometry(ropeCurve, 16, 0.025, 6, false);
    const rope = new THREE.Mesh(ropeGeo, ropeMat);
    group.add(rope);

    group.position.set(x, 0, z);
    scene.add(group);
    group.visible = false;
    return { group };
}

for (let z = -800; z < 40; z += 5) {
    ropeBarriers.push(createRopeBarrierSegment(-4.8, z));
    ropeBarriers.push(createRopeBarrierSegment(4.8, z));
}

function createStandCrowd(density) {
    const meshes = [];
    for (let tier = 0; tier < 4; tier++) {
        const td = 2.8, th = 2.2;
        const yBase = tier * th + 0.5;
        const xL = -14.5 - tier * td;
        const xR = 14.5 + tier * td;
        [xL, xR].forEach(xSide => {
            const count = Math.floor(density * (12 + tier * 4));
            for (let i = 0; i < count; i++) {
                const col = crowdColors[Math.floor(Math.random() * crowdColors.length)];
                const mat = new THREE.MeshBasicMaterial({ color: col });
                const dot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.4, 0.3), mat);
                dot.position.set(
                    xSide + (Math.random()-0.5) * (td*0.8),
                    yBase - th/2 + th * 0.3 + Math.random() * th * 0.5,
                    -800 + Math.random() * 840
                );
                scene.add(dot);
                dot.visible = false;
                meshes.push(dot);
            }
        });
    }
    return meshes;
}

function buildStadium() {

    // Colors matched to the scene's muted, earthy palette
    const wimGreen     = new THREE.MeshStandardMaterial({ color: 0x1e4a18, roughness: 0.9 });   // matches stand color
    const darkGreen    = new THREE.MeshStandardMaterial({ color: 0x143210, roughness: 0.95 });

    lowerR.position.set((trackW/2 + sideW/2), 5, 0);
    g.add(lowerR);

    entranceCeiling.position.set(0, entranceH + 0.25, 0);
    g.add(entranceCeiling);

    // Horizontal glass band between lower and upper tiers
    const glassBand1 = new THREE.Mesh(new THREE.BoxGeometry(W + 0.5, 0.8, 12.4), glassBand);
    glassBand1.position.set(0, 9, 0);

    // ── CONCOURSE / DEBENTURE LEVEL ──

    concourse.position.set(0, 10.5, 0.5);
    g.add(concourse);

    // ── UPPER TIER ──
    const upperWall = new THREE.Mesh(new THREE.BoxGeometry(W, 7, 12), lightGreen);
    upperWall.position.set(0, 15, 0);
    g.add(upperWall);

    // Vertical green panels on upper tier for texture
    for (let x = -W/2 + 2; x <= W/2 - 2; x += 3) {
        if (Math.abs(x) < trackW/2 + 1) continue;
        const panel = new THREE.Mesh(new THREE.BoxGeometry(0.3, 7, 0.3), darkGreen);
        panel.position.set(x, 15, 6.15);
        g.add(panel);
    }

    // Second glass ribbon above upper tier
    const glassBand2 = new THREE.Mesh(new THREE.BoxGeometry(W + 0.5, 0.6, 12.4), glassBand);
    glassBand2.position.set(0, 19, 0);
    g.add(glassBand2);

    // ── ROOF FASCIA ──
    const roofFascia = new THREE.Mesh(new THREE.BoxGeometry(W + 2, 2, 13), roofMat);
    roofFascia.position.set(0, 20.3, 0.5);
    g.add(roofFascia);

    // ── RETRACTABLE ROOF TRUSSES ──
    const trussCount = 8;
    const trussSpacing = (W - 4) / (trussCount - 1);
    for (let i = 0; i < trussCount; i++) {
        const tx = -W/2 + 2 + i * trussSpacing;
        const truss = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 18), trussMat);
        truss.position.set(tx, 21.8, -2);

        bracket.position.set(tx, 20.5, 6.3);
        g.add(bracket);
    }
    const roofSkin = new THREE.Mesh(new THREE.BoxGeometry(W + 2, 0.3, 16), roofMat);
    roofSkin.position.set(0, 22.2, -1);
    roofSkin.rotation.x = 0.05;
    g.add(roofSkin);

    // ── ENTRANCE (proper tunnel with light only from doorway) ──
    const facadeL = new THREE.Mesh(new THREE.BoxGeometry(sideW, entranceH, 1.5), wimGreen);
    facadeL.position.set(-(trackW/2 + sideW/2), entranceH/2, 6.3);

    const facadeR = new THREE.Mesh(new THREE.BoxGeometry(sideW, entranceH, 1.5), wimGreen);

    // Archway header above the entrance

    lintel.position.set(0, entranceH + 0.7, 6.3);

    // Solid columns framing the doorway
    [-trackW/2 - 0.4, trackW/2 + 0.4].forEach(x => {
        const pilaster = new THREE.Mesh(new THREE.BoxGeometry(0.8, entranceH + 1.5, 1.2), concrete);
        pilaster.position.set(x, (entranceH + 1.5)/2, 6.4);
        g.add(pilaster);
    });

    // Solid entrance tunnel — walls, ceiling, floor form a box the player runs through
    const tunnelDepth = 8;
    const tunnelZ = 6.3 - tunnelDepth / 2;
    const tunnelWallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a14, roughness: 0.95 });
    const tunnelWarmMat = new THREE.MeshStandardMaterial({ color: 0x2a2418, roughness: 0.85, emissive: 0x201508, emissiveIntensity: 0.5 });

    // Left wall
    const tWallL = new THREE.Mesh(new THREE.BoxGeometry(0.3, entranceH, tunnelDepth), tunnelWallMat);
    tWallL.position.set(-trackW/2 + 0.15, entranceH/2, tunnelZ);
    g.add(tWallL);
    // Right wall
    const tWallR = new THREE.Mesh(new THREE.BoxGeometry(0.3, entranceH, tunnelDepth), tunnelWallMat);
    tWallR.position.set(trackW/2 - 0.15, entranceH/2, tunnelZ);
    g.add(tWallR);
    // Ceiling
    const tCeil = new THREE.Mesh(new THREE.BoxGeometry(trackW, 0.4, tunnelDepth), tunnelWallMat);
    tCeil.position.set(0, entranceH, tunnelZ);
    g.add(tCeil);
    // Floor — flush with ground level (no step up into stadium)
    const tFloor = new THREE.Mesh(new THREE.BoxGeometry(trackW, 0.05, tunnelDepth), tunnelWarmMat);
    tFloor.position.set(0, 0.005, tunnelZ);
    g.add(tFloor);

    // Warm glowing back wall at the far end of the tunnel
    const innerGlow = new THREE.Mesh(
        new THREE.PlaneGeometry(trackW - 0.6, entranceH - 0.4),
        warmLightMat
    );
    innerGlow.position.set(0, entranceH/2, tunnelZ - tunnelDepth/2 + 0.1);
    g.add(innerGlow);

    // Single SpotLight inside the tunnel aimed outward — light only exits through the doorway
    const doorLight = new THREE.SpotLight(0xffdcaa, 3.5, 80, Math.PI / 7, 0.5, 1.0);
    doorLight.position.set(0, entranceH - 1, tunnelZ - 1);
    doorLight.target.position.set(0, 0, 18);

    g.add(doorLight);
    g.add(doorLight.target);

    // ── CLOCK (above entrance, centered) ──
    const clockBacking = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 0.15, 32), darkGreen);
    clockBacking.rotation.x = Math.PI / 2;
    clockBacking.position.set(0, 13.5, 6.25);
    g.add(clockBacking);
    const clockFace = new THREE.Mesh(new THREE.CylinderGeometry(2.1, 2.1, 0.2, 32), whiteGlow);
    clockFace.rotation.x = Math.PI / 2;
    clockFace.position.set(0, 13.5, 6.35);
    g.add(clockFace);

    // ── CHAMPIONSHIPS LOGOS ──
    [-12, 12].forEach(x => {
        const logo = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.8, 0.2, 32), purpleLogo);
        logo.rotation.x = Math.PI / 2;
        logo.position.set(x, 13.5, 6.4);
        g.add(logo);
        const logoIn = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 0.22, 32), wimGreen);
        logoIn.rotation.x = Math.PI / 2;
        logoIn.position.set(x, 13.5, 6.42);
        g.add(logoIn);
        const cross1 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.18, 0.24), whiteGlow);
        cross1.rotation.z = Math.PI / 4;
        cross1.position.set(x, 13.5, 6.45);
        g.add(cross1);
        const cross2 = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.18, 0.24), whiteGlow);
        cross2.rotation.z = -Math.PI / 4;
        cross2.position.set(x, 13.5, 6.45);
        g.add(cross2);
    });

    // ── TEXT BAND above entrance ──
    const textBanner = new THREE.Mesh(new THREE.BoxGeometry(trackW + 4, 1.0, 0.15), darkGreen);
    textBanner.position.set(0, 10.2, 6.5);
    g.add(textBanner);

    // Ambient stadium glow
    const stadiumGlow = new THREE.PointLight(0xffeedd, 0.8, 120);
    stadiumGlow.position.set(0, 22, 20);
    g.add(stadiumGlow);

    enableShadows(g);
    return g;
}

// ─── STAGE OVERHEAD BANNERS (True 2D Canvas mapped to Flat Plane) ─────────────
function buildOverheadBanner(stageName) {
    const g = new THREE.Group();
    const wMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });

    const canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 256; // Standard banner proportion
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 1024, 256);

    ctx.fillStyle = '#00563f';
    ctx.fillRect(0, 0, 1024, 20);
    ctx.fillRect(0, 236, 1024, 20);

    let fontSize = 110;
    ctx.font = `900 ${fontSize}px "Georgia", "Times New Roman", serif`;
    const text = stageName.toUpperCase();

    // Scale text perfectly
    while (ctx.measureText(text).width > 900 && fontSize > 40) {
        fontSize -= 5;
        ctx.font = `900 ${fontSize}px "Georgia", "Times New Roman", serif`;
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 512, 128);

    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;

    const bMatFront = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });

    // Flat plane prevents texture stretching and UV warping. Bends slightly.
    const bannerWidth = 13.0;
    const bGeo = new THREE.PlaneGeometry(bannerWidth, 3.2, 32, 1);
    const pos = bGeo.attributes.position;
    for(let i=0; i<pos.count; i++) {
        const x = pos.getX(i);
        const yOffset = -0.05 * Math.pow(x, 2);
        pos.setY(i, pos.getY(i) + yOffset);
    }
    bGeo.computeVertexNormals();

    const banner = new THREE.Mesh(bGeo, bMatFront);
    // Placed explicitly IN FRONT of poles to prevent Z-fighting
    banner.position.set(0, 7.5, 0.3);
    g.add(banner);

    // Support Poles
    const poleHeight = 6.8;
    [-5.5, 5.5].forEach(x => {
        const post = new THREE.Mesh(new THREE.BoxGeometry(0.4, poleHeight, 0.4), wMat);
        // Positioned at Z = 0, completely behind the banner plane
        post.position.set(x, poleHeight / 2, 0);
        g.add(post);
    });

    return g;
}

function buildTennisRacket() {
    const g = new THREE.Group();

    // Handle — longer grip with butt cap
    const handle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.045, 0.055, 0.5, 8),
        SharedMat.racketGrip
    );
    handle.position.y = 0.25;
    g.add(handle);
    // Butt cap
    const buttCap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 0.04, 8),
        SharedMat.racketFrame
    );
    buttCap.position.y = 0.02;
    g.add(buttCap);

    // Throat / shaft — tapers from handle to head
    const throat = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.045, 0.2, 6),
        SharedMat.racketFrame
    );
    throat.position.y = 0.6;
    g.add(throat);

    // V-shaped throat yoke (two angled struts)
    [-1, 1].forEach(side => {
        const strut = new THREE.Mesh(
            new THREE.CylinderGeometry(0.015, 0.02, 0.18, 4),
            SharedMat.racketFrame
        );
        strut.position.set(side * 0.06, 0.72, 0);
        strut.rotation.z = side * 0.35;
        g.add(strut);
    });

    // Head frame — elongated oval (ellipse ring using a Torus stretched)
    const headFrame = new THREE.Mesh(
        new THREE.TorusGeometry(0.22, 0.025, 8, 24),
        SharedMat.racketFrame
    );
    headFrame.position.y = 1.0;
    headFrame.scale.set(0.85, 1.25, 1); // oval: narrower width, taller height
    g.add(headFrame);

    // String bed — vertical strings
    for (let i = -3; i <= 3; i++) {
        const sx = i * 0.04;
        // Trim length based on distance from center (oval shape)
        const frac = 1 - (Math.abs(i) / 3.5) * 0.35;
        const stringV = new THREE.Mesh(
            new THREE.CylinderGeometry(0.004, 0.004, 0.48 * frac, 3),
            SharedMat.racketStrings
        );
        stringV.position.set(sx * 0.85, 1.0, 0);
        g.add(stringV);
    }
    // Horizontal strings
    for (let j = -4; j <= 4; j++) {
        const sy = j * 0.035;
        const frac = 1 - (Math.abs(j) / 4.5) * 0.4;
        const stringH = new THREE.Mesh(
            new THREE.BoxGeometry(0.34 * frac, 0.006, 0.006),
            SharedMat.racketStrings

    pl.position.y = 0.8;

    g.scale.set(1.5, 1.5, 1.5);

(function buildClockFace() {
    const tickG = document.getElementById('clock-min-ticks');
    for (let m = 0; m < 60; m++) {
        if (m % 5 === 0) continue;
        const ang = m * 6, rad = ang * Math.PI / 180;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', 50 + 43 * Math.sin(rad)); line.setAttribute('y1', 50 - 43 * Math.cos(rad));
        line.setAttribute('x2', 50 + 46 * Math.sin(rad)); line.setAttribute('y2', 50 - 46 * Math.cos(rad));
        line.setAttribute('stroke', 'rgba(255,255,255,0.35)');
        tickG.appendChild(line);
    }
    const markerG = document.getElementById('clock-hour-markers');
    for (let h = 0; h < 12; h++) {
        const ang = h * 30, rad = ang * Math.PI / 180;
        const isCard = h % 3 === 0, mW = isCard ? 5.5 : 3.8, mH = isCard ? 10 : 7.5;
        const cx = 50 + 35 * Math.sin(rad), cy = 50 - 35 * Math.cos(rad);
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', cx - mW / 2); rect.setAttribute('y', cy - mH / 2);
        rect.setAttribute('width', mW); rect.setAttribute('height', mH);
        rect.setAttribute('fill', 'none'); rect.setAttribute('stroke', 'white');
        rect.setAttribute('stroke-width', isCard ? '1.8' : '1.4');
        rect.setAttribute('transform', `rotate(${ang}, ${cx}, ${cy})`);
        markerG.appendChild(rect);
    }
})();

function updateUI() {

    const elapsedTotal = STAGES.slice(0, currentStage).reduce((s, st) => s + st.duration, 0) + stageTimer;

function setParallaxVisibility(stage) {
    // Queue (stage 0): queue people, tree rows, clouds — no stands
    const showQueue = (stage === 0);
    parallaxQueue.forEach(q => { q.group.visible = showQueue; });
    queueTreeRows.forEach(t => { t.group.visible = showQueue; });

    // Hill (stage 1): hills with picnickers on top, skyline, clouds — no stands
    const showHill = (stage === 1);
    parallaxHill.forEach(h => { h.group.visible = showHill; });
    skylineMeshes.forEach(s => { s.visible = showHill; });

    // Clouds visible in Queue and Hill only
    const showClouds = (stage <= 1);
    cloudMeshes.forEach(c => { c.visible = showClouds; });

    // Courts (stages 1-3 but mainly 2-3 visually)
    const showCourts = (stage >= 2);
    parallaxCourts.forEach(c => { c.group.visible = showCourts; });

    // Stands visible from Outdoor Courts onward (stages 2-3)
    standMeshes.forEach(s => { s.visible = (stage >= 2); });

    // Stand crowd: sparse in Outdoor Courts, dense in Centre Court
    standCrowdSparse.forEach(d => { d.visible = (stage === 2); });
    standCrowdDense.forEach(d => { d.visible = (stage === 3); });

    // Red rope barriers only in Centre Court
    const showRopes = (stage === 3);
    ropeBarriers.forEach(r => { r.group.visible = showRopes; });
}

function startStage() {
    gameSpeed = BASE_SPEED + score * SCORE_SPEED_FACTOR;
    targetSpeed = gameSpeed;
    stageTimer = 0;
    gameActive = true;
    setParallaxVisibility(currentStage);
    updateUI();

    // Spawn initial "Queue" banner at game start so it matches the other level banners
    if (currentStage === 0) {
        const queueBanner = buildOverheadBanner(STAGES[0].name);
        queueBanner.position.z = -40;
        scene.add(queueBanner);
        activeItems.push({ mesh: queueBanner, type: 'banner', active: true });
    }
}

function advanceStage() {
    currentStage++;
    const next = STAGES[currentStage];
    stageTimer = 0;

    const banner = buildOverheadBanner(next.name);
    banner.position.z = -120;
    scene.add(banner);
    activeItems.push({ mesh: banner, type: 'banner', active: true });
    pendingBannerMesh = banner;

    // DON'T switch parallax scenery yet — wait until banner passes the player
    // setParallaxVisibility is called in the animation loop when banner.z > 0
}

    const CONFETTI_COUNT = 200;

    for (let i = 0; i < CONFETTI_COUNT; i++) {

        const rX = Math.random()*Math.PI*2, rY = Math.random()*Math.PI*2;
        _m4.makeRotationFromEuler(new THREE.Euler(rX, rY, 0));
        _m4.setPosition(x, y, z);

    }
    confettiIM.instanceMatrix.needsUpdate = true;
    confettiIM.userData.data = confettiData;
    confettiGroup = confettiIM;

    if (e.code === 'ArrowRight' && currentLaneIndex < 2) { currentLaneIndex++; e.preventDefault(); }

    if (e.code === 'ArrowDown'  && !isJumping) { isDucking = true; e.preventDefault(); }

        if (dy >  25 && !isJumping) {

// ─── BODY TRACKING (MediaPipe Pose) ───────────────────────────────────────────
(function initBodyTracking() {
    const poseVideo  = document.getElementById('pose-video');
    const poseCanvas = document.getElementById('pose-canvas');
    const poseCtx    = poseCanvas.getContext('2d');
    const poseLabel  = document.getElementById('pose-label');

    // Calibration state
    let calibrating = true;
    let calibSamples = [];
    const CALIB_DURATION = 1.0; // seconds
    let calibStart = 0;
    let baselineY = 0; // calibrated standing shoulder Y (normalised 0-1)

    // Jump / duck thresholds (in normalised coords — lower Y = higher on screen)
    const JUMP_THRESHOLD  = 0.045; // shoulder must rise this much above baseline to jump
    const DUCK_THRESHOLD  = 0.055; // shoulder must drop this much below baseline to duck
    const JUMP_COOLDOWN   = 600;   // ms
    let lastJumpTime = 0;
    let bodyDucking = false;

    if (typeof Pose === 'undefined') {
        console.warn('MediaPipe Pose not loaded — body tracking disabled.');
        poseLabel.textContent = 'No pose lib';
        return;
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${file}`
    });
    pose.setOptions({
        modelComplexity: 0, // lite
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults(onPoseResults);

    function onPoseResults(results) {
        // Draw mirrored preview
        poseCtx.save();
        poseCtx.clearRect(0, 0, 320, 240);
        poseCtx.drawImage(results.image, 0, 0, 320, 240);
        poseCtx.restore();

        if (!results.poseLandmarks) return;
        const lm = results.poseLandmarks;
        const leftShoulder  = lm[11];
        const rightShoulder = lm[12];
        if (!leftShoulder || !rightShoulder) return;
        if (leftShoulder.visibility < 0.5 || rightShoulder.visibility < 0.5) return;

        const shoulderX = (leftShoulder.x + rightShoulder.x) / 2;
        const shoulderY = (leftShoulder.y + rightShoulder.y) / 2;

        // Draw green dot on shoulder midpoint (mirrored coords)
        const dotX = shoulderX * 320;
        const dotY = shoulderY * 240;
        poseCtx.fillStyle = '#44ff88';
        poseCtx.beginPath();
        poseCtx.arc(dotX, dotY, 5, 0, Math.PI * 2);
        poseCtx.fill();

        // ── Calibration phase ──
        if (calibrating) {
            if (calibStart === 0) calibStart = performance.now();
            calibSamples.push(shoulderY);
            const elapsed = (performance.now() - calibStart) / 1000;
            poseLabel.textContent = 'Calibrating…';
            if (elapsed >= CALIB_DURATION && calibSamples.length > 5) {
                baselineY = calibSamples.reduce((a, b) => a + b, 0) / calibSamples.length;
                calibrating = false;
                poseLabel.textContent = 'Tracking';
                setTimeout(() => { poseLabel.textContent = ''; }, 1500);
            }
            return;
        }

        if (!gameActive || isCutscene) return;

        // ── Left / Right lane control (mirrored: camera left = screen right) ──
        // shoulderX is 0-1, mirrored so we invert: low X = player's right = screen left
        const mirroredX = 1 - shoulderX;
        if (mirroredX < 0.38)       { currentLaneIndex = 0; } // left lane
        else if (mirroredX > 0.62)  { currentLaneIndex = 2; } // right lane
        else                        { currentLaneIndex = 1; } // centre

        // ── Jump (shoulders raised above baseline) ──
        const deltaY = baselineY - shoulderY; // positive = shoulders higher than baseline
        if (deltaY > JUMP_THRESHOLD && !isJumping && !isDucking) {
            const now = performance.now();
            if (now - lastJumpTime > JUMP_COOLDOWN) {
                isJumping = true;
                jumpVel = JUMP_FORCE;
                lastJumpTime = now;
            }
        }

        // ── Duck (shoulders lowered below baseline) ──
        if (-deltaY > DUCK_THRESHOLD && !isJumping) {
            if (!bodyDucking) { isDucking = true; bodyDucking = true; }
        } else {
            if (bodyDucking) { isDucking = false; bodyDucking = false; }
        }
    }

    // Start camera
    navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' } })
        .then(stream => {
            poseVideo.srcObject = stream;
            poseVideo.play();
            poseLabel.textContent = 'Calibrating…';

            const cam = new Camera(poseVideo, {
                onFrame: async () => { await pose.send({ image: poseVideo }); },
                width: 320,
                height: 240
            });
            cam.start();
        })
        .catch(err => {
            console.warn('Camera not available:', err);
            poseLabel.textContent = 'No camera';
        });
})();

// ─── SPAWNING ─────────────────────────────────────────────────────────────────
// Pre-build a Set of all shared geometries/materials for O(1) lookup during disposal
const _sharedGeos = new Set([...Object.values(SharedGeo), ...Object.values(WalkerLimbGeos)]);
const _sharedMats = new Set([...Object.values(SharedMat), ropeMat, ropePostMat]);

function disposeItem(mesh) {
    scene.remove(mesh);
    mesh.traverse(c => {
        if (c.isMesh) {
            if (!_sharedGeos.has(c.geometry)) c.geometry.dispose();
            const mats = Array.isArray(c.material) ? c.material : [c.material];
            mats.forEach(m => { if (!_sharedMats.has(m)) m.dispose(); });
        }
        if (c.isLight) { if (c.shadow && c.shadow.map) c.shadow.map.dispose(); }
    });
}

function getMostRecentObstacleZ() {
    let mostRecentZ = 100;
    for(let i=0; i<activeItems.length; i++) {
        const it = activeItems[i];
        if (it.active && (it.type === 'hedge' || it.type === 'bird' || it.type === 'walker')) {
            if (it.mesh.position.z < mostRecentZ) mostRecentZ = it.mesh.position.z;
        }
    }
    return mostRecentZ === 100 ? 100 : mostRecentZ;
}

// Banner safe zone: prevents obstacles from spawning too close to banners
function isInBannerSafeZone(z) {
    for (let i = 0; i < activeItems.length; i++) {
        if (activeItems[i].type === 'banner' && activeItems[i].active) {
            if (Math.abs(activeItems[i].mesh.position.z - z) < BANNER_SAFE_ZONE) return true;
        }
    }
    return false;
}

function spawnItem() {
    if(isCutscene || cupSpawned) return;

    const rand = Math.random(), laneIdx = Math.floor(Math.random() * 3);
    let mesh, type;

    const fenceChance = currentStage >= 2 ? 0.06 + (currentStage-2)*0.05 : 0;
    const birdChance  = 0.10 + currentStage * 0.05;
    const walkerChance = 0.16 + currentStage * 0.05;

    const MIN_OBSTACLE_GAP = currentStage === FINAL_STAGE_INDEX ? 26 : 16;
    const tooClose = getMostRecentObstacleZ() < (-90 + MIN_OBSTACLE_GAP);
    const inBannerZone = isInBannerSafeZone(-90);

    if (rand > 0.93 && !multiplierActive) {
        // Per-stage collectibles (allowed in banner safe zone)
        if (currentStage === 0) { mesh = buildGoldTicket(); type = 'goldticket'; }
        else if (currentStage === 2) { mesh = buildTennisRacket(); type = 'racket'; }
        else { mesh = buildIceCream(); type = 'icecream'; }
    }
    else if (rand < fenceChance && !tooClose && !inBannerZone) { mesh = buildHedge(); type = 'hedge'; }
    else if (rand < fenceChance + birdChance && !tooClose && !inBannerZone) {
        mesh = buildBird();
        mesh.position.y = 3.5;
        mesh.userData.animPhase = Math.random() * Math.PI * 2;
        type = 'bird';
    }
    else if (rand < fenceChance + birdChance + walkerChance && !tooClose && !inBannerZone) { mesh = buildWalkerHazard(); mesh.userData.animPhase = Math.random() * Math.PI * 2; mesh.userData.walkSpeed = 0.02 + Math.random() * 0.015; type = 'walker'; }
    else { mesh = new THREE.Mesh(SharedGeo.ball, SharedMat.ball); mesh.position.y = 0.5; type = 'ball'; }

    mesh.castShadow = true; mesh.position.z = -90; mesh.position.x = (type === 'hedge') ? 0 : lanePositions[laneIdx];
    scene.add(mesh); activeItems.push({ mesh, type, lane: laneIdx, active: true });
}

function flashHit(fatal) {
    mTunic.emissive.setHex(fatal ? 0xff1010 : 0xffffff);
    setTimeout(() => mTunic.emissive.setHex(0x000000), fatal ? 280 : 130);
    if(fatal) {
        clockHud.classList.remove('clock-hit');
        void clockHud.offsetWidth;
        clockHud.classList.add('clock-hit');
        setTimeout(() => clockHud.classList.remove('clock-hit'), 450);
    }
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    if (!gameActive) { renderer.render(scene, camera); return; }

    const delta = clock.getDelta(), time = clock.getElapsedTime(), runSpeed = 12;

    if (stumbleTimer > 0) {
        stumbleTimer -= delta;
        if (stumbleTimer < 0) stumbleTimer = 0;
    }
    // Smooth recovery of stumble multiplier after stumble duration ends
    if (stumbleTimer <= 0 && stumbleSpeedMult < 1) {
        stumbleSpeedMult = Math.min(1, stumbleSpeedMult + delta * 0.8);
        if (stumbleSpeedMult > 0.99) stumbleSpeedMult = 1;
    }

    // Decay speed boost smoothly
    if (speedBoost > 0) {
        speedBoost = Math.max(0, speedBoost - SPEED_BOOST_DECAY * delta);
    }

    // Score-driven target speed with smooth interpolation
    targetSpeed = BASE_SPEED + score * SCORE_SPEED_FACTOR + speedBoost;
    targetSpeed = Math.max(MIN_SPEED, Math.min(MAX_SPEED, targetSpeed));
    gameSpeed += (targetSpeed - gameSpeed) * Math.min(1, SPEED_LERP_RATE * delta);

    // Track banner passage — switch scenery AFTER banner passes the player
    if (pendingBannerMesh && pendingBannerMesh.position.z > 0) {
        setParallaxVisibility(currentStage);
        pendingBannerMesh = null;
    }

    const effectiveSpeed = gameSpeed * stumbleSpeedMult;

    // ─── SKY / FOG COLOR TRANSITIONS ───
    const targetSky = STAGE_SKY[currentStage];
    const targetFog = STAGE_FOG[currentStage];
    const targetDensity = STAGE_FOG_DENSITY[currentStage];
    const lerpRate = delta * 0.8;
    scene.background.lerp(targetSky, lerpRate);
    scene.fog.color.lerp(targetFog, lerpRate);
    scene.fog.density = THREE.MathUtils.lerp(scene.fog.density, targetDensity, lerpRate);

    // ─── GAME STATE / CUTSCENE LOGIC ───
    if (isCutscene) {
        playerGroup.position.z -= 15 * delta;

        // Grounded Confetti Physics (InstancedMesh)
        if (confettiGroup && confettiGroup.isInstancedMesh) {
            const cData = confettiGroup.userData.data;
            const _cm4 = new THREE.Matrix4();
            for (let ci = 0; ci < cData.length; ci++) {
                const d = cData[ci];
                if (d.y > 0.05) {
                    d.y += d.vY * delta;
                    d.x += d.vX * delta;
                    d.rX += d.drX * delta * 5;
                    d.rY += d.drY * delta * 5;
                } else {
                    d.y = 0.05;
                }
                _cm4.makeRotationFromEuler(new THREE.Euler(d.rX, d.rY, 0));
                _cm4.setPosition(d.x, d.y, d.z);
                confettiGroup.setMatrixAt(ci, _cm4);
            }
            confettiGroup.instanceMatrix.needsUpdate = true;
        }

        if (playerGroup.position.z < -100) {
            document.getElementById('victory-score').textContent = score;
            const vs = document.getElementById('victory-screen');
            vs.style.display = 'flex';
            setTimeout(() => vs.classList.add('fade-in'), 50);
            gameActive = false;
        }
    } else {
        stageTimer += delta;

        if (currentStage === FINAL_STAGE_INDEX) {
            const timeLeft = STAGES[FINAL_STAGE_INDEX].duration - stageTimer;

            if (timeLeft <= 2.0 && !cupSpawned) {
                cupSpawned = true;
                cupMesh = buildTrophy();
                cupMesh.position.set(0, 1.5, -40);
                scene.add(cupMesh);
                // Clear all existing obstacles/collectibles so the trophy approach is clean
                for (let j = activeItems.length - 1; j >= 0; j--) {
                    if (activeItems[j].type !== 'banner') {
                        disposeItem(activeItems[j].mesh);
                        activeItems.splice(j, 1);
                    }
                }
            }

            if (cupSpawned && cupMesh) {
                cupMesh.position.z += (40 / 2) * delta;
                cupMesh.rotation.y += 5 * delta;
            }

            if (timeLeft <= 0) {
                startCutscene();
            }

            // Stadium rises smoothly early in the final stage over exactly 5 seconds
            const riseProg = Math.min(stageTimer / 5.0, 1.0);
            const easeProg = Math.sin(riseProg * Math.PI / 2);
            stadiumGroup.position.y = -100 + (100 * easeProg); // Rises from underground exactly to 0

            // Stadium moves towards player to simulate ground tracking
            if (stadiumGroup.position.z < -140) {
                stadiumGroup.position.z += effectiveSpeed;
            } else {
                stadiumGroup.position.z = -140;
            }

        } else if (stageTimer >= STAGES[currentStage].duration) {
            advanceStage();
        }
    }

    if (multiplierActive) { multiplierTimer -= delta; if (multiplierTimer <= 0) multiplierActive = false; }
    if (!isCutscene) updateUI();

    // ─── PLAYER ANIMATION ───
    if (!isCutscene) {
        const tX = lanePositions[currentLaneIndex], diffX = tX - playerGroup.position.x;
        playerGroup.position.x += diffX * 0.22; playerGroup.rotation.z = -diffX * 0.10;
    } else {
        playerGroup.position.x += (0 - playerGroup.position.x) * 0.1;
        playerGroup.rotation.z = 0;
    }

    if (isJumping) { jumpVel += GRAV; jumpOffset += jumpVel; if (jumpOffset <= 0) { jumpOffset = 0; jumpVel = 0; isJumping = false; } }
    playerGroup.scale.y += ((isDucking ? 0.65 : 1.0) - playerGroup.scale.y) * 0.18;

    playerGroup.position.y = jumpOffset + ((isJumping || isDucking) ? 0 : Math.abs(Math.sin(time * runSpeed * 2)) * 0.11) + 0.05;

    if (isDucking) {
        armL.rotation.set(0, 0, 0.95); armR.rotation.set(0, 0, -0.95);
        legL.rotation.x = 0.6; legR.rotation.x = 0.6;
    } else if (isJumping) {
        armL.rotation.set(-1.15, 0, -0.35); armR.rotation.set(-1.15, 0, 0.35);
        legL.rotation.x = 0.40; legR.rotation.x = 0.40;
    } else {
        armL.rotation.set(Math.sin(time * runSpeed) * 1.55, 0, 0); armR.rotation.set(-Math.sin(time * runSpeed) * 1.55, 0, 0);
        legL.rotation.x = -Math.sin(time * runSpeed) * 1.25; legR.rotation.x = Math.sin(time * runSpeed) * 1.25;
    }

    // ── Parallax Scenery Animation (animate anything that's visible) ──
    if (!isCutscene) {
        const parallaxSpd = effectiveSpeed * 0.08;
        const slowParallax = effectiveSpeed * 0.03;

        // Queue scenery + tree rows
        if (parallaxQueue[0] && parallaxQueue[0].group.visible) {
            for (let i = 0, len = parallaxQueue.length; i < len; i++) {
                const q = parallaxQueue[i];
                q.group.position.z += parallaxSpd;
                if (q.group.position.z > 20) q.group.position.z -= 840;
            }
            for (let i = 0, len = queueTreeRows.length; i < len; i++) {
                const t = queueTreeRows[i];
                t.group.position.z += parallaxSpd;
                if (t.group.position.z > 20) t.group.position.z -= 840;
            }
        }

        // Hill scenery
        if (parallaxHill[0] && parallaxHill[0].group.visible) {
            for (let i = 0, len = parallaxHill.length; i < len; i++) {
                const h = parallaxHill[i];
                h.group.position.z += parallaxSpd;
                if (h.group.position.z > 20) h.group.position.z -= 840;
            }
        }

        // Clouds drift slowly
        if (cloudMeshes[0] && cloudMeshes[0].visible) {
            for (let i = 0, len = cloudMeshes.length; i < len; i++) {
                const c = cloudMeshes[i];
                c.position.x += (Math.sin(time * 0.1 + i) * 0.003);
                c.position.z += slowParallax;
                if (c.position.z > 30) c.position.z -= 580;
            }
        }

        // Court scenery
        if (parallaxCourts[0] && parallaxCourts[0].group.visible) {
            for (let i = 0, len = parallaxCourts.length; i < len; i++) {
                const court = parallaxCourts[i];
                court.group.position.z += parallaxSpd;
                if (court.group.position.z > 20) court.group.position.z -= 840;
                if (court.group.position.z > -80 && court.group.position.z < 20) {
                    const animOffset = time * 2.5 + i;
                    court.p1.position.x = Math.sin(animOffset) * 1.8;
                    court.p2.position.x = Math.cos(animOffset * 0.8) * 1.8;
                }
            }
        }

        // Rope barriers scroll
        if (ropeBarriers[0] && ropeBarriers[0].group.visible) {
            for (let i = 0, len = ropeBarriers.length; i < len; i++) {
                const r = ropeBarriers[i];
                r.group.position.z += parallaxSpd;
                if (r.group.position.z > 20) r.group.position.z -= 840;
            }
        }
    }

    if (Math.random() < STAGES[currentStage].spawnRate) spawnItem();

    for (let i = activeItems.length - 1; i >= 0; i--) {
        const item = activeItems[i]; if (!item.active) continue;

        if (!isCutscene && item.type !== 'trophy') {
            const spd = (item.type === 'bird') ? effectiveSpeed * 1.15 : effectiveSpeed;
            item.mesh.position.z += spd;
        }

        if (item.type === 'banner') {
            // Fade banner to translucent after it passes the player (Z > 0)
            if (item.mesh.position.z > 0) {
                const fadeProgress = Math.min(item.mesh.position.z / 6, 1); // fully faded by Z=6
                const opacity = 1 - fadeProgress * 0.85; // fades to 15% opacity
                item.mesh.traverse(c => {
                    if (c.isMesh && c.material) {
                        c.material.transparent = true;
                        c.material.opacity = opacity;
                    }
                });
            }
            if (item.mesh.position.z > 12) { disposeItem(item.mesh); activeItems.splice(i, 1); }
            continue;
        }

        if (item.type === 'bird') {
            const ph = time * 8 + item.mesh.userData.animPhase;
            if (item.mesh.userData.wingL) {
                const flap = Math.sin(ph) * 0.55 + Math.sin(ph * 2) * 0.15;
                item.mesh.userData.wingL.rotation.z = flap;
                item.mesh.userData.wingR.rotation.z = -flap;
            }
            item.mesh.position.y += Math.sin(time * 3.5 + item.mesh.userData.animPhase) * 0.004;
        }

        if (item.type === 'goldticket') {
            item.mesh.rotation.y += delta * 3;
            item.mesh.position.y = 0.7 + Math.sin(time * 3) * 0.15;
        }

        if (item.type === 'racket') {
            item.mesh.rotation.y += delta * 2.5;
            item.mesh.position.y = 0.5 + Math.sin(time * 2.5) * 0.15;
        }

        if (item.type === 'walker') {
            const wph = time * 6 + item.mesh.userData.animPhase;
            const ud = item.mesh.userData;
            if (ud.armL) ud.armL.rotation.x = -Math.sin(wph) * 0.4;
            if (ud.armR) ud.armR.rotation.x = Math.sin(wph) * 0.4;
            if (ud.legL) ud.legL.rotation.x = Math.sin(wph) * 0.5;
            if (ud.legR) ud.legR.rotation.x = -Math.sin(wph) * 0.5;
            if(!isCutscene) item.mesh.position.z += ud.walkSpeed;
        }

        if (item.mesh.position.z > 12) { disposeItem(item.mesh); activeItems.splice(i, 1); continue; }

        if (isCutscene) continue; // No collisions during cutscene

        const closeZ = Math.abs(item.mesh.position.z - playerGroup.position.z) < 1.05;
        if (!closeZ) continue;
        const sameLane = (item.type === 'hedge') ? true : Math.abs(playerGroup.position.x - item.mesh.position.x) < 1.0;
        if (!sameLane) continue;

        if (item.type === 'ball') {
            disposeItem(item.mesh); activeItems.splice(i, 1);
            const pts = multiplierActive ? 100 : 50;
            score += pts;
            // Weighted speed boost: stronger at low score, weaker at high score
            speedBoost += BOOST_MAX * (BOOST_SCORE_HALF / (BOOST_SCORE_HALF + score));
            scoreValEl.textContent = score; flashScore();
            continue;
        }
        if (item.type === 'icecream' || item.type === 'goldticket' || item.type === 'racket') {
            disposeItem(item.mesh); activeItems.splice(i, 1);
            multiplierActive = true; multiplierTimer = 10;
            score += 100;
            // Stronger weighted boost for special collectibles
            speedBoost += BOOST_MAX * 1.5 * (BOOST_SCORE_HALF / (BOOST_SCORE_HALF + score));
            scoreValEl.textContent = score; flashScore();
            continue;
        }

        let hit = false;
        if (item.type === 'bird') hit = (playerGroup.position.y + 3.84 * playerGroup.scale.y) > item.mesh.position.y - 0.25;
        if (item.type === 'hedge') hit = jumpOffset < 1.2;
        if (item.type === 'walker') hit = jumpOffset < 1.8;

        if (hit) {
            disposeItem(item.mesh); activeItems.splice(i, 1);
            const now = clock.getElapsedTime();
            const isDouble = (now - lastHitTime) < STUMBLE_WINDOW && lastHitTime > 0;
            lastHitTime = now;
            score = Math.max(0, score - (isDouble ? DOUBLE_PENALTY : SINGLE_PENALTY));
            scoreValEl.textContent = score; flashScore();
            stumbleTimer = isDouble ? DOUBLE_SLOW_DURATION : SINGLE_SLOW_DURATION;
            stumbleSpeedMult = isDouble ? DOUBLE_SLOW_MULT : SINGLE_SLOW_MULT;
            // Immediate speed reduction on collision
            gameSpeed *= isDouble ? 0.5 : 0.7;
            speedBoost = 0; // lose accumulated boost
            flashHit(true);
        }
    }

    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
        renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
        camera.aspect = canvas.clientWidth / canvas.clientHeight; camera.updateProjectionMatrix();
    }
    renderer.render(scene, camera);
}
animate();
</script>
