<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash to the Match</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --wim-green: #00563f;
            --wim-purple: #4a2c7a;
            --amex-blue: #006fcf;
            --gold: #c9a84c;
            --gold-light: #f0d070;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: #050505;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            font-family: 'Georgia', 'Times New Roman', serif;
            user-select: none; overflow: hidden;
        }
        #game-container {
            height: 100vh; width: auto; aspect-ratio: 9/16; max-width: 100vw;
            position: relative; overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            container-type: size;
        }
        #webgl-canvas {
            width: 100%; height: 100%; display: block;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* ── Score HUD (Grey rounded card, chunky outlined arcade-style numbers) ── */
        #score-hud {
            position: absolute; top: 4%; left: 5%;
            width: 19cqw;           /* fixed width — does not stretch with score length */
            min-height: 13.5cqw;    /* fixed height — does not jump when multiplier toggles */
            text-align: left;
            display: flex; flex-direction: column; align-items: flex-start;
            background: rgba(168, 168, 168, 0.55);
            border-radius: 1.6cqw;
            padding: 1.2cqw 1.6cqw;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            filter: drop-shadow(0 0.5cqw 1.5cqw rgba(0,0,0,0.30));
            overflow: hidden;
        }
        #score-label {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.7cqw;
            font-weight: 900; letter-spacing: 0.22cqw;
            text-transform: uppercase;
            color: #ffffff;
            -webkit-text-stroke: 0.18cqw #000;
            paint-order: stroke fill;
            margin-bottom: 0.2cqw;
        }
        #score-val {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 5.2cqw;
            font-weight: 900; line-height: 1;
            color: #ffffff;
            -webkit-text-stroke: 0.42cqw #000;
            paint-order: stroke fill;
            transition: color 0.2s ease, transform 0.2s ease;
            letter-spacing: 0.05cqw;
            white-space: nowrap;
        }

        @keyframes flashGold {
            0%   { color: #ffffff; transform: scale(1); }
            50%  { color: #ffd700; transform: scale(1.2); }
            100% { color: #ffffff; transform: scale(1); }
        }
        .score-flash {
            animation: flashGold 0.3s ease-out;
        }

        #score-hud.x2-active #score-val { color: #40e0ff; }

        /* Multiplier always reserves its row so the box height never changes */
        #multiplier-text {
            visibility: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.8cqw; font-weight: 900;
            letter-spacing: 0.18cqw;
            color: #ffffff;
            -webkit-text-stroke: 0.18cqw #000;
            paint-order: stroke fill;
            margin-top: 0.2cqw;
            line-height: 1;
        }
        #score-hud.x2-active #multiplier-text { visibility: visible; }

        /* ── Analogue Clock (Thick black outline pie chart) ── */
        #clock-hud {
            position: absolute; top: 2%; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
            filter: drop-shadow(0 0.5cqw 1.2cqw rgba(0,0,0,0.35));
            transition: all 0.3s ease;
        }
        #clock-svg {
            width: 17cqw;
            height: 17cqw;
            overflow: visible;
        }
        #clock-face-bg { fill: #a8a8a8; }
        #clock-elapsed-wedge { fill: #ffffff; }
        #clock-outer-ring {
            fill: none;
            stroke: #000000;
            stroke-width: 4;
        }

        #clock-hud.danger #clock-elapsed-wedge { fill: #ff4444; }
        #clock-hud.danger #clock-outer-ring { stroke: #ff0000; }

        @keyframes clockShake {
            0%   { transform: translateX(-50%) rotate(0deg);   filter: drop-shadow(0 0.5cqw 3cqw rgba(255,0,0,0.9)); }
            20%  { transform: translateX(-55%) rotate(-8deg); }
            40%  { transform: translateX(-45%) rotate(8deg); }
            60%  { transform: translateX(-53%) rotate(-5deg); }
            80%  { transform: translateX(-47%) rotate(5deg); }
            100% { transform: translateX(-50%) rotate(0deg);   filter: drop-shadow(0 0.5cqw 1.2cqw rgba(0,0,0,0.35)); }
        }
        #clock-hud.clock-hit {
            animation: clockShake 0.4s ease-in-out;
        }
        #clock-hud.clock-hit #clock-outer-ring { stroke: #ff0000; }
        #clock-hud.clock-hit #clock-elapsed-wedge { fill: #ff4444; }

        /* Countdown number in centre of clock for the final 5 seconds */
        #clock-countdown {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 5.2cqw;          /* matches the score number */
            font-weight: 900;
            line-height: 1;
            color: #ffffff;
            -webkit-text-stroke: 0.42cqw #000;
            paint-order: stroke fill;
            pointer-events: none;
            opacity: 0;
        }
        @keyframes countdownPulse {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
        }
        #clock-countdown.tick {
            animation: countdownPulse 1s ease-out forwards;
        }

        /* ── Bottom Progress Bar ── */
        #bottom-progress {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 0 12% 5cqw;
            pointer-events: none;
        }
        #progress-stage-labels {
            position: relative; height: 3.5cqw; margin-bottom: 1.5cqw;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.4cqw; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.15cqw;
            color: rgba(255,255,255,0.60);
        }
        /* Double Stacked Labels */
        #progress-stage-labels span {
            position: absolute;
            transform: translateX(-50%);
            text-align: center;
            line-height: 1.1;
        }
        #progress-track {
            position: relative; height: 1.2cqw;
            background: rgba(255,255,255,0.25);
            border-radius: 1cqw; overflow: visible;
        }
        #progress-fill {
            position: absolute; top: 0; left: 0;
            height: 100%; width: 0%;
            background: #ffffff;
            border-radius: 1cqw; transition: width 0.25s ease;
        }
        .stage-pip {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 2.8cqw; height: 2.8cqw; border-radius: 50%;
            background: rgba(255,255,255,0.30);
            border: 0.4cqw solid rgba(255,255,255,0.50);
            transition: background 0.35s, border-color 0.35s;
        }
        .stage-pip.reached {
            background: #ffffff; border-color: #ffffff;
            box-shadow: 0 0 1.5cqw rgba(255,255,255,0.8);
        }

        #action-indicator {
            position: absolute; bottom: 16%; left: 50%; transform: translateX(-50%);
            font-size: 3cqw; font-weight:800; letter-spacing: 0.5cqw;
            color: #fff; text-transform: uppercase; opacity:0;
            transition: opacity 0.15s; text-shadow: 0 0 3cqw rgba(255,255,255,0.8);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            pointer-events: none;
        }

        /* INTRO / END SCREENS */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            background: rgba(74,44,122,0.6);
        }
        #intro-overlay.visible { opacity: 1; pointer-events: auto; }
        #intro-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900; font-size: 11cqw;
            color: #ffffff; text-transform: uppercase; letter-spacing: 0.6cqw;
            text-align: center; line-height: 1.15; text-shadow: 0 0.5cqw 3cqw rgba(0,0,0,0.6);
        }
        #intro-subtitle {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400;
            font-size: 2.5cqw; color: rgba(255,255,255,0.7);
            text-transform: uppercase; letter-spacing: 0.5cqw; margin-top: 2cqw;
            max-width: 80%; text-align: center; line-height: 1.3;
        }
        #countdown-ring { margin-top: 6cqw; width: 10cqw; height: 10cqw; }
        #countdown-ring circle { fill: none; stroke-width: 3; }
        #countdown-ring .ring-bg { stroke: rgba(255,255,255,0.15); }
        #countdown-ring .ring-fg {
            stroke: #ffffff; stroke-linecap: round;
            transform: rotate(-90deg); transform-origin: center;
            transition: stroke-dashoffset 0.05s linear;
        }

        /* Blurred transparent end screen */
        .end-screen {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: auto; z-index: 100; text-align: center; padding: 5%;
        }
        .end-screen h1 {
            margin: 0 0 4%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900; font-size: 11cqw; color: #ffffff;
            text-transform: uppercase; letter-spacing: 0.6cqw; line-height: 1.15;
            text-shadow: 0 0.5cqw 3cqw rgba(0,0,0,0.6);
        }
        .end-screen .end-score {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400;
            font-size: 3cqw; color: rgba(255,255,255,0.7);
            text-transform: uppercase; letter-spacing: 0.8cqw; margin-bottom: 6cqw;
        }
        .end-screen .end-score span {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: 900; color: #ffffff; font-size: 9cqw;
            display: block; margin-top: 1.5cqw; letter-spacing: 0.2cqw;
            text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.8);
        }
        .end-btn {
            margin-top: 5cqw; padding: 3cqw 8cqw; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 3cqw; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.6cqw; background: transparent; color: white;
            border: 0.4cqw solid rgba(255,255,255,0.6); border-radius: 8cqw;
            cursor: pointer; transition: all 0.2s;
        }
        .end-btn:hover { background: rgba(255,255,255,0.3); border-color: #fff; }

        #victory-screen { display: none; opacity: 0; transition: opacity 1.5s ease; }
        #victory-screen.fade-in { display: flex; opacity: 1; }

        /* ── Body Tracking Preview ── */
        #pose-preview {
            position: absolute; bottom: 8%; right: 3%;
            width: 22cqw; aspect-ratio: 4/3;
            border: 0.4cqw solid rgba(255,255,255,0.4); border-radius: 1.5cqw;
            overflow: hidden; z-index: 60; pointer-events: none;
            box-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.4);
        }
        #pose-canvas {
            width: 100%; height: 100%; display: block;
            transform: scaleX(-1); /* mirror */
        }
        #pose-video { display: none; }
        #pose-label {
            position: absolute; bottom: 0.5cqw; left: 0; width: 100%;
            text-align: center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.8cqw; font-weight: 700; color: #44ff88;
            letter-spacing: 0.2cqw; text-transform: uppercase;
            text-shadow: 0 0.2cqw 0.8cqw rgba(0,0,0,0.8);
        }

        /* ── Debug Overlay (toggle with 'p') ── */
        #debug-panel {
            position: absolute;
            top: 10%; right: 5%;
            min-width: 18.5cqw;
            padding: 1.15cqw 1.5cqw;
            background: rgba(0, 0, 0, 0.55);
            border: 0.17cqw solid rgba(255,255,255,0.20);
            border-radius: 0.92cqw;
            font-family: 'Courier New', Consolas, monospace;
            font-size: 1.6cqw;
            line-height: 1.55;
            color: #44ff88;
            text-transform: uppercase;
            letter-spacing: 0.05cqw;
            z-index: 70;
            pointer-events: none;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            transform: scale(1.2);              /* 20 % bigger overall */
            transform-origin: top right;        /* anchor scales the panel inward from the top-right corner */
        }
        #debug-panel .debug-row {
            display: flex; justify-content: space-between; gap: 1.4cqw;
        }
        #debug-panel .debug-label {
            color: rgba(255,255,255,0.55); font-weight: 700;
        }
        #debug-panel .debug-warn { color: #ffaa00; }
        #debug-panel .debug-bad  { color: #ff4444; }
        /* Interactive controls (BASE stepper, SPAWN toggles) need to override the
           panel-level pointer-events: none so they remain clickable. */
        #debug-panel button {
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 700;
            letter-spacing: 0.05cqw;
            color: #44ff88;
            background: rgba(255,255,255,0.08);
            border: 0.13cqw solid rgba(255,255,255,0.15);
            border-radius: 0.4cqw;
            padding: 0.05cqw 0.55cqw;
            min-width: 1.6cqw;
            cursor: pointer;
            text-transform: uppercase;
            pointer-events: auto;
            transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
        }
        #debug-panel button:hover { background: rgba(255,255,255,0.18); }
        #debug-panel button.is-disabled {
            opacity: 0.30; cursor: not-allowed;
        }
        #debug-panel button.is-disabled:hover { background: rgba(255,255,255,0.08); }
        #debug-panel .debug-stepper {
            display: inline-flex; gap: 0.4cqw; align-items: center;
        }
        #debug-panel .debug-stepper #dbg-base {
            min-width: 2.6cqw; text-align: center; color: #44ff88;
        }
        #debug-panel .debug-toggles {
            display: inline-flex; gap: 0.3cqw; flex-wrap: wrap; justify-content: flex-end;
        }
        #debug-panel .dbg-toggle.off {
            color: #ff7766;
            background: rgba(255,68,68,0.10);
            border-color: rgba(255,68,68,0.30);
        }
        /* SPAWNS matrix — 4-column grid: [type label][Q][H][G]. Each data cell is
           a compact stepper rendered via .debug-mini-stepper. */
        #debug-panel .debug-spawns-section {
            margin-top: 0.5cqw;
            padding-top: 0.5cqw;
            border-top: 0.13cqw dashed rgba(255,255,255,0.20);
        }
        #debug-panel .debug-spawns-grid {
            display: grid;
            grid-template-columns: 4cqw repeat(3, 1fr);
            column-gap: 0.5cqw;
            row-gap: 0.25cqw;
            align-items: center;
        }
        #debug-panel .dsc-h {
            text-align: center;
            color: rgba(255,255,255,0.55);
            font-weight: 700;
            font-size: 0.85em;
        }
        #debug-panel .debug-mini-stepper {
            display: inline-flex;
            gap: 0.15cqw;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        #debug-panel .debug-mini-stepper button {
            min-width: 1.3cqw;
            padding: 0.02cqw 0.35cqw;
            font-size: 0.85em;
        }
        #debug-panel .debug-mini-stepper .mini-val {
            min-width: 1.6cqw;
            text-align: center;
            color: #44ff88;
            font-variant-numeric: tabular-nums;
        }
        /* ── Position HUD (Top-right grey circle, "POSITION 1ST") ── */
        #position-hud {
            position: absolute; top: 4%; right: 5%;
            width: 13.5cqw; height: 13.5cqw;
            border-radius: 50%;
            background: rgba(168, 168, 168, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            filter: drop-shadow(0 0.5cqw 1.5cqw rgba(0,0,0,0.30));
            line-height: 1;
        }
        #position-label {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.4cqw; font-weight: 900;
            letter-spacing: 0.18cqw;
            color: #ffffff;
            -webkit-text-stroke: 0.13cqw #000;
            paint-order: stroke fill;
            text-transform: uppercase;
            margin-bottom: 0.4cqw;
        }
        #position-val {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 4.6cqw; font-weight: 900;
            color: #ffffff;
            -webkit-text-stroke: 0.38cqw #000;
            paint-order: stroke fill;
            line-height: 1;
            position: relative;          /* anchor for the absolutely-positioned ST */
            display: inline-block;       /* width = width of "1" only, so flex centers the 1 */
        }
        #position-val sup {
            position: absolute;
            left: 100%;                  /* sits just to the right of the "1" */
            top: 0;
            font-size: 0.45em;
            font-weight: 900;
            margin-left: 0.15cqw;
            -webkit-text-stroke: 0.22cqw #000;
            paint-order: stroke fill;
            line-height: 1;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div id="score-hud">
            <span id="score-label">SCORE</span>
            <div id="score-val">0</div>
            <span id="multiplier-text">× 2</span>
        </div>

        <div id="clock-hud">
            <svg id="clock-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle id="clock-face-bg" cx="50" cy="50" r="46"/>
                <path id="clock-elapsed-wedge" d="M 50 50 L 50 4 A 46 46 0 0 1 50 4 Z"/>
                <circle id="clock-outer-ring" cx="50" cy="50" r="46"/>
            </svg>
            <div id="clock-countdown"></div>
        </div>

        <div id="position-hud">
            <div id="position-label">POSITION</div>
            <div id="position-val">1<sup>ST</sup></div>
        </div>

        <div id="debug-panel" style="display: none;">
            <div class="debug-row"><span class="debug-label">FPS</span><span id="dbg-fps">--</span></div>
            <div class="debug-row"><span class="debug-label">DRAWS</span><span id="dbg-draws">--</span></div>
            <div class="debug-row"><span class="debug-label">TRIS</span><span id="dbg-tris">--</span></div>
            <div class="debug-row"><span class="debug-label">MP LAT</span><span id="dbg-mp">-- ms</span></div>
            <div class="debug-row"><span class="debug-label">SPEED</span><span id="dbg-spd">--</span></div>
            <div class="debug-row"><span class="debug-label">CONST</span><span id="dbg-const">--</span></div>
            <div class="debug-row">
                <span class="debug-label">BASE</span>
                <span class="debug-stepper">
                    <button type="button" id="dbg-base-down" title="Decrease base speed (paused only)">−</button>
                    <span id="dbg-base">1.00</span>
                    <button type="button" id="dbg-base-up" title="Increase base speed (paused only)">+</button>
                </span>
            </div>
            <div class="debug-row">
                <span class="debug-label">SPAWN</span>
                <span class="debug-toggles">
                    <button type="button" id="dbg-spawn-walker" class="dbg-toggle" title="Toggle walker spawning">WALK</button>
                    <button type="button" id="dbg-spawn-hedge"  class="dbg-toggle" title="Toggle hedge spawning">HEDGE</button>
                    <button type="button" id="dbg-spawn-bird"   class="dbg-toggle" title="Toggle bird spawning">BIRD</button>
                </span>
            </div>
            <div class="debug-spawns-section">
                <div class="debug-spawns-grid" id="dbg-spawn-counts-grid"><!-- populated by JS --></div>
            </div>
        </div>

        <div id="action-indicator"></div>

        <div id="bottom-progress">
            <div id="progress-stage-labels">
                <span style="left: 0%;">THE<br>QUEUE</span>
                <span style="left: 33.33%;">THE<br>HILL</span>
                <span style="left: 66.66%;">THE<br>GROUNDS</span>
                <span style="left: 100%;">CENTRE<br>COURT</span>
            </div>
            <div id="progress-track">
                <div id="progress-fill"></div>
                <div class="stage-pip" id="pip-0" style="left:0%"></div>
                <div class="stage-pip" id="pip-1" style="left:33.33%"></div>
                <div class="stage-pip" id="pip-2" style="left:66.66%"></div>
                <div class="stage-pip" id="pip-3" style="left:100%"></div>
            </div>
        </div>
    </div>

    <div id="intro-overlay">
        <div id="intro-title">DASH TO<br>THE MATCH</div>
        <div id="intro-subtitle"> </div>
        <svg id="countdown-ring" viewBox="0 0 52 52">
            <circle class="ring-bg" cx="26" cy="26" r="23"/>
            <circle class="ring-fg" id="ring-progress" cx="26" cy="26" r="23" stroke-dasharray="144.51" stroke-dashoffset="0"/>
        </svg>
    </div>

    <div id="game-over-screen" class="end-screen">
        <h1>TIME'S UP</h1>
        <div class="end-score">Final Score<span id="final-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>

    <div id="victory-screen" class="end-screen">
        <h1>YOU MADE IT!</h1>
        <div class="end-score">CENTRE COURT AWAITS<span id="victory-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>

    <video id="pose-video" width="320" height="240" autoplay playsinline></video>
    <div id="pose-preview">
        <canvas id="pose-canvas" width="320" height="240"></canvas>
        <div id="pose-label">Starting cam…</div>
    </div>
</div>

<script>
if (typeof THREE === 'undefined') { throw new Error('Three.js failed to load.'); }

// ─── THREE SETUP ───────────────────────────────────────────────────────────────
const canvas   = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    powerPreference: 'high-performance', // ask the browser for the discrete/perf GPU on hybrid systems
    stencil: false                       // we never read/write the stencil buffer
});
// Touch devices typically report devicePixelRatio 2-3. Capping at 1.25 there cuts
// rasterised pixel count ~30-44% versus the previous 1.5 cap with no perceivable
// difference at phone-viewing distance. Desktop/laptop users sit closer to bigger
// displays so we keep 1.5 there.
const _isTouchDevice = (typeof matchMedia === 'function') && matchMedia('(pointer: coarse)').matches;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, _isTouchDevice ? 1.25 : 1.5));
renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
renderer.setClearColor(0xeae0d0, 1);
renderer.shadowMap.enabled = true;
// BasicShadowMap is ~3-5× cheaper per shadow texel than PCFShadowMap. With only the
// player casting shadows (see enableShadows below) the lack of soft edges is barely
// perceptible against the stylised flat-shaded ground.
renderer.shadowMap.type = THREE.BasicShadowMap;

const scene  = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xd8d4c8, 0.0035);

const camera = new THREE.PerspectiveCamera(62, canvas.clientWidth / canvas.clientHeight, 0.5, 800);
camera.position.set(0, 7.5, 12);
camera.lookAt(0, 2.5, -5);

// ─── GRADIENT SKY DOME ────────────────────────────────────────────────────────
const skyUniforms = {
    topColor:    { value: new THREE.Color(0x6ea4c8) },
    bottomColor: { value: new THREE.Color(0xffe4b8) },
    offset:      { value: 28 },
    exponent:    { value: 0.55 }
};
const skyMaterial = new THREE.ShaderMaterial({
    uniforms: skyUniforms,
    vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vWorldPosition = worldPosition.xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        uniform float offset;
        uniform float exponent;
        varying vec3 vWorldPosition;
        void main() {
            float h = normalize(vWorldPosition + offset).y;
            float t = max(pow(max(h, 0.0), exponent), 0.0);
            gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
        }
    `,
    side: THREE.BackSide,
    depthWrite: false
});
const skyDome = new THREE.Mesh(new THREE.SphereGeometry(500, 32, 16), skyMaterial);
scene.add(skyDome);

const ambientLight = new THREE.AmbientLight(0xcadeed, 0.7); scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffd9a8, 0.85);
dirLight.position.set(-25, 18, 8);
dirLight.castShadow = true;
// Only the player casts shadows. The previous frustum (56×145 units) wasted ~95%
// of the shadow map on empty track. Tightening it ~3× and halving mapSize from
// 1024² to 512² actually *increases* shadow texel density on the player while
// rendering 4× fewer texels per frame.
dirLight.shadow.mapSize.set(512, 512);
dirLight.shadow.bias = -0.0008;
dirLight.shadow.normalBias = 0.02;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far  = 80;     // was 250
dirLight.shadow.camera.left = -10;    // was -28
dirLight.shadow.camera.right = 10;    // was 28
dirLight.shadow.camera.top = 25;      // was 120 — wildly oversized for a single caster
dirLight.shadow.camera.bottom = -12;  // was -25
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xb8d0e8, 0.25);
fillLight.position.set(20, 30, -10);
scene.add(fillLight);

function enableShadows(obj) {
    // Receive-only — only the player casts shadows in this build (perf optimisation).
    // The explicit `false` is important: it overrides any cast=true set by the builders
    // that pass their group through this function (walker, stadium, trophy, bird, banner).
    obj.traverse(c => { if (c.isMesh) { c.castShadow = false; c.receiveShadow = true; } });
}

// ─── TEXTURES ─────────────────────────────────────────────────────────────────
function makeHatBandTex() {
    const c = document.createElement('canvas'); c.width = 512; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1a2044'; ctx.fillRect(0, 0, 512, 128);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 20, 512, 88);
    ctx.fillStyle = '#00563f'; ctx.fillRect(0, 40, 512, 48);
    ctx.fillStyle = '#e5d5c1';
    ctx.beginPath(); ctx.arc(256, 64, 32, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1a2044'; ctx.lineWidth = 4; ctx.stroke();
    ctx.strokeStyle = '#00563f'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(244, 52); ctx.lineTo(268, 76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(268, 52); ctx.lineTo(244, 76); ctx.stroke();
    return new THREE.CanvasTexture(c);
}
function makeTennisTex() {
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#cfdb1c'; ctx.fillRect(0,0,128,128);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.arc(0,64,44,-Math.PI/2,Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(128,64,44,Math.PI/2,3*Math.PI/2); ctx.stroke();
    return new THREE.CanvasTexture(c);
}

const hatBandTex = makeHatBandTex();
const tennisTex  = makeTennisTex();

// ─── EXTENDED ENVIRONMENT ─────────────────────────────────────────────────────
const trackMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(8.5, 2000),
    // PERF: Lambert ≈ 3-4× cheaper fragment shader than Standard, and the difference
    // is invisible on a single-colour matte plane.
    new THREE.MeshLambertMaterial({ color: 0x3d8a35 })
);
trackMesh.rotation.x = -Math.PI/2;
trackMesh.position.z = -900;
trackMesh.receiveShadow = true; scene.add(trackMesh);

const purpleLineMat = new THREE.MeshBasicMaterial({ color: 0x4a2c7a });
[-4.1, 4.1].forEach(x => {
    const pl = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 2000), purpleLineMat);
    pl.rotation.x = -Math.PI/2;
    pl.position.set(x, 0.025, -900);
    scene.add(pl);
});

const grassMat = new THREE.MeshLambertMaterial({ color: 0x3d8a35 }); // was Standard, swapped for fragment-shader cost
const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(200, 2000), grassMat);
groundMesh.rotation.x = -Math.PI/2;
groundMesh.position.set(0, -0.01, -900);
groundMesh.receiveShadow = true; scene.add(groundMesh);

const standMat = new THREE.MeshLambertMaterial({ color: 0x1e4a18 });
const standMeshes = [];
for (let tier = 0; tier < 4; tier++) {
    const th = 2.2, td = 2.8;
    const yBase = tier * th + 0.5;
    const xL = -14.5 - tier * td, xR = 14.5 + tier * td;
    [[xL, Math.PI/6],[xR,-Math.PI/6]].forEach(([x, ry]) => {
        const s = new THREE.Mesh(new THREE.BoxGeometry(td, th, 2000), standMat);
        s.position.set(x, yBase-th/2, -900); s.receiveShadow = true; scene.add(s);
        standMeshes.push(s);
    });
}
standMeshes.forEach(s => { s.visible = false; });

// PERF: Trees are spawned ~92 rows × 9 meshes ≈ 828 instances. Lambert here is one
// of the biggest single fragment-shader savings in the build.
const treeTrunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3520 });
const treeLeafMats = [
    new THREE.MeshLambertMaterial({ color: 0x2d5a1e }),
    new THREE.MeshLambertMaterial({ color: 0x3a6828 }),
    new THREE.MeshLambertMaterial({ color: 0x1e4a15 }),
];
// PERF: Tree size used to vary by allocating a fresh CylinderGeometry/SphereGeometry
// per tree (treeH/canopyR were the constructor args). With ~92 rows × 9 meshes that's
// 828 unique geometry uploads. Now we use a single unit-sized geometry per role and
// encode the random size in the mesh's .scale — visually identical, three GPU uploads
// total instead of 828.
const _treeTrunkGeo = new THREE.CylinderGeometry(0.25, 0.4, 1, 6);    // unit-height, scale.y per tree
const _treeCanopyGeo = new THREE.SphereGeometry(1, 8, 6);              // unit-radius, uniform scale per tree
const _treeCanopySmGeo = new THREE.SphereGeometry(1, 6, 5);            // smaller secondary canopy
const queueTreeRows = [];
function createTreeRow(xCenter, z) {
    const group = new THREE.Group();
    const offsets = [-3.5, 0, 3.5];
    offsets.forEach(dx => {
        const leafMat = treeLeafMats[Math.floor(Math.random() * treeLeafMats.length)];
        const treeH = 5.5 + Math.random() * 3;
        const canopyR = 2.2 + Math.random() * 1.2;
        const trunkH = treeH * 0.45;
        const trunk = new THREE.Mesh(_treeTrunkGeo, treeTrunkMat);
        trunk.scale.y = trunkH;
        trunk.position.set(dx + (Math.random()-0.5)*1.5, treeH * 0.22, (Math.random()-0.5)*2);
        group.add(trunk);
        const canopy = new THREE.Mesh(_treeCanopyGeo, leafMat);
        canopy.scale.set(canopyR, canopyR * 0.8, canopyR);   // y-flatten retained from original
        canopy.position.set(trunk.position.x, treeH * 0.55 + canopyR * 0.4, trunk.position.z);
        group.add(canopy);
        const c2r = canopyR * 0.6;
        const c2 = new THREE.Mesh(_treeCanopySmGeo, leafMat);
        c2.scale.setScalar(c2r);
        c2.position.set(trunk.position.x + (Math.random()-0.5)*canopyR, canopy.position.y - canopyR * 0.3, trunk.position.z + (Math.random()-0.5)*1.5);
        group.add(c2);
    });
    group.position.set(xCenter, 0, z); scene.add(group); group.visible = true;
    return { group };
}
for (let z = -800; z < 40; z += 18) {
    queueTreeRows.push(createTreeRow(-18.5, z));
    queueTreeRows.push(createTreeRow(18.5, z));
}

// ─── PARALLAX SCENERY ─────────────────────────────────────────────────────────
// PERF: 48 parallax courts × 2 Habbo players × 7 meshes ≈ 672 mini-Habbo meshes.
const miniSkin    = new THREE.MeshLambertMaterial({ color: 0xfcdab7 });
const miniWhite   = new THREE.MeshLambertMaterial({ color: 0xffffff });
const miniRacket  = new THREE.MeshLambertMaterial({ color: 0x333333 });

// PERF: Each call to buildHabboPlayer used to allocate 7 fresh geometries; with 96
// calls (48 courts × 2 players) that's 672 redundant geometry uploads to the GPU.
// Sharing collapses them to 7 total. Same materials too (already module-scope).
const _habHeadGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
const _habBodyGeo = new THREE.BoxGeometry(0.2, 0.25, 0.15);
const _habLegGeo  = new THREE.BoxGeometry(0.08, 0.15, 0.08);
const _habArmGeo  = new THREE.BoxGeometry(0.06, 0.2, 0.06);
const _habHandleGeo = new THREE.BoxGeometry(0.03, 0.15, 0.03);
const _habHeadRGeo  = new THREE.TorusGeometry(0.07, 0.015, 4, 12);
function buildHabboPlayer() {
    const g = new THREE.Group();
    const head = new THREE.Mesh(_habHeadGeo, miniSkin); head.position.y = 0.4; g.add(head);
    const body = new THREE.Mesh(_habBodyGeo, miniWhite); body.position.y = 0.15; g.add(body);
    const legL = new THREE.Mesh(_habLegGeo, miniSkin); legL.position.set(-0.05, -0.05, 0); g.add(legL);
    const legR = new THREE.Mesh(_habLegGeo, miniSkin); legR.position.set(0.05, -0.05, 0); g.add(legR);
    const arm = new THREE.Mesh(_habArmGeo, miniSkin); arm.position.set(0.15, 0.15, 0); arm.rotation.z = -Math.PI/4; g.add(arm);
    const handle = new THREE.Mesh(_habHandleGeo, miniRacket); handle.position.set(0.25, 0.05, 0); handle.rotation.z = -Math.PI/4; g.add(handle);
    const headR = new THREE.Mesh(_habHeadRGeo, miniRacket); headR.position.set(0.31, -0.01, 0); headR.rotation.x = Math.PI/2; g.add(headR);
    return g;
}

const bystanderColors = [0xff5555, 0x5588dd, 0x44aa66, 0xddaa33, 0xcc66aa, 0xffffff, 0x8866bb, 0xee8844, 0x66aacc, 0x334455, 0xaa4466];
const skinTones = [0xfcdab7, 0xf0c8a0, 0xd4a574, 0xc68c53, 0xa0714a, 0x8d5524, 0x6b3f23, 0x4a2912];
const panamaStrawMat = new THREE.MeshLambertMaterial({ color: 0xf5e6c8 });
const panamaBandMat  = new THREE.MeshLambertMaterial({ color: 0x1a1a3a });

function buildBystander(facingX, withHat) {
    const g = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: skinTones[Math.floor(Math.random() * skinTones.length)] });
    const clothesMat = new THREE.MeshStandardMaterial({ color: bystanderColors[Math.floor(Math.random()*bystanderColors.length)] });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.10, 8, 6), skinMat); head.position.y = 0.42; g.add(head);
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.07, 0.25, 8), clothesMat); body.position.y = 0.22; g.add(body);
    const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.025, 0.15, 6), skinMat); legL.position.set(-0.04, 0.02, 0); g.add(legL);
    const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.025, 0.15, 6), skinMat); legR.position.set(0.04, 0.02, 0); g.add(legR);
    if (withHat) {
        const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.15, 0.02, 10), panamaStrawMat); brim.position.y = 0.52; g.add(brim);
        const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 0.07, 10), panamaStrawMat); crown.position.y = 0.57; g.add(crown);
        const band = new THREE.Mesh(new THREE.CylinderGeometry(0.091, 0.091, 0.02, 10), panamaBandMat); band.position.y = 0.535; g.add(band);
    }
    g.rotation.y = facingX > 0 ? Math.PI / 2 : -Math.PI / 2; return g;
}

function buildSimpleTent() {
    const g = new THREE.Group();
    const tentColors = [0x3366aa, 0xcc4444, 0x2288aa, 0xdd8833, 0x55aa55];
    const col = tentColors[Math.floor(Math.random() * tentColors.length)];
    const fabricMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.9 });
    const tentGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.4, 3, 1, false, 0, Math.PI);
    const tent = new THREE.Mesh(tentGeo, fabricMat);
    tent.rotation.z = Math.PI / 2; tent.position.y = 0.3; g.add(tent);
    return g;
}

const staticTents = [];
[-220, -450].forEach((zPos, index) => {
    const tent = buildSimpleTent();
    tent.position.set(index === 0 ? -12 : 12, 0, zPos);
    tent.rotation.y = index === 0 ? Math.PI/4 : -Math.PI/4;
    scene.add(tent); staticTents.push(tent);
});

const parasolColors = [0xee4444, 0x3377cc, 0xeecc33, 0x44aa55, 0xdd6699, 0xffffff, 0x8855cc];
function buildParasol() {
    const g = new THREE.Group();
    const col = parasolColors[Math.floor(Math.random() * parasolColors.length)];
    const canopyMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.8, side: THREE.DoubleSide });
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5 });
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.65, 4), poleMat); pole.position.y = 0.325; g.add(pole);
    const canopy = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.12, 8), canopyMat); canopy.position.y = 0.65; canopy.rotation.x = Math.PI; g.add(canopy);
    return g;
}

// Shared geometry/materials for the instanced bystanders (queue stage).
// Splitting out skin vs clothing instances lets us colour each independently
// while keeping draw calls minimal.
const _byHeadGeo  = new THREE.SphereGeometry(0.10, 8, 6);
const _byBodyGeo  = new THREE.CylinderGeometry(0.09, 0.07, 0.25, 8);
const _byLegGeo   = new THREE.CylinderGeometry(0.03, 0.025, 0.15, 6);
const _byHatBGeo  = new THREE.CylinderGeometry(0.14, 0.15, 0.02, 10);
const _byHatCGeo  = new THREE.CylinderGeometry(0.07, 0.09, 0.07, 10);
const _byHatBdGeo = new THREE.CylinderGeometry(0.091, 0.091, 0.02, 10);
const _bySkinMat  = new THREE.MeshLambertMaterial({ vertexColors: false });
const _byClothMat = new THREE.MeshLambertMaterial({ vertexColors: false });
const _byParPole  = new THREE.CylinderGeometry(0.015, 0.015, 0.65, 4);
const _byParCanGeo= new THREE.ConeGeometry(0.35, 0.12, 8);
const _byParPoleMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
const _byParCanMat  = new THREE.MeshLambertMaterial({ side: THREE.DoubleSide });

function createQueueCluster(x, z) {
    const group = new THREE.Group(); const facingX = x;
    const numPeople = 15 + Math.floor(Math.random() * 8);
    const queueLength = 9;
    const yRot = facingX > 0 ? Math.PI / 2 : -Math.PI / 2;

    // Pre-roll which slots get hats and parasols so we can size the InstancedMeshes exactly.
    const slots = [];
    let hatCount = 0, parasolCount = 0;
    for (let p = 0; p < numPeople; p++) {
        const t = p / numPeople;
        const pz = -queueLength / 2 + t * queueLength;
        const px = Math.sin(t * Math.PI * 2.5) * 1.5 + (Math.random() - 0.5) * 1.8;
        const wearHat   = Math.random() < 0.2;
        const hasParasol = Math.random() < 0.2;
        const personRot = (Math.random() - 0.5) * 0.4;
        const skinHex   = skinTones[Math.floor(Math.random() * skinTones.length)];
        const clothHex  = bystanderColors[Math.floor(Math.random() * bystanderColors.length)];
        const parasolHex= parasolColors[Math.floor(Math.random() * parasolColors.length)];
        slots.push({ px, pz, wearHat, hasParasol, personRot, skinHex, clothHex, parasolHex });
        if (wearHat)    hatCount++;
        if (hasParasol) parasolCount++;
    }

    // Per-cluster InstancedMesh — bodies are coloured per-instance (cloth, skin, parasol).
    // Two legs per person → leg count = numPeople * 2.
    const head  = new THREE.InstancedMesh(_byHeadGeo,  _bySkinMat,  numPeople);
    const body  = new THREE.InstancedMesh(_byBodyGeo,  _byClothMat, numPeople);
    const legs  = new THREE.InstancedMesh(_byLegGeo,   _bySkinMat,  numPeople * 2);
    head.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(numPeople * 3),     3);
    body.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(numPeople * 3),     3);
    legs.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(numPeople * 2 * 3), 3);
    head.instanceMatrix.setUsage(THREE.StaticDrawUsage);
    body.instanceMatrix.setUsage(THREE.StaticDrawUsage);
    legs.instanceMatrix.setUsage(THREE.StaticDrawUsage);

    let hatBrim = null, hatCrown = null, hatBand = null;
    if (hatCount > 0) {
        hatBrim  = new THREE.InstancedMesh(_byHatBGeo,  panamaStrawMat, hatCount);
        hatCrown = new THREE.InstancedMesh(_byHatCGeo,  panamaStrawMat, hatCount);
        hatBand  = new THREE.InstancedMesh(_byHatBdGeo, panamaBandMat,  hatCount);
        hatBrim.instanceMatrix.setUsage(THREE.StaticDrawUsage);
        hatCrown.instanceMatrix.setUsage(THREE.StaticDrawUsage);
        hatBand.instanceMatrix.setUsage(THREE.StaticDrawUsage);
    }
    let parPole = null, parCanopy = null;
    if (parasolCount > 0) {
        parPole   = new THREE.InstancedMesh(_byParPole,   _byParPoleMat, parasolCount);
        parCanopy = new THREE.InstancedMesh(_byParCanGeo, _byParCanMat,  parasolCount);
        parCanopy.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(parasolCount * 3), 3);
        parPole.instanceMatrix.setUsage(THREE.StaticDrawUsage);
        parCanopy.instanceMatrix.setUsage(THREE.StaticDrawUsage);
    }

    // Bake instance matrices. People are rotated about Y so they "face" the path —
    // we apply the rotation here once instead of attaching it to a parent Group.
    const _m = new THREE.Matrix4(); const _q = new THREE.Quaternion(); const _v = new THREE.Vector3();
    const _s = new THREE.Vector3(1, 1, 1); const _c = new THREE.Color();
    let hatIdx = 0, parIdx = 0;
    for (let i = 0; i < slots.length; i++) {
        const s = slots[i];
        const totalRot = yRot + s.personRot;
        _q.setFromAxisAngle(new THREE.Vector3(0, 1, 0), totalRot);

        // Person base = (px, 0.15, pz). Body offsets are local and rotated into place.
        // For cylindrical body parts that are vertical, rotation about Y is a no-op on geometry,
        // so for bodies/heads we can just translate. Legs are at (±0.04, 0.02, 0) local — these
        // need rotating because their X-offset changes after Y-rotation.
        _v.set(s.px, 0.15 + 0.42, s.pz); _m.compose(_v, _q, _s); head.setMatrixAt(i, _m);
        _v.set(s.px, 0.15 + 0.22, s.pz); _m.compose(_v, _q, _s); body.setMatrixAt(i, _m);

        const cosR = Math.cos(totalRot), sinR = Math.sin(totalRot);
        const lx1 = -0.04, lz1 = 0;
        const lx2 =  0.04, lz2 = 0;
        _v.set(s.px + lx1*cosR + lz1*sinR, 0.15 + 0.02, s.pz - lx1*sinR + lz1*cosR);
        _m.compose(_v, _q, _s); legs.setMatrixAt(i*2, _m);
        _v.set(s.px + lx2*cosR + lz2*sinR, 0.15 + 0.02, s.pz - lx2*sinR + lz2*cosR);
        _m.compose(_v, _q, _s); legs.setMatrixAt(i*2 + 1, _m);

        _c.setHex(s.skinHex);  head.setColorAt(i, _c); legs.setColorAt(i*2, _c); legs.setColorAt(i*2+1, _c);
        _c.setHex(s.clothHex); body.setColorAt(i, _c);

        if (s.wearHat) {
            _v.set(s.px, 0.15 + 0.52, s.pz); _m.compose(_v, _q, _s); hatBrim.setMatrixAt(hatIdx, _m);
            _v.set(s.px, 0.15 + 0.57, s.pz); _m.compose(_v, _q, _s); hatCrown.setMatrixAt(hatIdx, _m);
            _v.set(s.px, 0.15 + 0.535, s.pz); _m.compose(_v, _q, _s); hatBand.setMatrixAt(hatIdx, _m);
            hatIdx++;
        }
        if (s.hasParasol) {
            const ppx = s.px + 0.15;
            _v.set(ppx, 0 + 0.325, s.pz); _m.compose(_v, _q, _s); parPole.setMatrixAt(parIdx, _m);
            // Canopy mesh has rotation.x = π baked in by .compose with quaternion-based rotation,
            // so add a separate quaternion that includes the flip about X.
            const _qFlip = new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI, totalRot, 0));
            _v.set(ppx, 0 + 0.65, s.pz); _m.compose(_v, _qFlip, _s); parCanopy.setMatrixAt(parIdx, _m);
            _c.setHex(s.parasolHex); parCanopy.setColorAt(parIdx, _c);
            parIdx++;
        }

    const _pts = [];

    for (let i = 0; i <= _segs; i++) {

        const pz = -_spacing/2 + t * _spacing;
        const sag = 0.18 * (4 * t * (1 - t));
        _pts.push(new THREE.Vector3(0, 0.95 - sag, pz));

// ─── PERF: freeze static children's local matrices ────────────────────────────
// Every Object3D defaults to matrixAutoUpdate=true, so three.js recomputes its
// local matrix every frame regardless of whether it's actually moved. This scene
// has ~4000 Object3Ds (rope barriers alone are 336 groups × 7 meshes = 2352), and
// almost none of them move relative to their parent. Setting matrixAutoUpdate=false
// after a one-shot updateMatrix() cuts that work down to just the parents that
// actually animate (parallax groups, the player rig, the stadium during its rise,
// active obstacles).
function freezeStaticChildren(group) {
    group.traverse(c => {
        if (c === group) return;       // parent group still animates (parallax z, etc.)
        c.updateMatrix();               // bake the current local transform once
        c.matrixAutoUpdate = false;     // skip the per-frame recompute from now on
    });
}

function buildOverheadBanner(stageBannerName) {

    const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 1024, 256);
    ctx.fillStyle = '#00563f'; ctx.fillRect(0, 0, 1024, 20); ctx.fillRect(0, 236, 1024, 20);

    let fontSize = 110; ctx.font = `900 ${fontSize}px "Georgia", "Times New Roman", serif`;
    const text = stageBannerName.toUpperCase();
    while (ctx.measureText(text).width > 900 && fontSize > 40) {
        fontSize -= 5; ctx.font = `900 ${fontSize}px "Georgia", "Times New Roman", serif`;
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, 512, 128);
    const tex = new THREE.CanvasTexture(canvas); tex.needsUpdate = true;
    const bMatFront = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });

let stageObstacles = [];

function initStageObstacles(stageIdx) {
    stageObstacles = [];
    nextObstacleIdx = 0;
    if (stageIdx >= OBSTACLE_COUNTS.length) return;  // Centre Court has no scripted obstacles

    const cfg = OBSTACLE_COUNTS[stageIdx];
    const stageDur = STAGES[stageIdx].duration;
    const isQueue = stageIdx === 0;

    // Spread N items evenly across [t0, t1] (inclusive at both ends when N>1).
    function distribute(n, t0, t1) {
        if (n <= 0) return [];
        if (n === 1) return [t0];
        const step = (t1 - t0) / (n - 1);
        const out = [];
        for (let i = 0; i < n; i++) out.push(t0 + i * step);
        return out;
    }

    if (isQueue) {
        // Queue keeps explicit tutorial cues so newcomers always see DUCK before JUMP
        // at the same beat regardless of how the user has tuned the counts. Anything
        // beyond the tutorial pair is distributed across the back half of the stage.
        if (cfg.bird >= 1) {
            stageObstacles.push({ time: 7.0, type: 'bird', lane: 1, tut: 'DUCK!' });
        }
        if (cfg.hedge >= 1) {
            stageObstacles.push({ time: 13.0, type: 'hedge', lane: 1, tut: 'JUMP!' });
        }
        // Extras after the tutorials.
        distribute(Math.max(0, cfg.bird - 1), 15.0, stageDur - 1.0).forEach(t => {
            stageObstacles.push({ time: t, type: 'bird', lane: Math.floor(Math.random() * 3) });
        });
        distribute(Math.max(0, cfg.hedge - 1), 15.5, stageDur - 1.0).forEach(t => {
            stageObstacles.push({ time: t, type: 'hedge', lane: 1 });
        });
        distribute(cfg.walker, 2.0, stageDur - 1.0).forEach(t => {
            stageObstacles.push({ time: t, type: 'walker', lane: Math.floor(Math.random() * 3) });
        });
    } else {
        // Hill / Grounds — straightforward even distribution. Hedges stay in the
        // centre lane (their geometry spans wider than a single lane); walkers and
        // birds get random lanes for variety.
        distribute(cfg.walker, 1.5, stageDur - 1.0).forEach(t => {
            stageObstacles.push({ time: t, type: 'walker', lane: Math.floor(Math.random() * 3) });
        });
        distribute(cfg.hedge, 4.0, stageDur - 1.0).forEach(t => {
            stageObstacles.push({ time: t, type: 'hedge', lane: 1 });
        });
        distribute(cfg.bird, 4.0, stageDur - 1.0).forEach(t => {
            stageObstacles.push({ time: t, type: 'bird', lane: Math.floor(Math.random() * 3) });
        });
    }

    // Ensure all timed elements spawn in sequence order
    stageObstacles.sort((a, b) => a.time - b.time);

    // 1. Spacing pass: Enforce a minimum 0.6s gap between any two obstacles
    for (let i = 1; i < stageObstacles.length; i++) {
        if (stageObstacles[i].time - stageObstacles[i - 1].time < 0.6) {
            stageObstacles[i].time = stageObstacles[i - 1].time + 0.6;
        }
    }

    // 2. Lane-conflict pass: Ensure no walker is in lane 1 within ±0.8s of a hedge
    for (let i = 0; i < stageObstacles.length; i++) {
        let obs = stageObstacles[i];
        if (obs.type === 'hedge') {
            for (let j = 0; j < stageObstacles.length; j++) {
                if (i === j) continue;
                let other = stageObstacles[j];
                if (other.type === 'walker' && Math.abs(other.time - obs.time) < 0.8) {
                    if (other.lane === 1) {
                        // Re-roll lane to 0 or 2
                        other.lane = Math.random() < 0.5 ? 0 : 2;
                    }
                }
            }
        }
    }

    // Re-sort just to be safe after adjustments
    stageObstacles.sort((a, b) => a.time - b.time);
}

    cere.rotation.x = Math.PI / 2;
    cere.position.set(0, 0, 0.04);
    
    const upperBeak = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15, 8), SharedMat.hawkBeak);
    upperBeak.rotation.x = Math.PI / 2 + 0.2; // Curve downwards

    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.015, 6, 6), SharedMat.hawkBeak);

    eyeR.position.set(0.12, 0.14, 0.45);

    const eyeL = new THREE.Group();
    const scleraL = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), SharedMat.hawkCere);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.015, 6, 6), SharedMat.hawkBeak);
    pupilL.position.x = -0.01;
    eyeL.add(scleraL, pupilL);
    eyeL.position.set(-0.12, 0.14, 0.45);
    
    g.add(eyeR, eyeL);

    // Wings (Broader, Harris Hawk style with distinctive rufous shoulders)
    function makeWing(side) { 
        const wg = new THREE.Group(); 
        
        // Rufous shoulder
        const shoulder = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.06, 0.3), SharedMat.hawkRufous);
        shoulder.position.set(side * 0.15, 0, 0.1);

        wg.add(shoulder, main);
        
        wg.position.set(side * 0.1, 0.05, 0); 
        wg.rotation.y = side * -0.1; // Swept back
        return wg; 
    }
    const wingL = makeWing(-1); const wingR = makeWing(1); 
    g.add(wingL, wingR);

    g.scale.set(1.4, 1.4, 1.4);
    
    wrapper.add(g);
    wrapper.userData.wingL = wingL; 
    wrapper.userData.wingR = wingR;
    enableShadows(wrapper); 
    return wrapper;
}

// ── 3D Floating Tutorial UI Helper ──
function createTutorialUI(text, isDuck) {
    const group = new THREE.Group();

    // Red tracking line across entire track width (8.5 units) 
    // Laid flat on ground 18 units ahead of obstacle. Red with a deeper red glow shadow.
    // Bar is 3x thicker than the original (32 → 96 px on a 128 px canvas) so it reads
    // as a substantial CTA marker on the ground rather than a thin line.
    const lineCanvas = document.createElement('canvas');
    lineCanvas.width = 1024; lineCanvas.height = 128;
    const lctx = lineCanvas.getContext('2d');
    lctx.shadowColor = '#ff0000'; lctx.shadowBlur = 30;
    lctx.fillStyle = '#ff0000';
    lctx.fillRect(64, 16, 896, 96);
    lctx.shadowBlur = 15; 
    lctx.fillRect(64, 16, 896, 96);
    
    const lineTex = new THREE.CanvasTexture(lineCanvas);
    const lineMat = new THREE.MeshBasicMaterial({ map: lineTex, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });
    
    const line = new THREE.Mesh(new THREE.PlaneGeometry(8.5, 1.0), lineMat);
    line.rotation.x = -Math.PI / 2;
    // Push the line 18 units ahead (towards the player camera)
    line.position.set(0, 0.05, 18); 
    group.add(line);

    // Render Canvas Text + directional arrow as a single sprite.
    // Layout: top half of the canvas hosts the arrow, bottom half hosts the text.
    // Arrow direction comes from the `isDuck` flag — DUCK points down, JUMP points up —
    // so both tutorials share the same sprite geometry, only the arrow flips.
    // Canvas width still adapts to text length so character size stays constant.
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const fontSpec = '900 140px "Helvetica Neue", Helvetica, sans-serif';

    // First measure the text at the chosen font (using a temp size — measureText is independent of canvas dimensions)
    ctx.font = fontSpec;
    const measuredW = ctx.measureText(text).width;

    const SIDE_PAD = 90; // outline / shadow breathing room
    const MIN_W = 512;
    canvas.width = Math.max(MIN_W, Math.ceil(measuredW + SIDE_PAD));
    canvas.height = 512; // doubled (was 256) — top half: arrow, bottom half: text

    // Re-apply state (resizing the canvas resets it)
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    // ── Arrow (top half, centred at y=128) ─────────────────────────────────
    // Chunky red arrow with black drop-shadow, double-painted to match the
    // text styling. `pointsDown` flips the geometry around its centre.
    const ARROW_CY = 128;
    const SHAFT_W = 60, SHAFT_H = 100;   // shaft body
    const HEAD_W  = 200, HEAD_H = 90;    // arrow head (wings + tip)
    const cx = canvas.width / 2;
    const sign = isDuck ? 1 : -1;        // +y = down on canvas; DUCK points down
    function arrowPath() {
        ctx.beginPath();
        // Shaft top edge
        ctx.moveTo(cx - SHAFT_W/2, ARROW_CY - sign * SHAFT_H/2);
        ctx.lineTo(cx + SHAFT_W/2, ARROW_CY - sign * SHAFT_H/2);
        // Down to head shoulder (right)
        ctx.lineTo(cx + SHAFT_W/2, ARROW_CY + sign * SHAFT_H/2);
        // Out to right wing
        ctx.lineTo(cx + HEAD_W/2,  ARROW_CY + sign * SHAFT_H/2);
        // Diagonal in to tip
        ctx.lineTo(cx,             ARROW_CY + sign * (SHAFT_H/2 + HEAD_H));
        // Diagonal out to left wing
        ctx.lineTo(cx - HEAD_W/2,  ARROW_CY + sign * SHAFT_H/2);
        // Back to shaft (left)
        ctx.lineTo(cx - SHAFT_W/2, ARROW_CY + sign * SHAFT_H/2);
        ctx.closePath();
    }
    ctx.shadowColor = '#000000'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff0000';
    arrowPath(); ctx.fill();
    ctx.shadowBlur = 0;
    arrowPath(); ctx.fill();

    // ── Text (bottom half, centred at y=384) ──────────────────────────────
    ctx.font = fontSpec;
    ctx.shadowColor = '#000000'; ctx.shadowBlur = 20; // Black outline shadow to ensure pop against sky/grass
    ctx.fillStyle = '#ff0000'; // Bold red
    ctx.fillText(text, canvas.width / 2, 384);
    ctx.shadowBlur = 0; ctx.fillStyle = '#ff0000'; ctx.fillText(text, canvas.width / 2, 384);

    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: tex, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
    const sprite = new THREE.Sprite(spriteMat);

    // Keep world-units-per-canvas-pixel constant so character size on screen does not change with text length.
    // Reference baseline: 512×256 canvas → 3.9×1.95 world (units-per-pixel = 0.007617).
    // Sprite X is clamped to 8.0 world units so it never overhangs the 8.5-wide track.
    const UPP = 1.95 / 256;
    let spriteW = canvas.width * UPP;
    const spriteH = canvas.height * UPP; // 3.9 (canvas is now 512 tall)
    const MAX_SPRITE_W = 8.0;
    if (spriteW > MAX_SPRITE_W) spriteW = MAX_SPRITE_W;
    sprite.scale.set(spriteW, spriteH, 1);
    // Sprite centre is offset upward so the text (lower half of the sprite) lands at
    // its original world y=1.4 — preserving the tutorial reading position. The arrow
    // then appears above it. Offset = quarter of new sprite height = spriteH/4.
    sprite.position.set(0, 1.4 + spriteH / 4, 18);

    group.add(sprite);

    group.visible = false;
    group.userData.isTutorialUI = true;
    return group;
}
