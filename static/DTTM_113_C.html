const scoreValEl    = document.getElementById('score-val');
const scoreHudEl    = document.getElementById('score-hud');
const actionInd     = document.getElementById('action-indicator');
const clockHud      = document.getElementById('clock-hud');
const clockArmGroup = null; // legacy — clock now uses an SVG pie wedge (see updateClockWedge)
const clockWedgeEl  = document.getElementById('clock-elapsed-wedge');
const clockCountdownEl = document.getElementById('clock-countdown');
let lastCountdownInt = -1;
const progressFill  = document.getElementById('progress-fill');
const pipEls        = document.querySelectorAll('.stage-pip');

// Update the elapsed-time pie wedge (grows clockwise from 12 o'clock as time passes)
function updateClockWedge(angleDeg) {
    if (!clockWedgeEl) return;
    if (angleDeg <= 0.01) {
        clockWedgeEl.setAttribute('d', '');
        return;
    }
    if (angleDeg >= 359.99) {
        // Render as a full circle (two semicircular arcs) when fully elapsed
        clockWedgeEl.setAttribute('d', 'M 50 50 m -46 0 a 46 46 0 1 0 92 0 a 46 46 0 1 0 -92 0 Z');
        return;
    }
    const rad = angleDeg * Math.PI / 180;
    const r = 46;
    const endX = 50 + r * Math.sin(rad);
    const endY = 50 - r * Math.cos(rad);
    const largeArc = angleDeg > 180 ? 1 : 0;
    const d = `M 50 50 L 50 ${50 - r} A ${r} ${r} 0 ${largeArc} 1 ${endX.toFixed(3)} ${endY.toFixed(3)} Z`;
    clockWedgeEl.setAttribute('d', d);
}

function flashScore() {
    scoreValEl.classList.remove('score-flash'); void scoreValEl.offsetWidth; scoreValEl.classList.add('score-flash');
    setTimeout(() => scoreValEl.classList.remove('score-flash'), 300);
}

function updateUI() {
    scoreHudEl.classList.toggle('x2-active', multiplierActive);
    const elapsedTotal = STAGES.slice(0, currentStage).reduce((s, st) => s + st.duration, 0) + Math.max(0, stageTimer);
    const timeLeft = RACE_DURATION - elapsedTotal;

    // Lock the wedge full and clear the countdown the moment we reach the Centre
    // Court banner (currentStage advances to FINAL_STAGE_INDEX) — that's the end
    // of the timed race. The cutscene branch below handles the same thing for the
    // trophy victory state.
    const raceFinished = currentStage >= FINAL_STAGE_INDEX;

    if (isCutscene || raceFinished) {
        clockHud.classList.remove('danger');
        updateClockWedge(360);
        if (lastCountdownInt !== -1) {
            clockCountdownEl.classList.remove('tick');
            clockCountdownEl.textContent = '';
            lastCountdownInt = -1;
        }
    } else {
        if (timeLeft <= 10 && timeLeft > 0) { clockHud.classList.add('danger'); }
        else { clockHud.classList.remove('danger'); }
        const clockAngleDeg = Math.min(elapsedTotal / RACE_DURATION, 1) * 360;
        updateClockWedge(clockAngleDeg);

        // Centre-of-clock countdown for the final 5 seconds before Centre Court
        // (5,4,3,2,1 — each pops once). Math.ceil() naturally tops out at 1 as
        // timeLeft approaches zero, then the > 0 guard clears the digit at the
        // exact moment the stage advances.
        if (timeLeft > 0 && timeLeft <= 5) {
            const remaining = Math.ceil(timeLeft);
            if (remaining !== lastCountdownInt) {
                clockCountdownEl.textContent = remaining;
                clockCountdownEl.classList.remove('tick');
                void clockCountdownEl.offsetWidth; // force reflow so animation restarts
                clockCountdownEl.classList.add('tick');
                lastCountdownInt = remaining;
            }
        } else if (lastCountdownInt !== -1) {
            clockCountdownEl.classList.remove('tick');
            clockCountdownEl.textContent = '';
            lastCountdownInt = -1;
        }
    }

    let pct = 0;
    if (currentStage === 0) pct = Math.min(1, stageTimer / STAGES[0].duration) * 33.33;
    else if (currentStage === 1) pct = 33.33 + Math.min(1, stageTimer / STAGES[1].duration) * 33.33;
    else if (currentStage === 2) pct = 66.66 + Math.min(1, stageTimer / STAGES[2].duration) * 33.33;
    else pct = 100;

    if (progressFill) progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
    if (pipEls && pipEls.length) pipEls.forEach((pip, i) => pip.classList.toggle('reached', currentStage >= i));
}

// ─── STAGE PROGRESSION ─────────────────────────────────────────────────────────
function setParallaxVisibility(stage) {
    const showQueue = (stage === 0);
    parallaxQueue.forEach(q => { q.group.visible = showQueue; });
    queueTreeRows.forEach(t => { t.group.visible = showQueue; });
    staticTents.forEach(t => { t.visible = showQueue; });

    const showHill = (stage === 1);
    parallaxHill.forEach(h => { h.group.visible = showHill; });
    skylineMeshes.forEach(s => { s.visible = showHill; });

    cloudMeshes.forEach(c => { c.visible = true; });

    const showCourts = (stage >= 2);
    parallaxCourts.forEach(c => { c.group.visible = showCourts; });
    skylineStadiumMeshes.forEach(s => { s.visible = false; });
    standMeshes.forEach(s => { s.visible = (stage >= 2); });

    standCrowdSparseIM.visible = (stage === 2);
    standCrowdDenseIM.visible = (stage === 3);

    const showRopes = (stage === 3);
    ropeBarriers.forEach(r => { r.group.visible = showRopes; });
}

function startStage() {
    document.body.style.cursor = 'none';
    gameSpeed = BASE_SPEED;
    stageTimer = 0; nextBannerSpawned = false; gameActive = true;
    nextCollectTime = 0;
    initStageObstacles(currentStage);
    setParallaxVisibility(currentStage);
    updateUI();

    if (currentStage === 0) {
        const queueBanner = buildOverheadBanner(STAGES[0].bannerName);
        queueBanner.position.z = -40; scene.add(queueBanner); activeItems.push({ mesh: queueBanner, type: 'banner', active: true });
    }
}

function advanceStage() {
    currentStage++; stageTimer = 0; nextCollectTime = 0;
    initStageObstacles(currentStage);
}

// ── Tracking state shared with the body-tracking IIFE ──
// `ready` gates the start countdown; `skip` triggers the keyboard-only fallback.
const trackingState = {
    ready: false,
    skip: false,
    message: 'Starting camera…',
    calibProgress: 0,   // 0..1 — drives the ring during setup
};
if (typeof Pose === 'undefined') {
    trackingState.skip = true;
    trackingState.ready = true;
    trackingState.message = 'Keyboard only — no pose library';
}

const introOverlay  = document.getElementById('intro-overlay');
const introSubtitle = document.getElementById('intro-subtitle');
introOverlay.classList.add('visible');
const ringProgress = document.getElementById('ring-progress');
const RING_CIRC = 144.51;
ringProgress.setAttribute('stroke-dashoffset', String(RING_CIRC));

let countdownStart = 0;
function tickRing(now) {
    if (!trackingState.ready) {
        // Setup phase: subtitle = framing hint, ring fills as calibration progresses
        introSubtitle.textContent = trackingState.message;
        ringProgress.setAttribute('stroke-dashoffset', String(RING_CIRC * (1 - trackingState.calibProgress)));
        requestAnimationFrame(tickRing);
        return;
    }
    // Go-countdown phase: 2-second ring fill
    if (countdownStart === 0) {
        countdownStart = now;
        introSubtitle.textContent = trackingState.skip ? 'Use arrow keys' : 'Get ready!';
    }
    const progress = Math.min((now - countdownStart) / 2000, 1);
    ringProgress.setAttribute('stroke-dashoffset', String(RING_CIRC * (1 - progress)));
    if (progress < 1) requestAnimationFrame(tickRing);
    else { introOverlay.classList.remove('visible'); setTimeout(() => { startStage(); }, 520); }
}
requestAnimationFrame(tickRing);

// ─── FINAL CUTSCENE LOGIC ─────────────────────────────────────────────────────
function startCutscene() {
    document.body.style.cursor = 'default';
    SoundFX.playCrowd(); SoundFX.playTrophyChime();
    isCutscene = true; gameSpeed = 0; trophyCollected = true; flashScore();
    if (cupMesh) {
        scene.remove(cupMesh); cupMesh.position.set(0, 4.8, 0); cupMesh.scale.setScalar(0.55); cupMesh.rotation.set(0, 0, 0); playerGroup.add(cupMesh);
    }
    const CONFETTI_COUNT = 300;
    const confettiMat = new THREE.MeshBasicMaterial({ color: 0xffd700, side: THREE.DoubleSide });
    const confettiIM = new THREE.InstancedMesh(SharedGeo.confettiPlane, confettiMat, CONFETTI_COUNT);
    const confettiData = new Array(CONFETTI_COUNT);
    const _m4 = new THREE.Matrix4(); const entranceZ = stadiumGroup.position.z + 6.3 * 0.55;
    for (let i = 0; i < CONFETTI_COUNT; i++) {
        const x = (Math.random()-0.5) * 14; const y = 6 + Math.random() * 14; const z = playerGroup.position.z - Math.random() * Math.abs(entranceZ);
        const rX = Math.random()*Math.PI*2, rY = Math.random()*Math.PI*2;
        _m4.makeRotationFromEuler(new THREE.Euler(rX, rY, 0)); _m4.setPosition(x, y, z); confettiIM.setMatrixAt(i, _m4);
        confettiData[i] = { x, y, z, rX, rY, vY: -1.5 - Math.random()*3, vX: (Math.random()-0.5)*2, drX: Math.random()*0.8, drY: Math.random()*0.8 };
    }
    confettiIM.instanceMatrix.needsUpdate = true; confettiIM.userData.data = confettiData; confettiGroup = confettiIM; scene.add(confettiGroup);
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
function togglePause() {
    if (!gameActive) return;
    if (isCutscene || (currentStage === FINAL_STAGE_INDEX && cupSpawned)) return;
    isPaused = !isPaused;
    document.body.style.cursor = isPaused ? 'default' : 'none';
    if (isPaused) { actionInd.textContent = "PAUSED"; actionInd.style.opacity = '1'; }
    else { actionInd.style.opacity = '0'; }
}

window.addEventListener('click', e => {
    if (e.target.tagName === 'BUTTON') return;
    togglePause();
});
window.addEventListener('keydown', e => {
    // Space toggles pause regardless of current pause state — must run before the isPaused early-return below
    if (e.code === 'Space') { e.preventDefault(); togglePause(); return; }
    if (!gameActive || isCutscene || isPaused) return;
    if (e.code === 'ArrowLeft'  && currentLaneIndex > 0) { currentLaneIndex--; e.preventDefault(); }
    if (e.code === 'ArrowRight' && currentLaneIndex < 2) { currentLaneIndex++; e.preventDefault(); }
    if (e.code === 'ArrowUp'    && !isJumping && !isDucking) { isJumping = true; jumpVel = JUMP_FORCE; e.preventDefault(); }
    if (e.code === 'ArrowDown'  && !isJumping) { isDucking = true; e.preventDefault(); }
});
window.addEventListener('keyup', e => { if (e.code === 'ArrowDown') isDucking = false; });

let tx0 = 0, ty0 = 0, tt0 = 0, duckTimeout = null;
canvas.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; tt0 = Date.now(); }, { passive: true });
canvas.addEventListener('touchend', e => {
    if (!gameActive || isCutscene || isPaused) return;
    const dx = e.changedTouches[0].clientX - tx0, dy = e.changedTouches[0].clientY - ty0, dt = Date.now() - tt0;
    if (dt > 600) return;
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx < -25 && currentLaneIndex > 0) currentLaneIndex--; if (dx >  25 && currentLaneIndex < 2) currentLaneIndex++;
    } else {
        if (dy < -25 && !isJumping && !isDucking) { isJumping = true; jumpVel = JUMP_FORCE; }
        if (dy >  25 && !isJumping) { isDucking = true; clearTimeout(duckTimeout); duckTimeout = setTimeout(() => { isDucking = false; }, 550); }
    }
}, { passive: true });

// ─── BODY TRACKING (MediaPipe Pose) ───────────────────────────────────────────
(function initBodyTracking() {
    const poseVideo  = document.getElementById('pose-video');
    const poseCanvas = document.getElementById('pose-canvas');
    const poseCtx    = poseCanvas.getContext('2d');
    const poseLabel  = document.getElementById('pose-label');

    // ── Detection params ──
    // Thresholds are expressed as fractions of the player's apparent body height
    // (shoulder-to-hip vertical distance), so they're distance-invariant.
    const JUMP_FRAC      = 0.18;   // jump  = body moved up   by 18% of body height
    const DUCK_FRAC      = 0.22;   // duck  = body moved down by 22% of body height
    const JUMP_COOLDOWN  = 600;    // ms between successive jumps
    const BASELINE_DRIFT = 0.018;  // per detection frame; absorbs slow walk-toward/away
    const LANDMARK_CONF  = 0.5;
    // Body-size guardrails (shoulder-hip distance, normalised image coords)
    const MIN_BODY_H     = 0.13;   // smaller than this = too far away
    const MAX_BODY_H     = 0.50;   // larger  than this = too close
    // Calibration
    const CALIB_SAMPLES  = 30;     // ~1 second at 30 fps
    const STABLE_FRAMES  = 8;      // consecutive good-framing frames before sampling

    // ── Per-session state ──
    let calibY = [], calibH = [];
    let baselineY = 0, baselineH = 0;
    let stableFrames = 0;
    let lastJumpTime = 0;
    let bodyDucking  = false;
    let triggerEnteredAt = 0;   // ms timestamp; 0 = currently in neutral zone

    if (typeof Pose === 'undefined') {
        poseLabel.textContent = 'No pose lib';
        // trackingState.skip already set at module init
        setTimeout(() => { const preview = document.getElementById('pose-preview'); if (preview) { preview.style.transition = 'opacity 1s ease'; preview.style.opacity = '0'; } }, 3000);
        return;
    }

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onPoseResults);

    function resetCalibration() {
        calibY = []; calibH = []; stableFrames = 0; trackingState.calibProgress = 0;
    }

    function onPoseResults(results) {
        // Debug: round-trip latency (send -> result callback)
        if (debugStats.mpSentAt > 0) debugStats.mpLatency = performance.now() - debugStats.mpSentAt;

        poseCtx.save(); poseCtx.clearRect(0, 0, 320, 240); poseCtx.drawImage(results.image, 0, 0, 320, 240); poseCtx.restore();

        if (!results.poseLandmarks) {
            if (!trackingState.ready) { trackingState.message = 'Step into frame'; resetCalibration(); }
            return;
        }
        const lm = results.poseLandmarks;
        const lShoulder = lm[11], rShoulder = lm[12], lHip = lm[23], rHip = lm[24];
        if (!lShoulder || !rShoulder || !lHip || !rHip) return;
        if (lShoulder.visibility < LANDMARK_CONF || rShoulder.visibility < LANDMARK_CONF
         || lHip.visibility      < LANDMARK_CONF || rHip.visibility      < LANDMARK_CONF) {
            if (!trackingState.ready) { trackingState.message = 'Show your full upper body'; resetCalibration(); }
            return;
        }

        const comX       = (lShoulder.x + rShoulder.x + lHip.x + rHip.x) / 4;
        const comY       = (lShoulder.y + rShoulder.y + lHip.y + rHip.y) / 4;
        const shoulderY  = (lShoulder.y + rShoulder.y) / 2;
        const hipY       = (lHip.y + rHip.y) / 2;
        const bodyHeight = Math.abs(hipY - shoulderY);

        // Centre dot in the preview
        poseCtx.fillStyle = '#44ff88';
        poseCtx.beginPath(); poseCtx.arc(comX * 320, comY * 240, 6, 0, Math.PI * 2); poseCtx.fill();

        // ── Setup / calibration phase ──
        // Game can't start until we get CALIB_SAMPLES of good-framing data in a row.
        // Any framing problem (too far / too close / off-centre / partial body) resets
        // the buffer and shows a specific hint in the intro subtitle.
        if (!trackingState.ready) {
            if (bodyHeight < MIN_BODY_H) {
                trackingState.message = 'Step closer to the camera'; resetCalibration();
            } else if (bodyHeight > MAX_BODY_H) {
                trackingState.message = 'Step back from the camera'; resetCalibration();
            } else if (comX < 0.25 || comX > 0.75) {
                trackingState.message = 'Centre yourself in the frame'; resetCalibration();
            } else {
                stableFrames++;
                if (stableFrames < STABLE_FRAMES) {
                    trackingState.message = 'Hold still…';
                    trackingState.calibProgress = 0;
                } else {
                    calibY.push(comY); calibH.push(bodyHeight);
                    trackingState.calibProgress = Math.min(calibY.length / CALIB_SAMPLES, 1);
                    trackingState.message = 'Calibrating — stand naturally';
                    if (calibY.length >= CALIB_SAMPLES) {
                        baselineY = calibY.reduce((a, b) => a + b, 0) / calibY.length;
                        baselineH = calibH.reduce((a, b) => a + b, 0) / calibH.length;
                        trackingState.ready = true;
                        poseLabel.textContent = 'Tracking';
                        setTimeout(() => { poseLabel.textContent = ''; }, 1500);
                    }
                }
            }
            return;
        }

        // ── Gameplay phase ──
        if (!gameActive || isCutscene || isPaused) return;

        // Lane (mirrored X)
        const mirroredX = 1 - comX;
        if      (mirroredX < 0.38) currentLaneIndex = 0;
        else if (mirroredX > 0.62) currentLaneIndex = 2;
        else                       currentLaneIndex = 1;

        // Distance hint on the preview (informational, not a trigger)
        if      (bodyHeight < MIN_BODY_H * 0.85) poseLabel.textContent = 'Too far';
        else if (bodyHeight > MAX_BODY_H * 1.15) poseLabel.textContent = 'Too close';
        else if (poseLabel.textContent === 'Too far' || poseLabel.textContent === 'Too close') poseLabel.textContent = '';

        // Body-height-normalised detection — distance-invariant
        const safeBodyH = Math.max(baselineH, 0.05);
        const normDelta = (baselineY - comY) / safeBodyH;   // +ve = body up, -ve = body down

        if (normDelta > JUMP_FRAC && !isJumping && !isDucking) {
            const now = performance.now();
            if (now - lastJumpTime > JUMP_COOLDOWN) { isJumping = true; jumpVel = JUMP_FORCE; lastJumpTime = now; }
        }

        const isDuckMotion = -normDelta > DUCK_FRAC;
        if (isDuckMotion && !isJumping) {
            if (!bodyDucking) { isDucking = true; bodyDucking = true; }
        } else {
            if (bodyDucking)  { isDucking = false; bodyDucking = false; }
        }

        // Slow-drifting baseline — absorbs slow walking toward/away from the camera.
        // In the neutral zone we drift normally so small posture shifts get absorbed.
        // Inside a trigger zone we hold the baseline for the first 2 seconds (so a
        // deliberate held duck still registers), then start drifting again to rescue
        // genuinely stuck states (e.g. the player has wandered far from the camera).
        const neutralZone = Math.min(JUMP_FRAC, DUCK_FRAC) * 0.4;
        const inNeutral   = Math.abs(normDelta) < neutralZone;

        if (inNeutral) {
            triggerEnteredAt = 0;
        } else if (triggerEnteredAt === 0) {
            triggerEnteredAt = performance.now();
        }

        let driftRate = 0;
        if (inNeutral) {
            driftRate = BASELINE_DRIFT;
        } else if (performance.now() - triggerEnteredAt > 2000) {
            // Held too long to be a deliberate pose — rescue at ~60% of neutral rate
            driftRate = BASELINE_DRIFT * 0.6;
        }
        if (driftRate > 0) {
            baselineY = baselineY * (1 - driftRate) + comY       * driftRate;
            baselineH = baselineH * (1 - driftRate) + bodyHeight * driftRate;
        }
    }

    navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' } })
        .then(stream => {
            poseVideo.srcObject = stream; poseVideo.play();
            poseLabel.textContent = '';
            trackingState.message = 'Step into frame';
            const cam = new Camera(poseVideo, { onFrame: async () => { debugStats.mpSentAt = performance.now(); await pose.send({ image: poseVideo }); }, width: 320, height: 240 });
            cam.start();
        })
        .catch(err => {
            poseLabel.textContent = 'No camera';
            // Fall back to keyboard-only so the game can still start
            trackingState.skip = true;
            trackingState.ready = true;
            trackingState.message = 'Keyboard only — camera unavailable';
            setTimeout(() => { const preview = document.getElementById('pose-preview'); if (preview) { preview.style.transition = 'opacity 1s ease'; preview.style.opacity = '0'; } }, 3000);
        });
})();

const _confettiM4 = new THREE.Matrix4(); const _confettiEuler = new THREE.Euler();
const _sharedGeos = new Set([...Object.values(SharedGeo), ...Object.values(WalkerLimbGeos)]);
const _sharedMats = new Set([...Object.values(SharedMat), ropeMat, ropePostMat]);

// Dispose every geometry / material / shadow map under `node` that isn't shared.
// Pulled out of disposeItem so the obstacle pools can reuse it for cleaning up
// per-spawn children (e.g. tutorial-UI subtrees) without freeing the pooled parent.
function _disposeSubtree(node) {
    node.traverse(c => {
        if (c.isMesh) {
            if (!_sharedGeos.has(c.geometry)) c.geometry.dispose();
            const mats = Array.isArray(c.material) ? c.material : [c.material];
            mats.forEach(m => { if (!_sharedMats.has(m)) { if (m.map) m.map.dispose(); m.dispose(); } });
        }
        else if (c.isSprite && c.material) {
            c.material.dispose();
        }
        if (c.isLight) { if (c.shadow && c.shadow.map) c.shadow.map.dispose(); }
    });
}

function disposeItem(mesh) {
    if (typeof BallPool   !== 'undefined' && BallPool.isPooled(mesh))   { BallPool.release(mesh);   return; }
    if (typeof HedgePool  !== 'undefined' && HedgePool.isPooled(mesh))  { HedgePool.release(mesh);  return; }
    if (typeof BirdPool   !== 'undefined' && BirdPool.isPooled(mesh))   { BirdPool.release(mesh);   return; }
    if (typeof WalkerPool !== 'undefined' && WalkerPool.isPooled(mesh)) { WalkerPool.release(mesh); return; }
    scene.remove(mesh);
    _disposeSubtree(mesh);
}

const BallPool = (() => {
    const pool = []; const POOL_SIZE = 12;
    for (let i = 0; i < POOL_SIZE; i++) {
        const m = new THREE.Mesh(SharedGeo.ball, SharedMat.ball); m.visible = false; m.position.set(0, -999, 0); scene.add(m); pool.push(m);
    }
    return {
        get() {
            for (let i = 0; i < pool.length; i++) { if (!pool[i].visible) { pool[i].visible = true; return pool[i]; } }
            const m = new THREE.Mesh(SharedGeo.ball, SharedMat.ball); scene.add(m); pool.push(m); return m;
        },
        release(mesh) { mesh.visible = false; mesh.position.set(0, -999, 0); },
        isPooled(mesh) { return pool.includes(mesh); }
    };
})();

// Generic factory for obstacle pools (Hedge / Bird / Walker).
// Mirrors BallPool: meshes are pre-built, kept in the scene graph hidden,
// and recycled on each spawn instead of being created and destroyed (which
// previously caused GC pauses). Pool grows on exhaustion.
//
// Tutorial-UI handling: when cfg.tut is set, spawnScriptedObstacle attaches
// a tutorial-UI subtree (canvas textures + sprite material — all unique to
// that spawn) as a child of the pooled mesh. The release() hook below
// detaches and disposes that subtree so its resources don't leak across
// reuses; the parent obstacle itself is preserved for the next spawn.
function makeObstaclePool(builder, initialSize) {
    const pool = [];
    for (let i = 0; i < initialSize; i++) {
        const m = builder();
        m.visible = false;
        m.position.set(0, -999, 0);
        scene.add(m);
        pool.push(m);
    }
    return {
        get() {
            for (let i = 0; i < pool.length; i++) {
                if (!pool[i].visible) { pool[i].visible = true; return pool[i]; }
            }
            // Pool exhausted — grow it. Rare in practice; sized below for peak load.
            const m = builder();
            scene.add(m);
            pool.push(m);
            return m;
        },
        release(mesh) {
            if (mesh.userData.tutUI) {
                mesh.remove(mesh.userData.tutUI);
                _disposeSubtree(mesh.userData.tutUI);
                mesh.userData.tutUI = null;
            }
            mesh.visible = false;
            mesh.position.set(0, -999, 0);
        },
        isPooled(mesh) { return pool.includes(mesh); }
    };
}

const HedgePool  = makeObstaclePool(buildHedge, 6);
const BirdPool   = makeObstaclePool(buildBird, 4);
// Walkers randomise their appearance (skin / shirt / pants / hair / hat) at
// build time, so the pre-built pool already contains a mix of looks. The
// `stage` argument is currently unused inside buildWalkerHazard, so passing
// the live currentStage value is just for forward-compat.
const WalkerPool = makeObstaclePool(() => buildWalkerHazard(currentStage), 6);

// Custom scripted obstacle spawning
function spawnScriptedObstacle(cfg) {
    // Debug-panel SPAWN toggles can suppress individual obstacle types for isolated
    // mechanic testing. The timeline still advances; this just no-ops the spawn.
    if (spawnFlags[cfg.type] === false) return;
    let mesh;
    if (cfg.type === 'hedge') {
        mesh = HedgePool.get();
        mesh.position.y = 0; // pool parks meshes at y=-999; restore the natural ground baseline
        if (cfg.tut) {
            const ui = createTutorialUI(cfg.tut, false);
            // Hedge group's own Y is 0 (only the mesh inside is offset by 0.6),
            // so no compensation is needed — let the line sit at its natural y=0.05.
            ui.position.y = 0;
            mesh.add(ui);
            mesh.userData.tutUI = ui;
        }
    } else if (cfg.type === 'bird') {
        mesh = BirdPool.get();
        mesh.position.y = 3.5;
        mesh.userData.animPhase = Math.random() * Math.PI * 2;
        if (cfg.tut) {
            const ui = createTutorialUI(cfg.tut, true);
            ui.position.y = -3.5; // Counteract the bird's world Y elevation to put the line exactly on the floor
            mesh.add(ui);
            mesh.userData.tutUI = ui;
        }
    } else if (cfg.type === 'walker') {
        mesh = WalkerPool.get();
        mesh.position.y = 0; // pool parks meshes at y=-999; walker group sits on the ground at y=0
        mesh.userData.animPhase = Math.random() * Math.PI * 2;
        mesh.userData.walkSpeed = 0.02 + Math.random() * 0.025;
    }

    mesh.position.z = -200;
    mesh.position.x = lanePositions[cfg.lane];
    // No scene.add — pooled meshes were added to the scene at pool init time.
    activeItems.push({ mesh, type: cfg.type, lane: cfg.lane, active: true });
}

// Continuous random collectables to let the player recover speed
function spawnCollectables(time) {
    if (time > nextCollectTime) {
        const isSpecial = Math.random() < 0.15;
        let type, mesh;
        if (isSpecial && !multiplierActive) {
            if (currentStage === 0) { mesh = buildGoldTicket(); type = 'goldticket'; }
            else if (currentStage === 2) { mesh = buildTennisRacket(); type = 'racket'; }
            else { mesh = buildIceCream(); type = 'icecream'; }
        } else {
            mesh = BallPool.get();
            mesh.position.y = 0.5;
            type = 'ball';
        }

        mesh.position.z = -200;
        mesh.position.x = lanePositions[Math.floor(Math.random() * 3)];
        if (type !== 'ball') scene.add(mesh);
        activeItems.push({ mesh, type, lane: 0, active: true });
        
        nextCollectTime = time + 0.8 + Math.random() * 1.0;
    }
}

function flashHit(fatal) {
    mTunic.emissive.setHex(fatal ? 0xff1010 : 0xffffff); setTimeout(() => mTunic.emissive.setHex(0x000000), fatal ? 280 : 130);
    if(fatal) { clockHud.classList.remove('clock-hit'); void clockHud.offsetWidth; clockHud.classList.add('clock-hit'); setTimeout(() => clockHud.classList.remove('clock-hit'), 400); }
}

// ─── DEBUG OVERLAY ────────────────────────────────────────────────────────────
// Shows FPS, MediaPipe pose-detection latency, and player-speed status.
// Toggle visibility with 'p'. Hidden on load.

// Frame-rate cap: rAF fires at the monitor's refresh rate (often 120/144 Hz on
// modern displays). Without a cap, light-work frames (cutscene, idle screens) run
// far above 60 FPS while the busy mid-game stays at the monitor rate or below,
// which exaggerates the perceived variance. Capping evens out the high end and
// reduces battery/CPU load. Set to a higher number (e.g. 144) to disable.
//
// NOTE: This cap is an UPPER bound only — it cannot make a sub-60 game hit 60.
// If the displayed FPS sits below FPS_CAP, the bottleneck is rendering work, not
// the gate. Look at material counts, scene-graph size, and shadow map config.
const FPS_CAP = 60;
// Use 0.92× the target interval (≈15.3ms at 60 FPS) instead of "target − 0.5ms".
// The previous tight threshold (16.166ms) could occasionally drop a legitimate
// 60Hz vblank when rAF fired a hair early due to jitter, halving frame rate
// spuriously. 0.92× leaves comfortable headroom on 60Hz while still gating
// 120/144Hz down to ~60.
const MIN_FRAME_MS = (1000 / FPS_CAP) * 0.92;
let _prevAnimateAt = 0;

const debugStats = {
    mpLatency: 0,    // ms between pose.send() and onResults callback
    mpSentAt: 0,     // timestamp of most recent pose.send()
    fpsEMA: 60,      // exponentially-smoothed FPS
    lastFrameAt: 0,  // performance.now() of previous animate() frame
    lastPanelUpdate: 0,
    prevGameSpeed: null
};
const debugPanel = document.getElementById('debug-panel');
const dbgFps     = document.getElementById('dbg-fps');
const dbgDraws   = document.getElementById('dbg-draws');
const dbgTris    = document.getElementById('dbg-tris');
const dbgMp      = document.getElementById('dbg-mp');
const dbgSpd     = document.getElementById('dbg-spd');
const dbgConst   = document.getElementById('dbg-const');
const dbgBaseEl  = document.getElementById('dbg-base');
const dbgBaseDownEl = document.getElementById('dbg-base-down');
const dbgBaseUpEl   = document.getElementById('dbg-base-up');
const dbgSpawnButtons = {
    walker: document.getElementById('dbg-spawn-walker'),
    hedge:  document.getElementById('dbg-spawn-hedge'),
    bird:   document.getElementById('dbg-spawn-bird'),
};
let debugVisible = false;

// ── BASE-speed stepper ──────────────────────────────────────────────────────
// Adjusts BASE_SPEED while paused, in 0.05 increments, clamped to a sensible range.
// Updates gameSpeed immediately so the change takes effect the moment play resumes
// (avoids surprising lerp behaviour where the new BASE wouldn't apply until the next
// stage transition or hit recovery).
const BASE_STEP = 0.05, BASE_MIN = 0.20, BASE_MAX = 2.00;
function adjustBaseSpeed(deltaVal) {
    if (!isPaused) return;
    const next = Math.max(BASE_MIN, Math.min(BASE_MAX, BASE_SPEED + deltaVal));
    BASE_SPEED = Math.round(next * 100) / 100; // avoid float drift across many clicks
    gameSpeed = BASE_SPEED;
    dbgBaseEl.textContent = BASE_SPEED.toFixed(2);
}
dbgBaseDownEl.addEventListener('click', e => { e.stopPropagation(); adjustBaseSpeed(-BASE_STEP); });
dbgBaseUpEl  .addEventListener('click', e => { e.stopPropagation(); adjustBaseSpeed( BASE_STEP); });

// ── SPAWN toggles ───────────────────────────────────────────────────────────
// Flip the spawnFlag for a type, refresh the button visual, and dispose any active
// instances of that type so the test condition kicks in instantly. Releases via
// disposeItem route through the obstacle pools (no GC, no scene-graph leak).
function setSpawnFlag(type, enabled) {
    spawnFlags[type] = enabled;
    const btn = dbgSpawnButtons[type];
    if (btn) btn.classList.toggle('off', !enabled);
    if (!enabled) {
        for (let i = activeItems.length - 1; i >= 0; i--) {
            if (activeItems[i].type === type) {
                disposeItem(activeItems[i].mesh);
                activeItems.splice(i, 1);
            }
        }
    }
}
Object.keys(dbgSpawnButtons).forEach(type => {
    const btn = dbgSpawnButtons[type];
    if (!btn) return;
    btn.addEventListener('click', e => {
        e.stopPropagation(); // don't let the click bubble to the window pause-toggle
        setSpawnFlag(type, !spawnFlags[type]);
    });
});

// ── SPAWNS count matrix (3 zones × 3 obstacle types) ─────────────────────────
// Builds the 4×4 stepper grid and wires +/- handlers to OBSTACLE_COUNTS. Counts
// take effect on the next time a stage starts; if you adjust the *current* stage
// while paused, the live timeline rebuilds so the new count is in play the moment
// you resume.
const SPAWN_TYPES_ORDER = ['walker', 'hedge', 'bird'];
const SPAWN_TYPE_LABELS = { walker: 'WALK', hedge: 'HEDGE', bird: 'BIRD' };
const SPAWN_STAGE_LABELS = ['Q', 'H', 'G'];   // Queue / Hill / Grounds
const dbgSpawnCountVals = {};                 // dbgSpawnCountVals[type][stage] = <span>

function buildSpawnCountUI() {
    const grid = document.getElementById('dbg-spawn-counts-grid');
    if (!grid) return;

    // Header row: empty corner + Q/H/G column labels.
    const corner = document.createElement('span');
    corner.className = 'debug-label'; corner.textContent = 'SPAWNS';
    grid.appendChild(corner);
    SPAWN_STAGE_LABELS.forEach(lbl => {
        const h = document.createElement('span');
        h.className = 'dsc-h'; h.textContent = lbl;
        grid.appendChild(h);
    });

    // Three data rows, one per obstacle type.
    SPAWN_TYPES_ORDER.forEach(type => {
        const rowLabel = document.createElement('span');
        rowLabel.className = 'debug-label'; rowLabel.textContent = SPAWN_TYPE_LABELS[type];
        grid.appendChild(rowLabel);

        dbgSpawnCountVals[type] = {};
        for (let stage = 0; stage < OBSTACLE_COUNTS.length; stage++) {
            const wrap = document.createElement('span');
            wrap.className = 'debug-mini-stepper';
            const down = document.createElement('button');
            down.type = 'button'; down.textContent = '−';
            down.title = `Decrease ${type} count for ${SPAWN_STAGE_LABELS[stage]}`;
            const val  = document.createElement('span');
            val.className = 'mini-val'; val.textContent = OBSTACLE_COUNTS[stage][type];
            const up = document.createElement('button');
            up.type = 'button'; up.textContent = '+';
            up.title = `Increase ${type} count for ${SPAWN_STAGE_LABELS[stage]}`;
            wrap.append(down, val, up);
            grid.appendChild(wrap);

            dbgSpawnCountVals[type][stage] = val;
            // Capture stage/type per-click handler. stopPropagation keeps the click
            // from bubbling up to the window-level pause toggle.
            down.addEventListener('click', e => { e.stopPropagation(); adjustObstacleCount(stage, type, -1); });
            up.addEventListener('click',   e => { e.stopPropagation(); adjustObstacleCount(stage, type, +1); });
        }
    });
}

function adjustObstacleCount(stage, type, delta) {
    const [lo, hi] = OBSTACLE_LIMITS[type];
    const cur = OBSTACLE_COUNTS[stage][type];
    const next = Math.max(lo, Math.min(hi, cur + delta));
    if (next === cur) return;
    OBSTACLE_COUNTS[stage][type] = next;
    if (dbgSpawnCountVals[type] && dbgSpawnCountVals[type][stage]) {
        dbgSpawnCountVals[type][stage].textContent = next;
    }
    // Live-rebuild the schedule only when paused on the affected stage. Skipping
    // entries already past the current stageTimer prevents an instant burst at
    // the player's feet when you bump a count up mid-zone.
    if (isPaused && gameActive && stage === currentStage) {
        const elapsed = stageTimer;
        initStageObstacles(currentStage);
        while (nextObstacleIdx < stageObstacles.length && stageObstacles[nextObstacleIdx].time <= elapsed) {
            nextObstacleIdx++;
        }
    }
}

buildSpawnCountUI();

window.addEventListener('keydown', e => {
    if (e.code === 'KeyP') {
        debugVisible = !debugVisible;
        debugPanel.style.display = debugVisible ? 'block' : 'none';
        e.preventDefault();
    }
});

function updateDebugPanel(now) {
    if (!debugVisible) return;
    // Throttle DOM writes to ~5 Hz so the numbers are readable.
    if (now - debugStats.lastPanelUpdate < 200) return;
    debugStats.lastPanelUpdate = now;

    dbgFps.textContent = debugStats.fpsEMA.toFixed(0);
    dbgFps.className = debugStats.fpsEMA < 30 ? 'debug-bad'
                     : debugStats.fpsEMA < 50 ? 'debug-warn' : '';

    // renderer.info reflects the *previous* frame's render() — that's exactly what
    // we want here (we read it before the next render). Useful for spotting which
    // stages spike the draw count and whether further instancing would help.
    const ri = renderer.info.render;
    dbgDraws.textContent = ri.calls;
    dbgDraws.className = ri.calls > 250 ? 'debug-bad'
                       : ri.calls > 150 ? 'debug-warn' : '';
    // Triangles in K so the row stays compact.
    dbgTris.textContent = (ri.triangles / 1000).toFixed(0) + 'k';

    if (debugStats.mpLatency > 0) {
        dbgMp.textContent = debugStats.mpLatency.toFixed(0) + ' ms';
        dbgMp.className = debugStats.mpLatency > 120 ? 'debug-bad'
                        : debugStats.mpLatency > 60  ? 'debug-warn' : '';
    } else {
        dbgMp.textContent = '— (no cam)';
        dbgMp.className = 'debug-label';
    }

    dbgSpd.textContent = gameSpeed.toFixed(2);

    // "Constant" = gameSpeed equals BASE_SPEED, game is active, not in cutscene/paused.
    let label, cls = '';
    if (isPaused)              { label = 'PAUSED';    cls = 'debug-warn'; }
    else if (isCutscene)       { label = 'CUTSCENE';  cls = 'debug-warn'; }
    else if (!gameActive)      { label = 'IDLE';      cls = 'debug-label'; }
    else if (gameSpeed < BASE_SPEED - 0.001) { label = 'PENALTY'; cls = 'debug-bad'; }
    else if (Math.abs(gameSpeed - BASE_SPEED) < 1e-6) { label = 'YES'; }
    else                       { label = 'DRIFT';     cls = 'debug-bad'; }
    dbgConst.textContent = label;
    dbgConst.className = cls;

    // BASE stepper: only interactive while paused, and the value display tracks any
    // mutation (the stepper is the only mutator today, but if BASE_SPEED ever changes
    // elsewhere this keeps the readout honest).
    dbgBaseEl.textContent = BASE_SPEED.toFixed(2);
    const stepperDisabled = !isPaused;
    dbgBaseDownEl.classList.toggle('is-disabled', stepperDisabled);
    dbgBaseUpEl  .classList.toggle('is-disabled', stepperDisabled);

    debugStats.prevGameSpeed = gameSpeed;
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);

    // Frame-rate cap: skip this rAF tick if we're ahead of the target frame budget.
    // The 0.5ms tolerance avoids dropping frames due to timing jitter near the cap.
    const _now = performance.now();
    if (_now - _prevAnimateAt < MIN_FRAME_MS) return;
    _prevAnimateAt = _now;

    // Debug: FPS via exponential moving average on real-time frame deltas
    if (debugStats.lastFrameAt > 0) {
        const frameDt = _now - debugStats.lastFrameAt;
        if (frameDt > 0) {
            const instFps = 1000 / frameDt;
            debugStats.fpsEMA = debugStats.fpsEMA * 0.92 + instFps * 0.08;
        }
    }
    debugStats.lastFrameAt = _now;
    updateDebugPanel(_now);

    if (isPaused) { clock.getDelta(); return; }
    if (!gameActive) { renderer.render(scene, camera); return; }

    const rawDelta = clock.getDelta(), time = clock.getElapsedTime();
    const delta = Math.min(rawDelta, 0.05);
    const runSpeed = 12;
    const dt60 = delta * 60;

    // Smooth recovery from a hit slowdown — gameSpeed lerps back to BASE_SPEED in
    // ~15 frames (≈0.25s @ 60fps), so the dip is felt but the player is back at
    // full pace almost immediately. Gated on !isCutscene because cutscenes set
    // gameSpeed = 0 deliberately (e.g. trophy collect) and we mustn't fight that.
    if (!isCutscene && gameSpeed < BASE_SPEED) {
        gameSpeed += (BASE_SPEED - gameSpeed) * 0.15 * dt60;
        if (gameSpeed > BASE_SPEED - 0.001) gameSpeed = BASE_SPEED;
    }

    const effectiveSpeed = gameSpeed;

    if (pendingBannerMesh && pendingBannerMesh.position.z > 0) {
        advanceStage(); setParallaxVisibility(currentStage); pendingBannerMesh = null; nextBannerSpawned = false;
    }

    // Atmosphere Lerp
    const atmos = STAGE_ATMOS[currentStage];
    const lerpRate = Math.min(delta * 0.8, 1);
    skyUniforms.topColor.value.lerp(atmos.skyTop, lerpRate);
    skyUniforms.bottomColor.value.lerp(atmos.skyBot, lerpRate);
    scene.fog.color.lerp(atmos.fogCol, lerpRate);
    scene.fog.density = THREE.MathUtils.lerp(scene.fog.density, atmos.fogDens, lerpRate);
    ambientLight.color.lerp(atmos.ambient, lerpRate);
    ambientLight.intensity = THREE.MathUtils.lerp(ambientLight.intensity, atmos.ambientI, lerpRate);
    dirLight.color.lerp(atmos.dirCol, lerpRate);
    dirLight.intensity = THREE.MathUtils.lerp(dirLight.intensity, atmos.dirI, lerpRate);
    dirLight.position.lerp(atmos.dirPos, lerpRate);
    fillLight.color.lerp(atmos.fillCol, lerpRate);
    fillLight.intensity = THREE.MathUtils.lerp(fillLight.intensity, atmos.fillI, lerpRate);
    cloudMat.color.lerp(atmos.cloudCol, lerpRate);
    cloudMat.opacity = THREE.MathUtils.lerp(cloudMat.opacity, atmos.cloudOp, lerpRate);

    if (isCutscene) {
        playerGroup.position.z -= 10 * delta;
        if (cupMesh) cupMesh.rotation.y += 3 * delta;

        if (confettiGroup && confettiGroup.isInstancedMesh) {
            const cData = confettiGroup.userData.data;
            for (let ci = 0; ci < cData.length; ci++) {
                const d = cData[ci];
                if (d.y > 0.05) { d.y += d.vY * delta; d.x += d.vX * delta; d.rX += d.drX * delta * 5; d.rY += d.drY * delta * 5; } else { d.y = 0.05; }
                _confettiEuler.set(d.rX, d.rY, 0); _confettiM4.makeRotationFromEuler(_confettiEuler); _confettiM4.setPosition(d.x, d.y, d.z); confettiGroup.setMatrixAt(ci, _confettiM4);
            }
            confettiGroup.instanceMatrix.needsUpdate = true;
        }
        const tunnelZ = stadiumGroup.position.z + 2.0 * 0.55;
        if (playerGroup.position.z < tunnelZ) {
            document.getElementById('victory-score').textContent = score; const vs = document.getElementById('victory-screen'); vs.style.display = 'flex';
            requestAnimationFrame(() => { requestAnimationFrame(() => { vs.classList.add('fade-in'); }); }); gameActive = false;
        }
    } else {
        stageTimer += delta;

        if (currentStage === FINAL_STAGE_INDEX) {
            const riseProg = Math.min(stageTimer / 0.5, 1.0);
            const easeProg = Math.sin(riseProg * Math.PI / 2);
            stadiumGroup.position.y = -100 + (100 * easeProg);

            const STADIUM_STOP_Z = -50;
            const STADIUM_APPROACH_SPEED = 150; 
            if (stadiumGroup.position.z < STADIUM_STOP_Z) {
                stadiumGroup.position.z = Math.min(STADIUM_STOP_Z, stadiumGroup.position.z + STADIUM_APPROACH_SPEED * delta);
            }

            if (stageTimer >= 1.0 && !isCutscene) {
                stadiumGroup.position.y = 0;
                stadiumGroup.position.z = STADIUM_STOP_Z;

                if (!cupSpawned) {
                    cupSpawned = true;
                    for (let j = activeItems.length - 1; j >= 0; j--) {
                        if (activeItems[j].type !== 'banner') { disposeItem(activeItems[j].mesh); activeItems.splice(j, 1); }
                    }
                    cupMesh = buildTrophy();
                    const entranceZ = stadiumGroup.position.z + 6.3 * 0.55;
                    cupMesh.position.set(0, 1.5, entranceZ);
                    scene.add(cupMesh);
                }
                startCutscene();
            }
        } else {
            const bannerTravelTime = 200 / (effectiveSpeed * 60);
            if (!nextBannerSpawned && currentStage < FINAL_STAGE_INDEX && (STAGES[currentStage].duration - Math.max(0, stageTimer)) <= bannerTravelTime) {
                const nextStageName = STAGES[currentStage + 1].bannerName;
                const banner = buildOverheadBanner(nextStageName); banner.position.z = -200; scene.add(banner);
                activeItems.push({ mesh: banner, type: 'banner', active: true }); pendingBannerMesh = banner; nextBannerSpawned = true;
            }
        }
    }

    if (multiplierActive) { multiplierTimer -= delta; if (multiplierTimer <= 0) multiplierActive = false; }
    if (!isCutscene) updateUI();
    else { updateClockWedge(360); clockHud.classList.remove('danger'); } // freeze clock at full during victory cutscene

    if (!isCutscene) {
        const tX = lanePositions[currentLaneIndex], diffX = tX - playerGroup.position.x;
        playerGroup.position.x += diffX * 0.22; playerGroup.rotation.z = -diffX * 0.10;
    } else {
        playerGroup.position.x += (0 - playerGroup.position.x) * 0.1; playerGroup.rotation.z = 0;
    }

    if (isJumping) {
        jumpVel += GRAV * delta; jumpOffset += jumpVel * delta;
        if (jumpOffset <= 0) { jumpOffset = 0; jumpVel = 0; isJumping = false; }
    }
    playerGroup.scale.y += ((isDucking ? 0.65 : 1.0) - playerGroup.scale.y) * 0.18;

    const gait = time * runSpeed; const gaitSin = Math.sin(gait); const gaitCos = Math.cos(gait);
    playerGroup.position.y = jumpOffset + ((isJumping || isDucking) ? 0 : Math.abs(Math.cos(gait)) * 0.15) + 0.05;

    if (!isDucking && !isJumping && !isCutscene) { pTorso.rotation.x = -0.08; pNeck.rotation.x = 0.04; }
    else if (!isDucking && !isJumping) { pTorso.rotation.x = 0; pNeck.rotation.x = 0; }

    if (isDucking) {
        armL.rotation.set(0, 0, 0.85); armR.rotation.set(0, 0, -0.85); forearmL.rotation.x = 0.6; forearmR.rotation.x = 0.6;
        legL.rotation.x = 0.5; legR.rotation.x = 0.5; calfL.rotation.x = -0.5; calfR.rotation.x = -0.5;
    } else if (isJumping) {
        armL.rotation.set(-0.9, 0, -0.25); armR.rotation.set(-0.9, 0, 0.25); forearmL.rotation.x = 0.3; forearmR.rotation.x = 0.3;
        legL.rotation.x = 0.3; legR.rotation.x = 0.3; calfL.rotation.x = -0.2; calfR.rotation.x = -0.2;
    } else {
        const legSwing = 0.85; const kneeMax = 1.4;
        legL.rotation.x = gaitSin * legSwing; legR.rotation.x = -gaitSin * legSwing;
        calfL.rotation.x = -Math.max(0, Math.cos(gait + 0.1)) * kneeMax; calfR.rotation.x = -Math.max(0, -Math.cos(gait + 0.1)) * kneeMax;
        const armSwing = 0.75; armL.rotation.set(-gaitSin * armSwing, 0, 0); armR.rotation.set(gaitSin * armSwing, 0, 0);
        const baseElbow = 0.4; forearmL.rotation.x = baseElbow + Math.max(0, -gaitSin) * 0.5; forearmR.rotation.x = baseElbow + Math.max(0, gaitSin) * 0.5;
        pTorso.rotation.y = gaitSin * 0.06;
    }

    if (!isCutscene) {
        const parallaxSpd = effectiveSpeed * 0.08 * dt60; const slowParallax = effectiveSpeed * 0.03 * dt60;
        if (parallaxQueue[0] && parallaxQueue[0].group.visible) {
            for (let i = 0, len = parallaxQueue.length; i < len; i++) { const q = parallaxQueue[i]; q.group.position.z += parallaxSpd; if (q.group.position.z > 20) q.group.position.z -= 840; }
            for (let i = 0, len = queueTreeRows.length; i < len; i++) { const t = queueTreeRows[i]; t.group.position.z += parallaxSpd; if (t.group.position.z > 20) t.group.position.z -= 840; }
            for (let i = 0, len = staticTents.length; i < len; i++) { const t = staticTents[i]; t.position.z += parallaxSpd; if (t.position.z > 20) t.position.z -= 840; }
        }
        if (parallaxHill[0] && parallaxHill[0].group.visible) {
            for (let i = 0, len = parallaxHill.length; i < len; i++) { const h = parallaxHill[i]; h.group.position.z += parallaxSpd; if (h.group.position.z > 20) h.group.position.z -= 840; }
        }
        if (cloudMeshes[0] && cloudMeshes[0].visible) {
            for (let i = 0, len = cloudMeshes.length; i < len; i++) { const c = cloudMeshes[i]; c.position.x += (Math.sin(time * 0.1 + i) * 0.003) * dt60; c.position.z += slowParallax; if (c.position.z > 30) c.position.z -= 580; }
        }
        if (parallaxCourts[0] && parallaxCourts[0].group.visible) {
            for (let i = 0, len = parallaxCourts.length; i < len; i++) {
                const court = parallaxCourts[i]; court.group.position.z += parallaxSpd; if (court.group.position.z > 20) court.group.position.z -= 840;
                if (court.group.position.z > -80 && court.group.position.z < 20) { const animOffset = time * 2.5 + i; court.p1.position.x = Math.sin(animOffset) * 1.8; court.p2.position.x = Math.cos(animOffset * 0.8) * 1.8; }
            }
        }
        if (ropeBarriers[0] && ropeBarriers[0].group.visible) {
            for (let i = 0, len = ropeBarriers.length; i < len; i++) { const r = ropeBarriers[i]; r.group.position.z += parallaxSpd; if (r.group.position.z > 20) r.group.position.z -= 840; }
        }
    }

    // Process Timeline script 
    if (currentStage < FINAL_STAGE_INDEX && !isCutscene) {
        while (nextObstacleIdx < stageObstacles.length && stageTimer >= stageObstacles[nextObstacleIdx].time) {
            spawnScriptedObstacle(stageObstacles[nextObstacleIdx]);
            nextObstacleIdx++;
        }
        spawnCollectables(stageTimer);
    }

    for (let i = activeItems.length - 1; i >= 0; i--) {
        const item = activeItems[i]; if (!item.active) continue;
        const prevZ = item.mesh.position.z;

        if (!isCutscene && item.type !== 'trophy') {
            const spd = (item.type === 'bird') ? effectiveSpeed * 1.15 : effectiveSpeed; item.mesh.position.z += spd * dt60;
        }
        
        // Dynamic visibility of the 3D Tutorial UI (Appears approx 2s out, vanishes when passing)
        if (item.mesh.userData.tutUI) {
            if (item.mesh.position.z > -150 && item.mesh.position.z < -10) {
                item.mesh.userData.tutUI.visible = true;
            } else {
                item.mesh.userData.tutUI.visible = false;
            }
        }

        if (item.type === 'banner') {
            if (item.mesh.position.z > 0 && !item.swooshPlayed) { SoundFX.playSwoosh(); item.swooshPlayed = true; }
            if (item.mesh.position.z > -20) {
                const fadeProgress = Math.min((item.mesh.position.z + 20) / 20, 1); const opacity = 1 - fadeProgress * 0.85;
                if (!item._fadeMeshes) {
                    item._fadeMeshes = [];
                    item.mesh.traverse(c => { if (c.isMesh && c.material) { c.material.transparent = true; item._fadeMeshes.push(c.material); } });
                }
                for (let fi = 0; fi < item._fadeMeshes.length; fi++) { item._fadeMeshes[fi].opacity = opacity; }
            }
            if (item.mesh.position.z > 12) { disposeItem(item.mesh); activeItems.splice(i, 1); }
            continue;
        }

        if (item.type === 'bird') {
            const ph = time * 8 + item.mesh.userData.animPhase;
            if (item.mesh.userData.wingL) { 
                const flap = Math.sin(ph) * 0.4 + Math.sin(ph * 2) * 0.1; 
                item.mesh.userData.wingL.rotation.z = flap; 
                item.mesh.userData.wingR.rotation.z = -flap; 
            }
            item.mesh.position.y += Math.sin(time * 3.5 + item.mesh.userData.animPhase) * 0.004;
        }
        if (item.type === 'goldticket') { item.mesh.rotation.y += delta * 3; item.mesh.position.y = 0.7 + Math.sin(time * 3) * 0.15; }
        if (item.type === 'racket') { item.mesh.rotation.y += delta * 2.5; item.mesh.position.y = 0.5 + Math.sin(time * 2.5) * 0.15; }
        if (item.type === 'walker') {
            const wph = time * 5 + item.mesh.userData.animPhase; const ud = item.mesh.userData;
            if (ud.armL) ud.armL.rotation.x = Math.sin(wph) * 0.35; if (ud.armR) ud.armR.rotation.x = -Math.sin(wph) * 0.35;
            if (ud.legL) ud.legL.rotation.x = -Math.sin(wph) * 0.40; if (ud.legR) ud.legR.rotation.x = Math.sin(wph) * 0.40;
            if(!isCutscene) item.mesh.position.z += ud.walkSpeed * dt60;
        }

        if (item.mesh.position.z > 12) { disposeItem(item.mesh); activeItems.splice(i, 1); continue; }
        if (isCutscene) continue;

        const pZ = playerGroup.position.z;
        const closeZ = (prevZ <= pZ + 1.05) && (item.mesh.position.z >= pZ - 1.05);
        if (!closeZ) continue;
        const sameLane = (item.type === 'hedge') ? true : Math.abs(playerGroup.position.x - item.mesh.position.x) < 1.0;
        if (!sameLane) continue;

        if (item.type === 'ball') {
            SoundFX.playBall(); disposeItem(item.mesh); activeItems.splice(i, 1);
            const pts = multiplierActive ? 100 : 50; score += pts; scoreValEl.textContent = score; flashScore();
            continue;
        }
        
        if (item.type === 'icecream' || item.type === 'goldticket' || item.type === 'racket') {
            if (item.type === 'icecream') SoundFX.playIceCream();
            else if (item.type === 'goldticket') SoundFX.playTicket();
            else if (item.type === 'racket') SoundFX.playRacket();

            disposeItem(item.mesh); activeItems.splice(i, 1); multiplierActive = true; multiplierTimer = 10;
            score += 100; scoreValEl.textContent = score; flashScore();
            continue;
        }

        let hit = false;
        if (item.type === 'bird') hit = (playerGroup.position.y + 3.84 * playerGroup.scale.y) > item.mesh.position.y - 0.25;
        if (item.type === 'hedge') hit = jumpOffset < 1.2;
        if (item.type === 'walker') hit = jumpOffset < 1.8;

        if (hit) {
            SoundFX.playHit(); disposeItem(item.mesh); activeItems.splice(i, 1);
            score = Math.max(0, score - 50); scoreValEl.textContent = score; flashScore();

            // Single tiny slowdown — gameSpeed dips by HIT_SLOWDOWN and the
            // animate-loop lerp eases it back to BASE_SPEED in ~0.25s. Repeat
            // hits don't stack: each hit just resets the dip to its starting
            // depth (so spamming hits never produces a deeper penalty).
            gameSpeed = BASE_SPEED - HIT_SLOWDOWN;
            flashHit(true);
        }
    }

    if (_needsResize) {
        _needsResize = false; const w = canvas.clientWidth, h = canvas.clientHeight;
        renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    renderer.render(scene, camera);
}
let _needsResize = true;
new ResizeObserver(() => { _needsResize = true; }).observe(canvas);
animate();
</script>
