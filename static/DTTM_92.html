<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash to the Match — v91</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --wim-green: #00563f;
            --wim-purple: #4a2c7a;
            --amex-blue: #006fcf;
            --gold: #c9a84c;
            --gold-light: #f0d070;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: #050505;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            font-family: 'Georgia', 'Times New Roman', serif;
            user-select: none; overflow: hidden;
        }
        #game-container {
            height: 100vh; width: auto; aspect-ratio: 9/16; max-width: 100vw;
            position: relative; overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            container-type: size;
        }
        #webgl-canvas {
            width: 100%; height: 100%; display: block;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* ── Score HUD (Flashes gold) ── */
        #score-hud {
            position: absolute; top: 4%; left: 5%;
            text-align: left; color: #fff;
            display: flex; flex-direction: column; align-items: flex-start;
            filter: drop-shadow(0 0.5cqw 1.5cqw rgba(0,0,0,0.4));
        }
        #score-label {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 2cqw;
            font-weight: 700; letter-spacing: 0.4cqw;
            text-transform: uppercase; font-variant: small-caps;
            color: rgba(255,255,255,0.55);
        }
        #score-val {
            font-size: 6cqw;
            font-weight: 900; line-height: 1;
            color: white; text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.5);
            transition: color 0.2s ease;
        }

        @keyframes flashGold {
            0% { color: white; transform: scale(1); text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.5); }
            50% { color: #ffd700; transform: scale(1.3); text-shadow: 0 0 3cqw rgba(255, 215, 0, 0.9); }
            100% { color: white; transform: scale(1); text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.5); }
        }
        .score-flash {
            animation: flashGold 0.3s ease-out;
        }

        #score-hud.x2-active #score-val { color: #40e0ff; text-shadow: 0 0 2.5cqw rgba(64,224,255,0.6); }

        #multiplier-text {
            display: none; font-size: 2.5cqw; font-weight: 800;
            letter-spacing: 0.4cqw; color: #40e0ff; margin-top: 1cqw;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #score-hud.x2-active #multiplier-text { display: block; }

        /* ── Analogue Clock ── */
        #clock-hud {
            position: absolute; top: 2%; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
            filter: drop-shadow(0 0.5cqw 2cqw rgba(0,0,0,0.55));
            transition: all 0.3s ease;
        }
        #clock-svg {
            width: 20cqw;
            height: 20cqw;
            overflow: visible;
        }

        #clock-hud.danger #clock-hour-markers rect { stroke: #ff4444; }
        #clock-hud.danger #clock-arm-group rect { fill: #ff4444; }
        #clock-hud.danger #clock-svg circle { stroke: #ff4444; }

        @keyframes clockShake {
            0% { transform: translateX(-50%) rotate(0deg); filter: drop-shadow(0 0.5cqw 3cqw rgba(255,0,0,0.9)); }
            20% { transform: translateX(-55%) rotate(-8deg); }
            40% { transform: translateX(-45%) rotate(8deg); }
            60% { transform: translateX(-53%) rotate(-5deg); }
            80% { transform: translateX(-47%) rotate(5deg); }
            100% { transform: translateX(-50%) rotate(0deg); filter: drop-shadow(0 0.5cqw 2cqw rgba(0,0,0,0.55)); }
        }
        #clock-hud.clock-hit {
            animation: clockShake 0.4s ease-in-out;
        }
        #clock-hud.clock-hit #clock-svg circle { stroke: #ff4444; }
        #clock-hud.clock-hit #clock-arm-group rect { fill: #ff4444; }

        /* ── Bottom Progress Bar ── */
        #bottom-progress {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 0 5% 5cqw;
            pointer-events: none;
        }
        #progress-stage-labels {
            position: relative; height: 2cqw; margin-bottom: 1.5cqw;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.5cqw; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.2cqw;
            color: rgba(255,255,255,0.60);
        }
        #progress-track {
            position: relative; height: 1.2cqw;
            background: rgba(255,255,255,0.25);
            border-radius: 1cqw; overflow: visible;
        }
        #progress-fill {
            position: absolute; top: 0; left: 0;
            height: 100%; width: 0%;
            background: #ffffff;
            border-radius: 1cqw; transition: width 0.25s ease;
        }
        .stage-pip {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            width: 2.8cqw; height: 2.8cqw; border-radius: 50%;
            background: rgba(255,255,255,0.30);
            border: 0.4cqw solid rgba(255,255,255,0.50);
            transition: background 0.35s, border-color 0.35s;
        }
        .stage-pip.reached {
            background: #ffffff; border-color: #ffffff;
            box-shadow: 0 0 1.5cqw rgba(255,255,255,0.8);
        }

        #action-indicator {
            position: absolute; bottom: 16%; left: 50%; transform: translateX(-50%);
            font-size: 3cqw; font-weight:800; letter-spacing: 0.5cqw;
            color: #fff; text-transform: uppercase; opacity:0;
            transition: opacity 0.15s; text-shadow: 0 0 3cqw rgba(255,255,255,0.8);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            pointer-events: none;
        }

        /* INTRO / END SCREENS */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            background: rgba(74,44,122,0.6);
        }
        #intro-overlay.visible { opacity: 1; pointer-events: auto; }
        #intro-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900; font-size: 11cqw;
            color: #ffffff; text-transform: uppercase; letter-spacing: 0.6cqw;
            text-align: center; line-height: 1.15; text-shadow: 0 0.5cqw 3cqw rgba(0,0,0,0.6);
        }
        #intro-subtitle {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400;
            font-size: 2.5cqw; color: rgba(255,255,255,0.7);
            text-transform: uppercase; letter-spacing: 0.8cqw; margin-top: 2cqw;
        }
        #countdown-ring { margin-top: 6cqw; width: 10cqw; height: 10cqw; }
        #countdown-ring circle { fill: none; stroke-width: 3; }
        #countdown-ring .ring-bg { stroke: rgba(255,255,255,0.15); }
        #countdown-ring .ring-fg {
            stroke: #ffffff; stroke-linecap: round;
            transform: rotate(-90deg); transform-origin: center;
            transition: stroke-dashoffset 0.05s linear;
        }

        /* Blurred transparent end screen */
        .end-screen {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: auto; z-index: 100; text-align: center; padding: 5%;
        }
        .end-screen h1 {
            margin: 0 0 4%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900; font-size: 11cqw; color: #ffffff;
            text-transform: uppercase; letter-spacing: 0.6cqw; line-height: 1.15;
            text-shadow: 0 0.5cqw 3cqw rgba(0,0,0,0.6);
        }
        .end-screen .end-score {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 400;
            font-size: 3cqw; color: rgba(255,255,255,0.7);
            text-transform: uppercase; letter-spacing: 0.8cqw; margin-bottom: 6cqw;
        }
        .end-screen .end-score span {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-weight: 900; color: #ffffff; font-size: 9cqw;
            display: block; margin-top: 1.5cqw; letter-spacing: 0.2cqw;
            text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.8);
        }
        .end-btn {
            margin-top: 5cqw; padding: 3cqw 8cqw; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 3cqw; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.6cqw; background: transparent; color: white;
            border: 0.4cqw solid rgba(255,255,255,0.6); border-radius: 8cqw;
            cursor: pointer; transition: all 0.2s;
        }
        .end-btn:hover { background: rgba(255,255,255,0.3); border-color: #fff; }

        #victory-screen { display: none; opacity: 0; transition: opacity 1.5s ease; }
        #victory-screen.fade-in { display: flex; opacity: 1; }

        /* ── Body Tracking Preview ── */
        #pose-preview {
            position: absolute; bottom: 8%; right: 3%;
            width: 22cqw; aspect-ratio: 4/3;
            border: 0.4cqw solid rgba(255,255,255,0.4); border-radius: 1.5cqw;
            overflow: hidden; z-index: 60; pointer-events: none;
            box-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.4);
        }
        #pose-canvas {
            width: 100%; height: 100%; display: block;
            transform: scaleX(-1); /* mirror */
        }
        #pose-video { display: none; }
        #pose-label {
            position: absolute; bottom: 0.5cqw; left: 0; width: 100%;
            text-align: center; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 1.8cqw; font-weight: 700; color: #44ff88;
            letter-spacing: 0.2cqw; text-transform: uppercase;
            text-shadow: 0 0.2cqw 0.8cqw rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div id="score-hud">
            <span id="score-label">SCORE</span>
            <div id="score-val">0</div>
            <span id="multiplier-text">× 2</span>
        </div>

        <div id="clock-hud">
            <svg id="clock-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="2.5"/>
                <circle cx="50" cy="50" r="45" fill="rgba(255,255,255,0.07)"/>
                <g id="clock-min-ticks"></g>
                <g id="clock-hour-markers"></g>
                <g id="clock-arm-group" style="transform-origin:50px 50px; transform:rotate(0deg)">
                    <rect x="48.2" y="13" width="3.6" height="37" rx="1.8" fill="white"/>
                    <rect x="48.2" y="51" width="3.6" height="11" rx="1.5" fill="white" opacity="0.55"/>
                </g>
                <circle cx="50" cy="50" r="4" fill="white"/>
                <circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.5)"/>
            </svg>
        </div>

        <div id="action-indicator"></div>

        <div id="bottom-progress">
            <div id="progress-stage-labels">
                <span style="position: absolute; left: 0%; transform: none;">Queue</span>
                <span style="position: absolute; left: 33.33%; transform: translateX(-50%);">Hill</span>
                <span style="position: absolute; left: 66.66%; transform: translateX(-50%);">Outdoor Courts</span>
                <span style="position: absolute; left: 100%; transform: translateX(-100%);">Centre Court</span>
            </div>
            <div id="progress-track">
                <div id="progress-fill"></div>
                <div class="stage-pip" id="pip-0" style="left:0%"></div>
                <div class="stage-pip" id="pip-1" style="left:33.33%"></div>
                <div class="stage-pip" id="pip-2" style="left:66.66%"></div>
                <div class="stage-pip" id="pip-3" style="left:100%"></div>
            </div>
        </div>
    </div>

    <div id="intro-overlay">
        <div id="intro-title">DASH TO<br>THE MATCH</div>
        <div id="intro-subtitle"> </div>
        <svg id="countdown-ring" viewBox="0 0 52 52">
            <circle class="ring-bg" cx="26" cy="26" r="23"/>
            <circle class="ring-fg" id="ring-progress" cx="26" cy="26" r="23" stroke-dasharray="144.51" stroke-dashoffset="0"/>
        </svg>
    </div>

    <div id="game-over-screen" class="end-screen">
        <h1>TIME'S UP</h1>
        <div class="end-score">Final Score<span id="final-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>

    <div id="victory-screen" class="end-screen">
        <h1>YOU MADE IT!</h1>
        <div class="end-score">CENTRE COURT AWAITS<span id="victory-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>

    <video id="pose-video" width="320" height="240" autoplay playsinline></video>
    <div id="pose-preview">
        <canvas id="pose-canvas" width="320" height="240"></canvas>
        <div id="pose-label">Starting cam…</div>
    </div>
</div>

<script>
if (typeof THREE === 'undefined') { throw new Error('Three.js failed to load.'); }

// ─── THREE SETUP ───────────────────────────────────────────────────────────────
const canvas   = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
renderer.setClearColor(0x8aaabe, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x8aaabe);
scene.fog = new THREE.FogExp2(0x98b8c8, 0.0035);

// Extended camera far plane so we can see the horizon cleanly
const camera = new THREE.PerspectiveCamera(62, canvas.clientWidth / canvas.clientHeight, 0.5, 800);
camera.position.set(0, 7.5, 12);
camera.lookAt(0, 2.5, -5);

const ambientLight = new THREE.AmbientLight(0xffeedd, 0.9); scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffd4a0, 0.85);
dirLight.position.set(-15, 40, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048); // High res map for 4K 85" displays
dirLight.shadow.bias = -0.0008;
dirLight.shadow.normalBias = 0.02;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far  = 250;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 120;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

function enableShadows(obj) {
    obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
}

// ─── TEXTURES ─────────────────────────────────────────────────────────────────
function makeHatBandTex() {
    const c = document.createElement('canvas'); c.width = 512; c.height = 128;
    const ctx = c.getContext('2d');
    
    // Navy-White-Green-White-Navy stripes
    ctx.fillStyle = '#1a2044'; ctx.fillRect(0, 0, 512, 128); // Background navy
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 20, 512, 88); // Wide white
    ctx.fillStyle = '#00563f'; ctx.fillRect(0, 40, 512, 48); // Center green
    
    // Circular Wimbledon-style logo in the center (faces forward on the hat)
    ctx.fillStyle = '#e5d5c1';
    ctx.beginPath(); ctx.arc(256, 64, 32, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1a2044'; ctx.lineWidth = 4; ctx.stroke();
    
    // Little racket cross in the logo
    ctx.strokeStyle = '#00563f'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(244, 52); ctx.lineTo(268, 76); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(268, 52); ctx.lineTo(244, 76); ctx.stroke();
    
    return new THREE.CanvasTexture(c);
}
function makeTennisTex() {
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#cfdb1c'; ctx.fillRect(0,0,128,128);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.arc(0,64,44,-Math.PI/2,Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(128,64,44,Math.PI/2,3*Math.PI/2); ctx.stroke();
    return new THREE.CanvasTexture(c);
}

const hatBandTex = makeHatBandTex();
const tennisTex  = makeTennisTex();

// ─── EXTENDED ENVIRONMENT ─────────────────────────────────────────────────────
// Ground planes extended heavily to hide any sharp geometry cutoffs in the fog
const trackMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(8.5, 2000),
    new THREE.MeshStandardMaterial({ color: 0x3d8a35, roughness: 0.85 })
);
trackMesh.rotation.x = -Math.PI/2;
trackMesh.position.z = -900;
trackMesh.receiveShadow = true; scene.add(trackMesh);

const purpleLineMat = new THREE.MeshBasicMaterial({ color: 0x4a2c7a });
[-4.1, 4.1].forEach(x => {
    const pl = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 2000), purpleLineMat);
    pl.rotation.x = -Math.PI/2;
    pl.position.set(x, 0.025, -900);
    scene.add(pl);
});

const grassMat = new THREE.MeshStandardMaterial({ color: 0x3d8a35, roughness: 0.95 });
const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(200, 2000), grassMat);
groundMesh.rotation.x = -Math.PI/2;
groundMesh.position.set(0, -0.01, -900);
groundMesh.receiveShadow = true; scene.add(groundMesh);

// Stands restored to the "Goldilocks" framing height
const standMat = new THREE.MeshStandardMaterial({ color: 0x1e4a18, roughness: 0.9 });
const standMeshes = [];
for (let tier = 0; tier < 4; tier++) {
    const th = 2.2, td = 2.8;
    const yBase = tier * th + 0.5;
    const xL = -14.5 - tier * td, xR = 14.5 + tier * td;
    [[xL, Math.PI/6],[xR,-Math.PI/6]].forEach(([x, ry]) => {
        const s = new THREE.Mesh(new THREE.BoxGeometry(td, th, 2000), standMat);
        s.position.set(x, yBase-th/2, -900); s.receiveShadow = true; scene.add(s);
        standMeshes.push(s);
    });
}
// Hide stands at start (Queue section has no stands)
standMeshes.forEach(s => { s.visible = false; });

// ── TREE ROWS (Queue section — replaces stands visually) ──
// London plane / oak style trees lining both sides, matching stand footprint
const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.9 });
const treeLeafMats = [
    new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.85 }),
    new THREE.MeshStandardMaterial({ color: 0x3a6828, roughness: 0.8 }),
    new THREE.MeshStandardMaterial({ color: 0x1e4a15, roughness: 0.9 }),
];
const queueTreeRows = [];
function createTreeRow(xCenter, z) {
    const group = new THREE.Group();
    // 3 trees staggered across the stand width (~11 units wide, from x±14.5 to x±22.9)
    const offsets = [-3.5, 0, 3.5];
    offsets.forEach(dx => {
        const leafMat = treeLeafMats[Math.floor(Math.random() * treeLeafMats.length)];
        const treeH = 5.5 + Math.random() * 3; // ~5.5-8.5 tall — fills the stand height
        const canopyR = 2.2 + Math.random() * 1.2;

        // Trunk
        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.25, 0.4, treeH * 0.45, 6),
            treeTrunkMat
        );
        trunk.position.set(dx + (Math.random()-0.5)*1.5, treeH * 0.22, (Math.random()-0.5)*2);
        trunk.castShadow = true;
        group.add(trunk);

        // Main canopy — big rounded crown (London plane style)
        const canopy = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR, 8, 6),
            leafMat
        );
        canopy.position.set(trunk.position.x, treeH * 0.55 + canopyR * 0.4, trunk.position.z);
        canopy.scale.set(1, 0.8, 1); // slightly squashed like a real broad crown
        canopy.castShadow = true;
        group.add(canopy);

        // Secondary smaller canopy cluster for fullness
        const c2 = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR * 0.6, 6, 5),
            leafMat
        );
        c2.position.set(
            trunk.position.x + (Math.random()-0.5)*canopyR,
            canopy.position.y - canopyR * 0.3,
            trunk.position.z + (Math.random()-0.5)*1.5
        );
        c2.castShadow = true;
        group.add(c2);
    });

    group.position.set(xCenter, 0, z);
    scene.add(group);
    group.visible = true;
    return { group };
}

// Place tree rows along both sides, same z spacing as parallax items
for (let z = -800; z < 40; z += 18) {
    queueTreeRows.push(createTreeRow(-18.5, z)); // left side — centred in stand zone
    queueTreeRows.push(createTreeRow(18.5, z));   // right side
}

// ─── PARALLAX SCENERY ─────────────────────────────────────────────────────────
// Shared mini-figure materials (reused across queue bystanders and court players)
const miniSkin    = new THREE.MeshStandardMaterial({ color: 0xfcdab7 });
const miniWhite   = new THREE.MeshStandardMaterial({ color: 0xffffff });
const miniRacket  = new THREE.MeshStandardMaterial({ color: 0x333333 });

function buildHabboPlayer() {
    const g = new THREE.Group();
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), miniSkin);
    head.position.y = 0.4; g.add(head);
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 0.15), miniWhite);
    body.position.y = 0.15; g.add(body);
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.08), miniSkin);
    legL.position.set(-0.05, -0.05, 0); g.add(legL);
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.08), miniSkin);
    legR.position.set(0.05, -0.05, 0); g.add(legR);
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.2, 0.06), miniSkin);

// Henman Hill material — one lush grass tone for a broad natural slope
const henmanGrassMat = new THREE.MeshStandardMaterial({ color: 0x3a8a2a, roughness: 0.95 });
const henmanGrassDark = new THREE.MeshStandardMaterial({ color: 0x2e7220, roughness: 0.95 });

function createHenmanHillSegment(x, z) {
    const group = new THREE.Group();
    const facingX = x;
    const inward = x > 0 ? -1 : 1; // slope faces inward toward the track

    // ── Broad gentle slope (Henman Hill style) ──
    const slopeW = 14;
    const slopeD = 16;
    const slopeH = 3 + Math.random() * 1.5;
    const slopeGeo = new THREE.PlaneGeometry(slopeW, slopeD, 8, 8);
    const pos = slopeGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        const px = pos.getX(i);
        const pz = pos.getZ(i);
        const xNorm = (px / (slopeW/2));
        const rise = slopeH * Math.max(0, (inward > 0 ? -xNorm : xNorm) * 0.5 + 0.5);
        const ripple = Math.sin(pz * 0.3 + px * 0.2) * 0.25;
        pos.setZ(i, rise + ripple);
    }
    slopeGeo.computeVertexNormals();
    const slopeMat = Math.random() < 0.6 ? henmanGrassMat : henmanGrassDark;
    const slope = new THREE.Mesh(slopeGeo, slopeMat);
    slope.rotation.x = -Math.PI / 2;
    slope.receiveShadow = true;
    group.add(slope);

    // ── People scattered across the slope (sitting on blankets) ──
    const numPeople = 12 + Math.floor(Math.random() * 10); // Massively increased
    for (let i = 0; i < numPeople; i++) {
        const px = (Math.random() - 0.5) * (slopeW * 0.7);
        const pz = (Math.random() - 0.5) * (slopeD * 0.6);
        const xNorm = px / (slopeW/2);
        const surfaceY = slopeH * Math.max(0, (inward > 0 ? -xNorm : xNorm) * 0.5 + 0.5);

        if (Math.random() < 0.45) {
            const blanket = buildBlanket();
            blanket.position.set(px, surfaceY + 0.01, pz);
            group.add(blanket);
        }

        const person = buildSittingPerson(facingX, Math.random() < 0.25);
        person.position.set(px + (Math.random()-0.5)*0.3, surfaceY, pz + (Math.random()-0.5)*0.2);
        group.add(person);

        if (Math.random() < 0.15) {
            const parasol = buildParasol();
            parasol.position.set(px + 0.2, surfaceY, pz);
            group.add(parasol);
        }
    }

    // ── People scattered in the flat gap next to the track ──
    const numFlatPeople = 8 + Math.floor(Math.random() * 6);
    for (let i = 0; i < numFlatPeople; i++) {
        // 'inward' is 1 (left side) or -1 (right side). We need a local offset of 7 to 13 
        // to securely place them in the flat gap between the hill's base and the track edge.
        const localPx = inward * (7.0 + Math.random() * 6.0);
        const pz = (Math.random() - 0.5) * (slopeD * 0.9);

        if (Math.random() < 0.45) {
            const blanket = buildBlanket();
            blanket.position.set(localPx, 0.01, pz);
            group.add(blanket);
        }

        const person = buildSittingPerson(facingX, Math.random() < 0.25);
        person.position.set(localPx + (Math.random()-0.5)*0.3, 0, pz + (Math.random()-0.5)*0.2);
        group.add(person);
        
        if (Math.random() < 0.15) {
            const parasol = buildParasol();
            parasol.position.set(localPx + 0.2, 0, pz);
            group.add(parasol);
        }
    }

    // ── Picnic Tables on flatter sections ──
    if (Math.random() < 0.7) {
        const table = buildPicnicTable();
        const tx = (Math.random() - 0.5) * (slopeW * 0.4);
        const tz = (Math.random() - 0.5) * (slopeD * 0.6);
        const xNorm = tx / (slopeW/2);
        const ty = slopeH * Math.max(0, (inward > 0 ? -xNorm : xNorm) * 0.5 + 0.5);
        table.position.set(tx, ty, tz);
        table.rotation.y = Math.random() * Math.PI;
        group.add(table);
    }

    // ── Deck Chairs ──
    const numChairs = Math.floor(Math.random() * 3);
    for (let i = 0; i < numChairs; i++) {
        const chair = buildDeckChair();
        const cx = (Math.random() - 0.5) * (slopeW * 0.5);
        const cz = (Math.random() - 0.5) * (slopeD * 0.5);
        const xNorm = cx / (slopeW/2);
        const cy = slopeH * Math.max(0, (inward > 0 ? -xNorm : xNorm) * 0.5 + 0.5);
        chair.position.set(cx, cy, cz);
        chair.rotation.y = Math.random() * Math.PI;
        group.add(chair);
    }

    // ── Occasional tree at the crest ──
    if (Math.random() < 0.3) {
        const leafMat = treeLeafMats[Math.floor(Math.random() * treeLeafMats.length)];
        const treeH = 4 + Math.random() * 2.5;
        const canopyR = 1.8 + Math.random() * 0.8;
        const tx = (inward > 0 ? -(slopeW*0.35) : (slopeW*0.35)) + (Math.random()-0.5)*2;
        const tz = (Math.random()-0.5) * slopeD * 0.4;

        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.35, treeH * 0.45, 6), treeTrunkMat
        );
        trunk.position.set(tx, slopeH * 0.85 + treeH * 0.22, tz);
        trunk.castShadow = true;
        group.add(trunk);

        const canopy = new THREE.Mesh(
            new THREE.SphereGeometry(canopyR, 7, 5), leafMat
        );
        canopy.position.set(tx, slopeH * 0.85 + treeH * 0.55 + canopyR * 0.3, tz);
        canopy.scale.set(1, 0.75, 1);
        canopy.castShadow = true;
        group.add(canopy);
    }

    group.position.set(x, 0.02, z);
    scene.add(group);
    group.visible = false;
    return { group };
}

// ── RED ROPE BARRIERS (Centre Court — soft velvet VIP rope on brass stanchions) ──
const ropeBarriers = [];
const ropeMat = new THREE.MeshStandardMaterial({ color: 0x9b1111, roughness: 0.85, emissive: 0x1a0000, emissiveIntensity: 0.2 });
const ropePostMat = new THREE.MeshStandardMaterial({ color: 0xd4a830, roughness: 0.25, metalness: 0.8 });
const ropeBaseMat = new THREE.MeshStandardMaterial({ color: 0xb89020, roughness: 0.35, metalness: 0.7 });

function createRopeBarrierSegment(x, z) {
    const group = new THREE.Group();
    const postSpacing = 3.0;

    [-postSpacing/2, postSpacing/2].forEach(dz => {
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 0.08, 12), ropeBaseMat);
        base.position.set(0, 0.04, dz);
        group.add(base);
        const post = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.9, 8), ropePostMat);
        post.position.set(0, 0.53, dz);
        group.add(post);
        const ball = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 6), ropePostMat);
        ball.position.set(0, 1.02, dz);
        group.add(ball);
    });

    const ropePoints = [];
    const segments = 12;
    for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const pz = -postSpacing/2 + t * postSpacing;
        const sag = 0.18 * (4 * t * (1 - t));
        const py = 0.95 - sag;
        ropePoints.push(new THREE.Vector3(0, py, pz));
    }
    const ropeCurve = new THREE.CatmullRomCurve3(ropePoints);

const crowdColors = [0xff5555, 0x5588dd, 0x44aa66, 0xffffff, 0xddaa33, 0xcc66aa, 0x8866bb, 0xee8844, 0x334455, 0xaa4466];
const _crowdBoxGeo = new THREE.BoxGeometry(0.3, 0.4, 0.3);

function createStandCrowdInstanced(density) {
    // Pre-calculate total count
    let total = 0;
    for (let tier = 0; tier < 4; tier++) total += 2 * Math.floor(density * (12 + tier * 4));

    const iMesh = new THREE.InstancedMesh(_crowdBoxGeo, new THREE.MeshBasicMaterial(), total);
    iMesh.instanceMatrix.setUsage(THREE.StaticDrawUsage);
    // Per-instance colour via instanceColor
    iMesh.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(total * 3), 3);

    const _m = new THREE.Matrix4();
    const _c = new THREE.Color();
    let idx = 0;
    for (let tier = 0; tier < 4; tier++) {
        const td = 2.8, th = 2.2;
        const yBase = tier * th + 0.5;
        const xL = -14.5 - tier * td;
        const xR = 14.5 + tier * td;
        [xL, xR].forEach(xSide => {
            const count = Math.floor(density * (12 + tier * 4));
            for (let i = 0; i < count; i++) {
                const px = xSide + (Math.random()-0.5) * (td*0.8);
                const py = yBase - th/2 + th * 0.3 + Math.random() * th * 0.5;
                const pz = -400 + Math.random() * 440;
                _m.makeTranslation(px, py, pz);
                iMesh.setMatrixAt(idx, _m);
                _c.setHex(crowdColors[Math.floor(Math.random() * crowdColors.length)]);
                iMesh.setColorAt(idx, _c);
                idx++;
            }
        });
    }
    iMesh.instanceMatrix.needsUpdate = true;
    iMesh.instanceColor.needsUpdate = true;
    iMesh.visible = false;
    iMesh.frustumCulled = false;
    scene.add(iMesh);
    return iMesh;
}

// ─── STAGE OVERHEAD BANNERS (True 2D Canvas mapped to Flat Plane) ─────────────
function buildOverheadBanner(stageName) {
    const g = new THREE.Group();
    const wMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });

    const canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 256;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 1024, 256);

    ctx.fillStyle = '#00563f';
    ctx.fillRect(0, 0, 1024, 20);
    ctx.fillRect(0, 236, 1024, 20);

    let fontSize = 110;
    ctx.font = `900 ${fontSize}px "Georgia", "Times New Roman", serif`;
    const text = stageName.toUpperCase();

    while (ctx.measureText(text).width > 900 && fontSize > 40) {
        fontSize -= 5;
        ctx.font = `900 ${fontSize}px "Georgia", "Times New Roman", serif`;
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 512, 128);

    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;

    const bMatFront = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });

    const bannerWidth = 13.0;
    const bGeo = new THREE.PlaneGeometry(bannerWidth, 3.2, 32, 1);
    const pos = bGeo.attributes.position;
    for(let i=0; i<pos.count; i++) {
        const x = pos.getX(i);
        const yOffset = -0.05 * Math.pow(x, 2);
        pos.setY(i, pos.getY(i) + yOffset);
    }
    bGeo.computeVertexNormals();

    const banner = new THREE.Mesh(bGeo, bMatFront);
    banner.position.set(0, 7.5, 0.3);
    g.add(banner);

    const poleHeight = 6.8;
    [-5.5, 5.5].forEach(x => {
        const post = new THREE.Mesh(new THREE.BoxGeometry(0.4, poleHeight, 0.4), wMat);
        post.position.set(x, poleHeight / 2, 0);
        g.add(post);
    });

    return g;
}

// ─── PROCEDURAL SOUND EFFECTS ──────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const SoundFX = {
    _resume: function() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
    },
    playBall: function() {
        this._resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    },
    playX2: function() {
        this._resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    },
    playHit: function() {
        this._resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.25);
    },
    playSwoosh: function() {
        this._resume();
        const duration = 0.5;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(200, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + (duration/2));
        filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + duration);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + (duration/2));
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start();
    },
    playCrowd: function() {
        this._resume();
        const duration = 10.0;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const roar = audioCtx.createBufferSource();
        roar.buffer = buffer;
        const roarFilter = audioCtx.createBiquadFilter();
        roarFilter.type = 'lowpass';
        roarFilter.frequency.value = 500;
        const roarGain = audioCtx.createGain();
        roarGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
        roarGain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 2.0);
        roarGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 6.0);
        roarGain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        roar.connect(roarFilter); roarFilter.connect(roarGain); roarGain.connect(audioCtx.destination);
        roar.start();

        const cheer = audioCtx.createBufferSource();
        cheer.buffer = buffer;
        const cheerFilter = audioCtx.createBiquadFilter();
        cheerFilter.type = 'bandpass';
        cheerFilter.frequency.value = 1400;
        const cheerGain = audioCtx.createGain();
        cheerGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
        cheerGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 1.0);
        cheerGain.gain.linearRampToValueAtTime(0.10, audioCtx.currentTime + 3.0);
        cheerGain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 7.0);
        cheerGain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        cheer.connect(cheerFilter); cheerFilter.connect(cheerGain); cheerGain.connect(audioCtx.destination);
        cheer.start();
    },
    playTrophyChime: function() {
        this._resume();
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6 — major arpeggio
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
            gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + i * 0.12 + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.12);
            osc.stop(audioCtx.currentTime + i * 0.12 + 0.6);
        });
    }
};

        line.setAttribute('x1', 50 + 43 * Math.sin(rad)); line.setAttribute('y1', 50 - 43 * Math.cos(rad));
        line.setAttribute('x2', 50 + 46 * Math.sin(rad)); line.setAttribute('y2', 50 - 46 * Math.cos(rad));
        line.setAttribute('stroke', 'rgba(255,255,255,0.35)');
        tickG.appendChild(line);
    }
    const markerG = document.getElementById('clock-hour-markers');
    for (let h = 0; h < 12; h++) {
        const ang = h * 30, rad = ang * Math.PI / 180;
        const isCard = h % 3 === 0, mW = isCard ? 5.5 : 3.8, mH = isCard ? 10 : 7.5;
        const cx = 50 + 35 * Math.sin(rad), cy = 50 - 35 * Math.cos(rad);
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', cx - mW / 2); rect.setAttribute('y', cy - mH / 2);
        rect.setAttribute('width', mW); rect.setAttribute('height', mH);
        rect.setAttribute('fill', 'none'); rect.setAttribute('stroke', 'white');
        rect.setAttribute('stroke-width', isCard ? '1.8' : '1.4');
        rect.setAttribute('transform', `rotate(${ang}, ${cx}, ${cy})`);
        markerG.appendChild(rect);
    }
})();

    const elapsedTotal = STAGES.slice(0, currentStage).reduce((s, st) => s + st.duration, 0) + Math.max(0, stageTimer);
    const timeLeft = TOTAL_GAME_DURATION - elapsedTotal;

    if (timeLeft <= 5 && timeLeft > 0) { clockHud.classList.add('danger'); }
    else { clockHud.classList.remove('danger'); }

    const clockAngleDeg = Math.min(elapsedTotal / TOTAL_GAME_DURATION, 1) * 360;
    if (clockArmGroup) clockArmGroup.style.transform = `rotate(${clockAngleDeg.toFixed(2)}deg)`;

    let pct = 0;
    if (currentStage === 0) pct = Math.min(1, stageTimer / STAGES[0].duration) * 33.33;
    else if (currentStage === 1) pct = 33.33 + Math.min(1, stageTimer / STAGES[1].duration) * 33.33;
    else if (currentStage === 2) pct = 66.66 + Math.min(1, stageTimer / STAGES[2].duration) * 33.33;
    else pct = 100;

    if (progressFill) progressFill.style.width = Math.max(0, Math.min(100, pct)) + '%';

// ─── BODY TRACKING (MediaPipe Pose) ───────────────────────────────────────────
(function initBodyTracking() {
    const poseVideo  = document.getElementById('pose-video');
    const poseCanvas = document.getElementById('pose-canvas');
    const poseCtx    = poseCanvas.getContext('2d');
    const poseLabel  = document.getElementById('pose-label');

    let calibrating = true;
    let calibSamples = [];
    const CALIB_DURATION = 1.0;
    let calibStart = 0;
    let baselineY = 0;

    const JUMP_THRESHOLD  = 0.045;
    const DUCK_THRESHOLD  = 0.055;
    const JUMP_COOLDOWN   = 600;
    let lastJumpTime = 0;
    let bodyDucking = false;

    if (typeof Pose === 'undefined') {
        console.warn('MediaPipe Pose not loaded — body tracking disabled.');
        poseLabel.textContent = 'No pose lib';
        setTimeout(() => {
            const preview = document.getElementById('pose-preview');
            if (preview) {
                preview.style.transition = 'opacity 1s ease';
                preview.style.opacity = '0';
            }
        }, 3000);
        return;
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${file}`
    });
    pose.setOptions({
        modelComplexity: 0,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults(onPoseResults);

    function onPoseResults(results) {
        poseCtx.save();
        poseCtx.clearRect(0, 0, 320, 240);
        poseCtx.drawImage(results.image, 0, 0, 320, 240);
        poseCtx.restore();

        if (!results.poseLandmarks) return;
        const lm = results.poseLandmarks;
        const leftShoulder  = lm[11];
        const rightShoulder = lm[12];
        if (!leftShoulder || !rightShoulder) return;
        if (leftShoulder.visibility < 0.5 || rightShoulder.visibility < 0.5) return;

        const shoulderX = (leftShoulder.x + rightShoulder.x) / 2;
        const shoulderY = (leftShoulder.y + rightShoulder.y) / 2;

        const dotX = shoulderX * 320;
        const dotY = shoulderY * 240;
        poseCtx.fillStyle = '#44ff88';
        poseCtx.beginPath();
        poseCtx.arc(dotX, dotY, 5, 0, Math.PI * 2);
        poseCtx.fill();

        if (calibrating) {
            if (calibStart === 0) calibStart = performance.now();
            calibSamples.push(shoulderY);
            const elapsed = (performance.now() - calibStart) / 1000;
            poseLabel.textContent = 'Calibrating…';
            if (elapsed >= CALIB_DURATION && calibSamples.length > 5) {
                baselineY = calibSamples.reduce((a, b) => a + b, 0) / calibSamples.length;
                calibrating = false;
                poseLabel.textContent = 'Tracking';
                setTimeout(() => { poseLabel.textContent = ''; }, 1500);
            }
            return;
        }

        if (!gameActive || isCutscene || isPaused) return;

        const mirroredX = 1 - shoulderX;
        if (mirroredX < 0.38)       { currentLaneIndex = 0; }
        else if (mirroredX > 0.62)  { currentLaneIndex = 2; }
        else                        { currentLaneIndex = 1; }

        const deltaY = baselineY - shoulderY;
        if (deltaY > JUMP_THRESHOLD && !isJumping && !isDucking) {
            const now = performance.now();
            if (now - lastJumpTime > JUMP_COOLDOWN) {
                isJumping = true;
                jumpVel = JUMP_FORCE;
                lastJumpTime = now;
            }
        }

        if (-deltaY > DUCK_THRESHOLD && !isJumping) {
            if (!bodyDucking) { isDucking = true; bodyDucking = true; }
        } else {
            if (bodyDucking) { isDucking = false; bodyDucking = false; }
        }
    }

    navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' } })
        .then(stream => {
            poseVideo.srcObject = stream;
            poseVideo.play();
            poseLabel.textContent = 'Calibrating…';

            const cam = new Camera(poseVideo, {
                onFrame: async () => { await pose.send({ image: poseVideo }); },
                width: 320,
                height: 240
            });
            cam.start();
        })
        .catch(err => {
            console.warn('Camera not available:', err);
            poseLabel.textContent = 'No camera';
            setTimeout(() => {
                const preview = document.getElementById('pose-preview');
                if (preview) {
                    preview.style.transition = 'opacity 1s ease';
                    preview.style.opacity = '0';
                }
            }, 3000);
        });
})();

// Reusable Matrix4 for confetti updates (avoids per-frame allocation)
const _confettiM4 = new THREE.Matrix4();
const _confettiEuler = new THREE.Euler();
const _sharedGeos = new Set([...Object.values(SharedGeo), ...Object.values(WalkerLimbGeos)]);
const _sharedMats = new Set([...Object.values(SharedMat), ropeMat, ropePostMat]);

function disposeItem(mesh) {
    // Pooled balls are returned to pool instead of fully disposed
    if (typeof BallPool !== 'undefined' && BallPool.isPooled(mesh)) { BallPool.release(mesh); return; }
    scene.remove(mesh);
    mesh.traverse(c => {
        if (c.isMesh) {
            if (!_sharedGeos.has(c.geometry)) c.geometry.dispose();
            const mats = Array.isArray(c.material) ? c.material : [c.material];
            mats.forEach(m => {
                if (!_sharedMats.has(m)) {
                    if (m.map) m.map.dispose();
                    m.dispose();
                }
            });
        }
        if (c.isLight) { if (c.shadow && c.shadow.map) c.shadow.map.dispose(); }
    });
}

// Simple object pool for tennis balls (most frequently spawned item)
const BallPool = (() => {
    const pool = [];
    const POOL_SIZE = 12;
    for (let i = 0; i < POOL_SIZE; i++) {
        const m = new THREE.Mesh(SharedGeo.ball, SharedMat.ball);
        m.castShadow = true; m.visible = false;
        m.position.set(0, -999, 0);
        scene.add(m); pool.push(m);
    }
    return {
        get() {
            for (let i = 0; i < pool.length; i++) {
                if (!pool[i].visible) { pool[i].visible = true; return pool[i]; }
            }
            const m = new THREE.Mesh(SharedGeo.ball, SharedMat.ball);
            m.castShadow = true; scene.add(m); pool.push(m); return m;
        },
        release(mesh) { mesh.visible = false; mesh.position.set(0, -999, 0); },
        isPooled(mesh) { return pool.includes(mesh); }
    };
})();

let lastObstacleType = null;
function getMostRecentObstacleZ() {
    let mostRecentZ = 100;
    for(let i=0; i<activeItems.length; i++) {
        const it = activeItems[i];
        if (it.active && (it.type === 'hedge' || it.type === 'bird' || it.type === 'walker')) {
            if (it.mesh.position.z < mostRecentZ) {
                mostRecentZ = it.mesh.position.z;
                lastObstacleType = it.type;
            }
        }
    }
    return mostRecentZ === 100 ? 100 : mostRecentZ;
}

function spawnItem() {
    if(isCutscene || cupSpawned || currentStage === FINAL_STAGE_INDEX) return;

    const rand = Math.random(), laneIdx = Math.floor(Math.random() * 3);
    let mesh, type;

    const allowHedge = hedgesThisStage < targetHedgesThisStage;
    const allowBird = currentStage >= 0;

    const recentZ = getMostRecentObstacleZ();
    
    // UX: Greatly increased dynamic gap after a hedge to ensure it's ALWAYS jumpable
    // Math: Jump duration is ~0.62s. At max speed (1.5 * 60 = 90 units/sec), 
    // the player covers ~56 units in the air. 
    let dynamicGap = 15 + (gameSpeed * 8); 
    if (lastObstacleType === 'hedge') dynamicGap += 50; // Minimum ~77 units of recovery gap at max speed
    const tooCloseForHazard = recentZ < (-200 + dynamicGap);

    // Powerups (always allowed regardless of gap)
    if (rand > 0.88 && !multiplierActive) {
        if (currentStage === 0) { mesh = buildGoldTicket(); type = 'goldticket'; }
        else if (currentStage === 2) { mesh = buildTennisRacket(); type = 'racket'; }
        else { mesh = buildIceCream(); type = 'icecream'; }
    }
    // Hazards — only if gap allows, otherwise fall through to ball
    else if (!tooCloseForHazard) {
        const hazardRand = Math.random();
        
        // If we're in an early stage and haven't spawned our hedge yet, artificially boost its chance slightly
        const hedgeChance = allowHedge ? (currentStage < 2 ? 0.35 : 0.20) : 0;
        
        if (allowHedge && hazardRand < hedgeChance) { 
            mesh = buildHedge(); type = 'hedge';
            hedgesThisStage++;
        } 
        else if (allowBird && hazardRand < hedgeChance + 0.20) {
            mesh = buildBird();
            mesh.position.y = 3.5;
            mesh.userData.animPhase = Math.random() * Math.PI * 2;
            type = 'bird';
        } 
        else if (hazardRand < 0.90) {
            mesh = buildWalkerHazard(currentStage);
            mesh.userData.animPhase = Math.random() * Math.PI * 2;
            mesh.userData.walkSpeed = 0.02 + Math.random() * 0.015;
            type = 'walker';
        } 
        else {
            mesh = BallPool.get();
            mesh.position.y = 0.5;
            type = 'ball';
        }
    }
    // Default: tennis ball (fills gaps when hazards can't spawn)
    else {
        mesh = BallPool.get();
        mesh.position.y = 0.5;
        type = 'ball';
    }

    mesh.castShadow = true;
    mesh.position.z = -200;
    mesh.position.x = (type === 'hedge') ? 0 : lanePositions[laneIdx];
    if (type !== 'ball') scene.add(mesh);
    activeItems.push({ mesh, type, lane: laneIdx, active: true });
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    if (isPaused) { clock.getDelta(); return; } // prevent time jump
    if (!gameActive) { renderer.render(scene, camera); return; }

    const rawDelta = clock.getDelta(), time = clock.getElapsedTime();
    const delta = Math.min(rawDelta, 0.05); // cap at 50ms — prevents speed surge when scene visibility changes
    const runSpeed = 12;

    if (stumbleTimer > 0) {
        stumbleTimer -= delta;
        if (stumbleTimer < 0) stumbleTimer = 0;
    }
    if (stumbleTimer <= 0 && stumbleSpeedMult < 1) {
        stumbleSpeedMult = Math.min(1, stumbleSpeedMult + delta * 0.8);
        if (stumbleSpeedMult > 0.99) stumbleSpeedMult = 1;
    }

    if (speedBoost > 0) {
        speedBoost = Math.max(0, speedBoost - SPEED_BOOST_DECAY * delta);
    }

    if (speedBoost > BOOST_MAX) speedBoost = BOOST_MAX;

    targetSpeed = BASE_SPEED + score * SCORE_SPEED_FACTOR + speedBoost;
    targetSpeed = Math.max(MIN_SPEED, Math.min(MAX_SPEED, targetSpeed));
    gameSpeed += (targetSpeed - gameSpeed) * Math.min(1, SPEED_LERP_RATE * delta);

    if (pendingBannerMesh && pendingBannerMesh.position.z > 0) {
        advanceStage();
        setParallaxVisibility(currentStage);
        pendingBannerMesh = null;
        nextBannerSpawned = false;
    }

    const effectiveSpeed = gameSpeed * stumbleSpeedMult;

    // Frame-rate independence: normalize all per-frame movement to 60fps
    const dt60 = delta * 60;

    const targetSky = STAGE_SKY[currentStage];
    const targetFog = STAGE_FOG[currentStage];
    const targetDensity = STAGE_FOG_DENSITY[currentStage];
    const lerpRate = delta * 0.8;
    scene.background.lerp(targetSky, lerpRate);
    scene.fog.color.lerp(targetFog, lerpRate);
    scene.fog.density = THREE.MathUtils.lerp(scene.fog.density, targetDensity, lerpRate);

    if (isCutscene) {
        // Player walks toward stadium entrance at cinematic pace
        playerGroup.position.z -= 10 * delta;

        // Trophy slowly spins above player's head
        if (cupMesh) cupMesh.rotation.y += 3 * delta;

        if (confettiGroup && confettiGroup.isInstancedMesh) {
            const cData = confettiGroup.userData.data;
            for (let ci = 0; ci < cData.length; ci++) {
                const d = cData[ci];
                if (d.y > 0.05) {
                    d.y += d.vY * delta;
                    d.x += d.vX * delta;
                    d.rX += d.drX * delta * 5;
                    d.rY += d.drY * delta * 5;
                } else {
                    d.y = 0.05;
                }
                _confettiEuler.set(d.rX, d.rY, 0);
                _confettiM4.makeRotationFromEuler(_confettiEuler);
                _confettiM4.setPosition(d.x, d.y, d.z);
                confettiGroup.setMatrixAt(ci, _confettiM4);
            }
            confettiGroup.instanceMatrix.needsUpdate = true;
        }

        // Victory when player enters the stadium tunnel
        const tunnelZ = stadiumGroup.position.z + 2.0 * 0.55;
        if (playerGroup.position.z < tunnelZ) {
            document.getElementById('victory-score').textContent = score;
            const vs = document.getElementById('victory-screen');
            vs.style.display = 'flex';
            requestAnimationFrame(() => { requestAnimationFrame(() => { vs.classList.add('fade-in'); }); });
            gameActive = false;
        }
    } else {
        stageTimer += delta;

        if (currentStage === FINAL_STAGE_INDEX) {
            // Stadium rises from below over 4 seconds (ease-in)
            const riseProg = Math.min(stageTimer / 4.0, 1.0);
            const easeProg = Math.sin(riseProg * Math.PI / 2);
            stadiumGroup.position.y = -100 + (100 * easeProg);

            // Stadium approaches at fixed cinematic speed (not tied to game speed)
            const STADIUM_STOP_Z = -50;
            const STADIUM_APPROACH_SPEED = 65;
            if (stadiumGroup.position.z < STADIUM_STOP_Z) {
                stadiumGroup.position.z = Math.min(STADIUM_STOP_Z, stadiumGroup.position.z + STADIUM_APPROACH_SPEED * delta);
            }

            // Once stadium arrives, clear track and spawn trophy from entrance
            if (stadiumGroup.position.z >= STADIUM_STOP_Z && !cupSpawned) {
                cupSpawned = true;
                for (let j = activeItems.length - 1; j >= 0; j--) {
                    if (activeItems[j].type !== 'banner') {
                        disposeItem(activeItems[j].mesh);
                        activeItems.splice(j, 1);
                    }
                }
                cupMesh = buildTrophy();
                const entranceZ = stadiumGroup.position.z + 6.3 * 0.55;
                cupMesh.position.set(0, 1.5, entranceZ);
                scene.add(cupMesh);
            }

            // Trophy floats toward player
            if (cupSpawned && cupMesh && !trophyCollected) {
                cupMesh.position.z += 14 * delta;
                cupMesh.rotation.y += 5 * delta;
                cupMesh.position.y = 1.5 + Math.sin(stageTimer * 2.5) * 0.3;
                if (cupMesh.position.z >= playerGroup.position.z) {
                    startCutscene();
                }
            }

        } else {
            const bannerTravelTime = 200 / (effectiveSpeed * 60); 
            if (!nextBannerSpawned && currentStage < FINAL_STAGE_INDEX && (STAGES[currentStage].duration - Math.max(0, stageTimer)) <= bannerTravelTime) {
                const nextStageName = STAGES[currentStage + 1].name;
                const banner = buildOverheadBanner(nextStageName);
                banner.position.z = -200;
                scene.add(banner);
                activeItems.push({ mesh: banner, type: 'banner', active: true });
                pendingBannerMesh = banner;
                nextBannerSpawned = true;
            }
        }
    }

    if (multiplierActive) { multiplierTimer -= delta; if (multiplierTimer <= 0) multiplierActive = false; }
    if (!isCutscene) updateUI();

    if (!isCutscene) {
        const tX = lanePositions[currentLaneIndex], diffX = tX - playerGroup.position.x;
        playerGroup.position.x += diffX * 0.22; playerGroup.rotation.z = -diffX * 0.10;
    } else {
        playerGroup.position.x += (0 - playerGroup.position.x) * 0.1;
        playerGroup.rotation.z = 0;
    }

    if (isJumping) {
        jumpVel += GRAV * delta;
        jumpOffset += jumpVel * delta;
        if (jumpOffset <= 0) {
            jumpOffset = 0;
            jumpVel = 0;
            isJumping = false;
        }
    }
    playerGroup.scale.y += ((isDucking ? 0.65 : 1.0) - playerGroup.scale.y) * 0.18;

    // Smooth sinusoidal gait cycle
    const gait = time * runSpeed;
    const gaitSin = Math.sin(gait);
    const gaitCos = Math.cos(gait);

    // Gentle vertical bounce (we use cosine here to make the bounce peak during the "flight" phase of the stride)
    playerGroup.position.y = jumpOffset + ((isJumping || isDucking) ? 0 : Math.abs(Math.cos(gait)) * 0.15) + 0.05;

    // Subtle forward lean
    if (!isDucking && !isJumping && !isCutscene) {
        pTorso.rotation.x = -0.08;
        pNeck.rotation.x = 0.04;
    } else if (!isDucking && !isJumping) {
        pTorso.rotation.x = 0;
        pNeck.rotation.x = 0;
    }

    if (isDucking) {
        armL.rotation.set(0, 0, 0.85); armR.rotation.set(0, 0, -0.85);
        forearmL.rotation.x = 0.6; forearmR.rotation.x = 0.6;
        legL.rotation.x = 0.5; legR.rotation.x = 0.5;
        calfL.rotation.x = -0.5; calfR.rotation.x = -0.5;
    } else if (isJumping) {
        armL.rotation.set(-0.9, 0, -0.25); armR.rotation.set(-0.9, 0, 0.25);
        forearmL.rotation.x = 0.3; forearmR.rotation.x = 0.3;
        legL.rotation.x = 0.3; legR.rotation.x = 0.3;
        calfL.rotation.x = -0.2; calfR.rotation.x = -0.2;
    } else {
        // ── Premium, Fluid Running Gait ──
        const legSwing = 0.85; // A wider, more athletic stride
        const kneeMax = 1.4;   // A sharper knee bend to clear the ground
        
        // Thighs swing back and forth normally
        legL.rotation.x = gaitSin * legSwing;
        legR.rotation.x = -gaitSin * legSwing;
        
        // Knees bend heavily when the leg is swinging forward.
        // A NEGATIVE rotation bends the calf backward correctly (like a human knee joint).
        // Math.cos ensures the bend peaks precisely during the forward swing phase.
        calfL.rotation.x = -Math.max(0, Math.cos(gait + 0.1)) * kneeMax;
        calfR.rotation.x = -Math.max(0, -Math.cos(gait + 0.1)) * kneeMax;

        // Arms pump dynamically in opposition to the legs for balance
        const armSwing = 0.75;
        armL.rotation.set(-gaitSin * armSwing, 0, 0);
        armR.rotation.set(gaitSin * armSwing, 0, 0);
        
        // Elbows bend naturally FORWARD (positive X) and tighten when the arm swings forward
        const baseElbow = 0.4;
        forearmL.rotation.x = baseElbow + Math.max(0, -gaitSin) * 0.5;
        forearmR.rotation.x = baseElbow + Math.max(0, gaitSin) * 0.5;

        // Subtle torso counter-rotation for a natural twist
        pTorso.rotation.y = gaitSin * 0.06;
    }

    if (!isCutscene) {
        const parallaxSpd = effectiveSpeed * 0.08 * dt60;
        const slowParallax = effectiveSpeed * 0.03 * dt60;

        if (parallaxQueue[0] && parallaxQueue[0].group.visible) {
            for (let i = 0, len = parallaxQueue.length; i < len; i++) {
                const q = parallaxQueue[i];
                q.group.position.z += parallaxSpd;
                if (q.group.position.z > 20) q.group.position.z -= 840;
            }
            for (let i = 0, len = queueTreeRows.length; i < len; i++) {
                const t = queueTreeRows[i];
                t.group.position.z += parallaxSpd;
                if (t.group.position.z > 20) t.group.position.z -= 840;
            }
            for (let i = 0, len = staticTents.length; i < len; i++) {
                const t = staticTents[i];
                t.position.z += parallaxSpd;
                if (t.position.z > 20) t.position.z -= 840;
            }
        }

        if (parallaxHill[0] && parallaxHill[0].group.visible) {
            for (let i = 0, len = parallaxHill.length; i < len; i++) {
                const h = parallaxHill[i];
                h.group.position.z += parallaxSpd;
                if (h.group.position.z > 20) h.group.position.z -= 840;
            }
        }

        if (cloudMeshes[0] && cloudMeshes[0].visible) {
            for (let i = 0, len = cloudMeshes.length; i < len; i++) {
                const c = cloudMeshes[i];
                c.position.x += (Math.sin(time * 0.1 + i) * 0.003) * dt60;
                c.position.z += slowParallax;
                if (c.position.z > 30) c.position.z -= 580;
            }
        }

        if (parallaxCourts[0] && parallaxCourts[0].group.visible) {
            for (let i = 0, len = parallaxCourts.length; i < len; i++) {
                const court = parallaxCourts[i];
                court.group.position.z += parallaxSpd;
                if (court.group.position.z > 20) court.group.position.z -= 840;
                if (court.group.position.z > -80 && court.group.position.z < 20) {
                    const animOffset = time * 2.5 + i;
                    court.p1.position.x = Math.sin(animOffset) * 1.8;
                    court.p2.position.x = Math.cos(animOffset * 0.8) * 1.8;
                }
            }
        }

        if (ropeBarriers[0] && ropeBarriers[0].group.visible) {
            for (let i = 0, len = ropeBarriers.length; i < len; i++) {
                const r = ropeBarriers[i];
                r.group.position.z += parallaxSpd;
                if (r.group.position.z > 20) r.group.position.z -= 840;
            }
        }
    }

    if (Math.random() < STAGES[currentStage].spawnRate) spawnItem();

    for (let i = activeItems.length - 1; i >= 0; i--) {
        const item = activeItems[i]; if (!item.active) continue;

        const prevZ = item.mesh.position.z; // save for swept collision

        if (!isCutscene && item.type !== 'trophy') {
            const spd = (item.type === 'bird') ? effectiveSpeed * 1.15 : effectiveSpeed;
            item.mesh.position.z += spd * dt60;
        }

        if (item.type === 'banner') {
            if (item.mesh.position.z > 0 && !item.swooshPlayed) {
                SoundFX.playSwoosh();
                item.swooshPlayed = true;
            }

            if (item.mesh.position.z > -20) {
                const fadeProgress = Math.min((item.mesh.position.z + 20) / 20, 1);
                const opacity = 1 - fadeProgress * 0.85;
                if (!item._fadeMeshes) {
                    item._fadeMeshes = [];
                    item.mesh.traverse(c => {
                        if (c.isMesh && c.material) {
                            c.material.transparent = true;
                            item._fadeMeshes.push(c.material);
                        }
                    });
                }
                for (let fi = 0; fi < item._fadeMeshes.length; fi++) {
                    item._fadeMeshes[fi].opacity = opacity;
                }
            }
            if (item.mesh.position.z > 12) { disposeItem(item.mesh); activeItems.splice(i, 1); }
            continue;
        }

        if (item.type === 'bird') {
            const ph = time * 8 + item.mesh.userData.animPhase;
            if (item.mesh.userData.wingL) {
                const flap = Math.sin(ph) * 0.55 + Math.sin(ph * 2) * 0.15;
                item.mesh.userData.wingL.rotation.z = flap;
                item.mesh.userData.wingR.rotation.z = -flap;
            }
            item.mesh.position.y += Math.sin(time * 3.5 + item.mesh.userData.animPhase) * 0.004;
        }

        if (item.type === 'goldticket') {
            item.mesh.rotation.y += delta * 3;
            item.mesh.position.y = 0.7 + Math.sin(time * 3) * 0.15;
        }

        if (item.type === 'racket') {
            item.mesh.rotation.y += delta * 2.5;
            item.mesh.position.y = 0.5 + Math.sin(time * 2.5) * 0.15;
        }

        if (item.type === 'walker') {
            const wph = time * 5 + item.mesh.userData.animPhase;
            const ud = item.mesh.userData;
            // Smooth, moderate arm/leg swing
            if (ud.armL) ud.armL.rotation.x = Math.sin(wph) * 0.35;
            if (ud.armR) ud.armR.rotation.x = -Math.sin(wph) * 0.35;
            if (ud.legL) ud.legL.rotation.x = -Math.sin(wph) * 0.40;
            if (ud.legR) ud.legR.rotation.x = Math.sin(wph) * 0.40;
            if(!isCutscene) item.mesh.position.z += ud.walkSpeed * dt60;
        }

        if (item.mesh.position.z > 12) { disposeItem(item.mesh); activeItems.splice(i, 1); continue; }

        if (isCutscene) continue;

        const pZ = playerGroup.position.z;
        const closeZ = (prevZ <= pZ + 1.05) && (item.mesh.position.z >= pZ - 1.05);
        if (!closeZ) continue;
        const sameLane = (item.type === 'hedge') ? true : Math.abs(playerGroup.position.x - item.mesh.position.x) < 1.0;
        if (!sameLane) continue;

        if (item.type === 'ball') {
            SoundFX.playBall();
            disposeItem(item.mesh); activeItems.splice(i, 1);
            const pts = multiplierActive ? 100 : 50;
            score += pts;
            speedBoost += BOOST_MAX * (BOOST_SCORE_HALF / (BOOST_SCORE_HALF + score));
            scoreValEl.textContent = score; flashScore();
            continue;
        }
        if (item.type === 'icecream' || item.type === 'goldticket' || item.type === 'racket') {
            SoundFX.playX2();
            disposeItem(item.mesh); activeItems.splice(i, 1);
            multiplierActive = true; multiplierTimer = 10;
            score += 100;
            speedBoost += BOOST_MAX * 1.5 * (BOOST_SCORE_HALF / (BOOST_SCORE_HALF + score));
            scoreValEl.textContent = score; flashScore();
            continue;
        }

        let hit = false;
        if (item.type === 'bird') hit = (playerGroup.position.y + 3.84 * playerGroup.scale.y) > item.mesh.position.y - 0.25;
        if (item.type === 'hedge') hit = jumpOffset < 1.2;
        if (item.type === 'walker') hit = jumpOffset < 1.8;

        if (hit) {
            SoundFX.playHit();
            disposeItem(item.mesh); activeItems.splice(i, 1);
            const now = clock.getElapsedTime();
            const isDouble = (now - lastHitTime) < STUMBLE_WINDOW && lastHitTime > 0;
            lastHitTime = now;
            score = Math.max(0, score - (isDouble ? DOUBLE_PENALTY : SINGLE_PENALTY));
            scoreValEl.textContent = score; flashScore();
            stumbleTimer = isDouble ? DOUBLE_SLOW_DURATION : SINGLE_SLOW_DURATION;
            stumbleSpeedMult = isDouble ? DOUBLE_SLOW_MULT : SINGLE_SLOW_MULT;
            gameSpeed *= isDouble ? 0.5 : 0.7;
            speedBoost = 0;
            flashHit(true);
        }
    }

    if (_needsResize) {
        _needsResize = false;
        const w = canvas.clientWidth, h = canvas.clientHeight;
        renderer.setSize(w, h, false);
        camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    renderer.render(scene, camera);
}
let _needsResize = true; // trigger initial size
new ResizeObserver(() => { _needsResize = true; }).observe(canvas);
animate();
</script>
