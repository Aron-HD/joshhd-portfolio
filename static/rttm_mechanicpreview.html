<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash to the Match</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --wim-green: #00563f;
            --wim-purple: #4a2c7a;
            --amex-blue: #006fcf;
            --gold: #c9a84c;
            --gold-light: #f0d070;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: #050505;
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            font-family: 'Georgia', 'Times New Roman', serif;
            user-select: none; overflow: hidden;
        }
        #game-container {
            height: 100vh; width: auto; aspect-ratio: 9/16; max-width: 100vw;
            position: relative; overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
        }
        #webgl-canvas {
            width: 100%; height: 100%; display: block;
            transition: filter 0.5s ease;
        }
        #webgl-canvas.blurred { filter: blur(18px) brightness(0.55) saturate(0.6); }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* HUD */
        #status-hud {
            position: absolute; top: 4%; left: 5%;
            pointer-events: none;
        }
        #stumble-indicator {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 800; font-size: clamp(9px,1.2vh,14px);
            color: #ff6b6b; letter-spacing: 2px; text-transform: uppercase;
            opacity: 0; transition: opacity 0.3s;
            text-shadow: 0 0 12px rgba(255,80,80,0.6);
        }
        #stumble-indicator.visible { opacity: 1; }

        #score-hud {
            position: absolute; top: 4%; left: 50%; transform: translateX(-50%);
            text-align: center; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }
        #score-glow {
            position: absolute; top: -40%; left: -60%; width: 220%; height: 180%;
            border-radius: 50%; pointer-events: none;
            background: radial-gradient(50% 50% at 50% 50%, rgba(252,232,179,0.7) 0%, rgba(252,232,179,0) 100%);
            z-index: -1;
        }
        #score-label {
            font-size: clamp(8px,1.1vh,14px); font-weight: 700;
            text-transform: uppercase; letter-spacing: 3px;
            color: rgba(255,255,255,0.8); margin-bottom: 2px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #score-val {
            font-size: clamp(28px,5vh,64px); font-weight: 900; line-height: 1;
            color: white; text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        #score-hud.x2-active #score-val { color: #40e0ff; }
        #multiplier-text {
            display: none; font-size: clamp(9px,1.1vh,14px); font-weight: 800;
            letter-spacing: 2px; color: #40e0ff; margin-top: 2px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #score-hud.x2-active #multiplier-text { display: block; }



        /* Action indicator (jump/duck) */
        #action-indicator {
            position: absolute; bottom: 16%; left: 50%; transform: translateX(-50%);
            font-size: clamp(10px,1.5vh,16px); font-weight:800; letter-spacing:3px;
            color: #fff; text-transform: uppercase; opacity:0;
            transition: opacity 0.15s; text-shadow: 0 0 20px rgba(255,255,255,0.8);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            pointer-events: none;
        }

        /* ===== MINIMALIST INTRO OVERLAY ===== */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #intro-overlay.visible { opacity: 1; pointer-events: auto; }

        #intro-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(28px, 5.5vh, 56px);
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            line-height: 1.15;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }

        #intro-subtitle {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 400;
            font-size: clamp(10px, 1.6vh, 16px);
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 8px;
        }

        #countdown-ring {
            margin-top: 28px;
            width: 52px; height: 52px;
        }
        #countdown-ring circle {
            fill: none;
            stroke-width: 3;
        }
        #countdown-ring .ring-bg {
            stroke: rgba(255,255,255,0.15);
        }
        #countdown-ring .ring-fg {
            stroke: #ffffff;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 0.05s linear;
        }

        /* ===== END SCREENS (minimalist, matching level banners) ===== */
        .end-screen {
            position: absolute; inset: 0;
            background: rgba(74,44,122,0.96);
            color: white; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: auto; z-index: 100; text-align: center; padding: 5%;
        }
        .end-screen h1 {
            margin: 0 0 4%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900;
            font-size: clamp(26px, 5vh, 56px);
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.15;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6);
        }
        .end-screen .end-score {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 400;
            font-size: clamp(10px, 1.6vh, 16px);
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 6%;
        }
        .end-screen .end-score span {
            font-weight: 900; color: #ffffff;
            font-size: clamp(28px, 4.5vh, 52px);
            display: block; margin-top: 6px;
            letter-spacing: 1px;
        }
        .end-btn {
            margin-top: 5%; padding: 2.5% 8%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(11px,1.5vh,18px); font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px;
            background: transparent; color: white;
            border: 2px solid rgba(255,255,255,0.6); border-radius: 40px;
            cursor: pointer; transition: all 0.2s;
        }
        .end-btn:hover { background: rgba(255,255,255,0.15); border-color: #fff; }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-layer">
        <div id="status-hud"><div id="stumble-indicator">STUMBLE!</div></div>

        <div id="score-hud">
            <div id="score-glow"></div>
            <span id="score-label">Score</span>
            <div id="score-val">0</div>
            <span id="multiplier-text">× 2</span>
        </div>

        <div id="action-indicator"></div>
    </div>

    <!-- MINIMALIST INTRO OVERLAY -->
    <div id="intro-overlay">
        <div id="intro-title">DASH TO<br>THE MATCH</div>
        <div id="intro-subtitle"> </div>
        <svg id="countdown-ring" viewBox="0 0 52 52">
            <circle class="ring-bg" cx="26" cy="26" r="23"/>
            <circle class="ring-fg" id="ring-progress" cx="26" cy="26" r="23"
                    stroke-dasharray="144.51" stroke-dashoffset="0"/>
        </svg>
    </div>

    <div id="game-over-screen" class="end-screen">
        <h1>TIME'S UP</h1>
        <div class="end-score">Final Score<span id="final-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>

    <div id="victory-screen" class="end-screen">
        <h1>YOU MADE IT!</h1>
        <div class="end-score">Centre Court Awaits<span id="victory-score">0</span></div>
        <button class="end-btn" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
if (typeof THREE === 'undefined') { throw new Error('Three.js failed to load.'); }

// ─── THREE SETUP ───────────────────────────────────────────────────────────────
const canvas   = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
renderer.setClearColor(0x7a50a0, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x7a50a0);
scene.fog = new THREE.FogExp2(0xb078c0, 0.012);

const camera = new THREE.PerspectiveCamera(62, canvas.clientWidth / canvas.clientHeight, 0.1, 200);
camera.position.set(0, 7.5, 12);
camera.lookAt(0, 2.5, -5);

const ambientLight = new THREE.AmbientLight(0xffeedd, 0.9); scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffd4a0, 0.85);
dirLight.position.set(-12, 28, 8);
dirLight.castShadow = true;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far  = 200;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
scene.add(dirLight);

// Helper – recursively enable castShadow
function enableShadows(obj) {
    obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
}

// ─── TEXTURES ─────────────────────────────────────────────────────────────────
function makeHatBandTex() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 64;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#00175a'; ctx.fillRect(0,0,256,64);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0,8,256,48);
    ctx.fillStyle = '#00563f'; ctx.fillRect(0,18,256,28);
    return new THREE.CanvasTexture(c);
}

function makeTennisTex() {
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#cfdb1c'; ctx.fillRect(0,0,128,128);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.arc(0,64,44,-Math.PI/2,Math.PI/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(128,64,44,Math.PI/2,3*Math.PI/2); ctx.stroke();
    return new THREE.CanvasTexture(c);
}

const hatBandTex  = makeHatBandTex();
const tennisTex   = makeTennisTex();

// ─── ENVIRONMENT ──────────────────────────────────────────────────────────────
// Track
const trackMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 200),
    new THREE.MeshStandardMaterial({ color: 0x9ba4b5, roughness: 0.85 })
);
trackMesh.rotation.x = -Math.PI/2; trackMesh.receiveShadow = true; scene.add(trackMesh);

// Lane lines
const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
[-1.3, 1.3].forEach(x => {
    const l = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 200), lineMat);
    l.rotation.x = -Math.PI/2; l.position.set(x, 0.01, 0); scene.add(l);
});

// Grass
const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a8f3f, roughness: 1.0 });
[[-6.5,5],[6.5,5]].forEach(([x,w]) => {
    const g = new THREE.Mesh(new THREE.PlaneGeometry(w,200), grassMat);
    g.rotation.x = -Math.PI/2; g.position.set(x,0.02,0); g.receiveShadow = true; scene.add(g);
});

// Boundary walls
const wallMat = new THREE.MeshStandardMaterial({ color: 0x1e5c30, roughness: 0.9 });
[-9.5, 9.5].forEach(x => {
    const w = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 200), wallMat);
    w.position.set(x, 1.5, 0); w.receiveShadow = true; scene.add(w);
});

// ─── CROWD ────────────────────────────────────────────────────────────────────
function makeCrowdGeo() {
    const hGeo = new THREE.CircleGeometry(0.33, 10); hGeo.translate(0,1.42,0);
    const sh = new THREE.Shape();
    sh.moveTo(-0.48,0); sh.lineTo(-0.48,0.65);
    sh.quadraticCurveTo(-0.48,1.08,-0.14,1.12);
    sh.lineTo(0.14,1.12); sh.quadraticCurveTo(0.48,1.08,0.48,0.65);
    sh.lineTo(0.48,0);
    return { hGeo, bGeo: new THREE.ShapeGeometry(sh) };
}
const { hGeo: crowdHead, bGeo: crowdBody } = makeCrowdGeo();
const crowdPalette = [0x4a2c7a,0x5c3882,0x3d2166,0x6b4694,0x003d8f,0x1a6e3a,0xc23060,0x8b1a1a];
const crowdMats = crowdPalette.map(c => new THREE.MeshBasicMaterial({ color: c, side: THREE.DoubleSide }));
const standMat2 = new THREE.MeshStandardMaterial({ color: 0x1e4a18, roughness: 0.9 });

for (let tier = 0; tier < 4; tier++) {
    const th = 1.5, td = 2.5;
    const yBase = 2.5 + tier * th;
    const xL = -11.25 - tier * td, xR = 11.25 + tier * td;
    [[xL, Math.PI/6],[xR,-Math.PI/6]].forEach(([x, ry]) => {
        const s = new THREE.Mesh(new THREE.BoxGeometry(td,th,200), standMat2);
        s.position.set(x, yBase-th/2, 0); s.receiveShadow = true; scene.add(s);
        for (let z = -90; z < 15; z += 1.4) {
            if (Math.random() > 0.28) {
                const mat = crowdMats[Math.floor(Math.random()*crowdMats.length)];
                const p = new THREE.Group();
                p.add(new THREE.Mesh(crowdBody, mat));
                p.add(new THREE.Mesh(crowdHead, mat));
                const sc = 0.75 + Math.random()*0.45;
                p.scale.set(sc, sc, 1);
                p.position.set(x + (Math.random()-0.5)*2, yBase, z + Math.random()*0.6);
                p.rotation.y = ry;
                scene.add(p);
            }
        }
    });
}

// ─── WALKING CROWD HAZARD (spawned on-track as obstacles) ─────────────────────
const skinColors = [0xfcdab7, 0xe0ac69, 0x8d5524, 0xc68642];
const shirtColors = [0xff5555, 0x5555ff, 0x55ff55, 0xffaa00, 0xffffff, 0x4a90e2, 0x9955ff, 0x4a2c7a, 0x5c3882];
const pantColors = [0x222222, 0x333399, 0x555555, 0x886644, 0x444444];
const hairColors = [0x111111, 0x553311, 0xcc8822, 0xaa5522, 0x444444];

function buildWalkerHazard() {
    const group = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: skinColors[Math.floor(Math.random()*skinColors.length)], roughness: 0.9 });
    const shirtMat = new THREE.MeshStandardMaterial({ color: shirtColors[Math.floor(Math.random()*shirtColors.length)], roughness: 0.9 });
    const pantMat = new THREE.MeshStandardMaterial({ color: pantColors[Math.floor(Math.random()*pantColors.length)], roughness: 0.9 });
    const hairMat = new THREE.MeshStandardMaterial({ color: hairColors[Math.floor(Math.random()*hairColors.length)], roughness: 0.9 });

    function blockLimb(w, h, d, x, y, mat, name) {
        const geo = new THREE.BoxGeometry(w, h, d); geo.translate(0, -h/2, 0);
        const m = new THREE.Mesh(geo, mat); m.position.set(x, y, 0);
        m.castShadow = true; m.name = name; return m;
    }

    const tGeo = new THREE.BoxGeometry(0.7, 1.0, 0.4); tGeo.translate(0, -0.5, 0);
    const bTorso = new THREE.Mesh(tGeo, shirtMat); bTorso.position.y = 2.4; bTorso.castShadow = true; group.add(bTorso);
    const headG = new THREE.Group();
    headG.add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), skinMat));
    const bHair = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.2, 0.75), hairMat);
    bHair.position.y = 0.35; headG.add(bHair);
    headG.position.y = 2.85; group.add(headG);
    group.add(blockLimb(0.25, 0.9, 0.25, -0.475, 2.3, shirtMat, 'armL'));
    group.add(blockLimb(0.25, 0.9, 0.25,  0.475, 2.3, shirtMat, 'armR'));
    group.add(blockLimb(0.32, 1.4, 0.32, -0.18,  1.4, pantMat,  'legL'));
    group.add(blockLimb(0.32, 1.4, 0.32,  0.18,  1.4, pantMat,  'legR'));

    enableShadows(group);
    return group;
}

// ─── WIMBLEDON STADIUM (2026 poster-inspired Centre Court) ────────────────────
function buildStadium() {
    const g = new THREE.Group();

    // Palette
    const darkGreen  = new THREE.MeshStandardMaterial({ color: 0x1a5c36, roughness: 0.7 });
    const midGreen   = new THREE.MeshStandardMaterial({ color: 0x2a7a48, roughness: 0.65 });
    const lightGreen = new THREE.MeshStandardMaterial({ color: 0x3a9a5e, roughness: 0.6 });
    const cream      = new THREE.MeshStandardMaterial({ color: 0xf0e8d4, roughness: 0.55 });
    const darkCream  = new THREE.MeshStandardMaterial({ color: 0xd4c8a8, roughness: 0.6 });
    const roofGreen  = new THREE.MeshStandardMaterial({ color: 0x1e6838, roughness: 0.5, metalness: 0.1 });
    const roofDark   = new THREE.MeshStandardMaterial({ color: 0x0f4422, roughness: 0.6 });
    const windowMat  = new THREE.MeshStandardMaterial({ color: 0x88c8e0, roughness: 0.3, metalness: 0.15 });
    const frameMat   = new THREE.MeshStandardMaterial({ color: 0xe8e0d0, roughness: 0.5 });
    const courtGreen = new THREE.MeshStandardMaterial({ color: 0x2d8040, roughness: 0.8 });
    const vineMat    = new THREE.MeshStandardMaterial({ color: 0x2a6e38, roughness: 0.85 });
    const vineLeaf   = new THREE.MeshStandardMaterial({ color: 0x3d8a48, roughness: 0.8 });
    const flowerPink = new THREE.MeshStandardMaterial({ color: 0xe8609a, roughness: 0.6, emissive: 0xe8609a, emissiveIntensity: 0.15 });
    const flowerWhite = new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.5, emissive: 0xffffff, emissiveIntensity: 0.1 });
    const flowerPurple = new THREE.MeshStandardMaterial({ color: 0x9a58b8, roughness: 0.6, emissive: 0x9a58b8, emissiveIntensity: 0.12 });
    const flowerMats = [flowerPink, flowerWhite, flowerPurple];

    // ── Main facade (multi-layered) ──
    const base = new THREE.Mesh(new THREE.BoxGeometry(52, 8, 30), darkGreen);
    base.position.y = 4; g.add(base);

    const tier2 = new THREE.Mesh(new THREE.BoxGeometry(50, 7, 28), midGreen);
    tier2.position.y = 11.5; g.add(tier2);

    const tier3 = new THREE.Mesh(new THREE.BoxGeometry(48, 6, 26), lightGreen);
    tier3.position.y = 18; g.add(tier3);

    // ── Cream horizontal bands ──
    [8, 15, 21].forEach(y => {
        const band = new THREE.Mesh(new THREE.BoxGeometry(53, 0.8, 31), cream);
        band.position.y = y; g.add(band);
    });

    // ── Windows ──
    for (let x = -22; x <= 22; x += 3.2) {
        const win = new THREE.Mesh(new THREE.BoxGeometry(2.0, 3.5, 0.3), windowMat);
        win.position.set(x, 4.5, 15.2); g.add(win);
        const frame = new THREE.Mesh(new THREE.BoxGeometry(2.4, 4.0, 0.15), frameMat);
        frame.position.set(x, 4.5, 15.1); g.add(frame);
    }
    for (let x = -20; x <= 20; x += 3.5) {
        const win = new THREE.Mesh(new THREE.BoxGeometry(2.2, 3.0, 0.3), windowMat);
        win.position.set(x, 11.5, 14.2); g.add(win);
        const frame = new THREE.Mesh(new THREE.BoxGeometry(2.6, 3.5, 0.15), frameMat);
        frame.position.set(x, 11.5, 14.1); g.add(frame);
    }
    for (let x = -18; x <= 18; x += 4.0) {
        const win = new THREE.Mesh(new THREE.BoxGeometry(2.0, 2.5, 0.3), windowMat);
        win.position.set(x, 18, 13.2); g.add(win);
        const arch = new THREE.Mesh(new THREE.SphereGeometry(1.0, 8, 4, 0, Math.PI * 2, 0, Math.PI * 0.5), windowMat);
        arch.position.set(x, 19.25, 13.2); arch.scale.set(1, 0.5, 0.3); g.add(arch);
    }

    // ── Curved segmented roof ──
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI;
        const roofSeg = new THREE.Mesh(
            new THREE.CylinderGeometry(14, 14, 52, 20, 1, true, angle, Math.PI / 8.5),
            (i % 2 === 0) ? roofGreen : roofDark
        );
        roofSeg.rotation.z = Math.PI / 2;
        roofSeg.position.y = 21 + Math.sin(angle + Math.PI / 16) * 2.5;
        g.add(roofSeg);
    }

    const ridgeCap = new THREE.Mesh(new THREE.BoxGeometry(52, 1.2, 3), roofDark);
    ridgeCap.position.y = 24; g.add(ridgeCap);

    const eaveL = new THREE.Mesh(new THREE.BoxGeometry(53, 0.6, 2), cream);
    eaveL.position.set(0, 21.3, 14); g.add(eaveL);
    const eaveR = new THREE.Mesh(new THREE.BoxGeometry(53, 0.6, 2), cream);
    eaveR.position.set(0, 21.3, -14); g.add(eaveR);

    // ── Vertical pilasters ──
    [-26, -17, -8, 0, 8, 17, 26].forEach(x => {
        const pilaster = new THREE.Mesh(new THREE.BoxGeometry(1.2, 21, 1.0), darkCream);
        pilaster.position.set(x, 10.5, 15.5); g.add(pilaster);
    });

    // ── Entrance canopy ──
    const canopy = new THREE.Mesh(new THREE.BoxGeometry(12, 1.0, 5), roofGreen);
    canopy.position.set(0, 8.5, 17); g.add(canopy);
    [-5, 5].forEach(x => {
        const support = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 8, 8), cream);
        support.position.set(x, 4.5, 17); g.add(support);
    });

    // ── Plaque ──
    const plaque = new THREE.Mesh(new THREE.BoxGeometry(14, 2.5, 0.3), darkGreen);
    plaque.position.set(0, 8.8, 15.3); g.add(plaque);
    const plaqueInner = new THREE.Mesh(new THREE.BoxGeometry(12.5, 1.8, 0.15), new THREE.MeshStandardMaterial({ color: 0x0d3a1e, roughness: 0.4 }));
    plaqueInner.position.set(0, 8.8, 15.45); g.add(plaqueInner);

    // ── Inner court ──
    const court = new THREE.Mesh(new THREE.BoxGeometry(28, 0.5, 16), courtGreen);
    court.position.y = 0.5; g.add(court);
    const lineMat2 = new THREE.MeshBasicMaterial({ color: 0xffffff });

        // Main vine stem climbing up each pilaster

            for (let l = 0; l < leafCount; l++) {

                );
                g.add(leaf);
            }

        // Flowers scattered along vine
        const flowerCount = 3 + Math.floor(Math.random() * 4);
        for (let f = 0; f < flowerCount; f++) {
            const fMat = flowerMats[Math.floor(Math.random() * flowerMats.length)];
            const flower = new THREE.Mesh(new THREE.SphereGeometry(0.2 + Math.random() * 0.15, 7, 6), fMat);
            flower.position.set(

                15.9 + Math.random() * 0.3
            );
            g.add(flower);
        }
    });

    // Horizontal vine garlands between pilasters (across cream bands)
    [8, 15].forEach(bandY => {
        for (let x = -24; x <= 24; x += 2.5 + Math.random() * 2) {
            if (Math.random() > 0.45) {
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.4 + Math.random() * 0.25, 6, 5), vineLeaf);
                leaf.scale.set(1.4, 0.5, 1);

                g.add(leaf);

            if (Math.random() > 0.7) {

                const fl = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6, 5), fMat);
                fl.position.set(x, bandY + 0.6 + Math.random() * 0.3, 16.0);
                g.add(fl);
            }
        }
    });

    // ── NATURAL GLOW above stadium ──
    // Warm light that blends into the purple sky from the roof line
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0xf0d8a8, transparent: true, opacity: 0.18, side: THREE.DoubleSide
    });
    const glow1 = new THREE.Mesh(new THREE.PlaneGeometry(60, 18), glowMat);
    glow1.position.set(0, 32, 0); g.add(glow1);

    glow2.position.set(0, 28, 2); g.add(glow2);
    // Soft warm point light above stadium
    const stadiumGlow = new THREE.PointLight(0xffeac0, 0.8, 80);
    stadiumGlow.position.set(0, 30, 0); g.add(stadiumGlow);

    return g;
}

function buildBird() {
    const g = new THREE.Group();

    // London pigeon colour palette
    const mBody   = new THREE.MeshStandardMaterial({ color: 0x7e8085, roughness: 0.65 });
    const mBreast = new THREE.MeshStandardMaterial({ color: 0x9a96a0, roughness: 0.6 });
    const mHead   = new THREE.MeshStandardMaterial({ color: 0x4a6a50, roughness: 0.45, metalness: 0.15 });
    const mNeckIr = new THREE.MeshStandardMaterial({ color: 0x6a4878, roughness: 0.45, metalness: 0.15 });
    const mWing   = new THREE.MeshStandardMaterial({ color: 0x606268, roughness: 0.6 });
    const mWBar   = new THREE.MeshStandardMaterial({ color: 0x1a1a20, roughness: 0.7 });
    const mBeak   = new THREE.MeshStandardMaterial({ color: 0xb8a070, roughness: 0.5 });
    const mEye    = new THREE.MeshStandardMaterial({ color: 0xdd5500, roughness: 0.3 });
    const mFoot   = new THREE.MeshStandardMaterial({ color: 0xcc5060, roughness: 0.6 });

    // Body (sleek, aerodynamic – slimmer than before)
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.22, 14, 10), mBody);
    body.scale.set(0.80, 0.70, 1.6);  // elongated, slim
    body.rotation.x = -0.10;
    g.add(body);

    // Breast (subtle chest, not plump)
    const breast = new THREE.Mesh(new THREE.SphereGeometry(0.14, 10, 8), mBreast);
    breast.position.set(0, -0.02, 0.18);
    breast.scale.set(0.75, 0.65, 0.8);
    g.add(breast);

    // Neck (purple iridescent collar, tight)
    const neckRing = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.12, 10), mNeckIr);
    neckRing.position.set(0, 0.12, 0.28);
    g.add(neckRing);

    // Head (green iridescent, sleek)
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.11, 14, 12), mHead);
    head.position.set(0, 0.22, 0.32);
    g.add(head);

    // Eyes
    [-0.07, 0.07].forEach(x => {
        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), mEye);
        eye.position.set(x, 0.24, 0.40);
        g.add(eye);
        const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.012, 6, 6),
            new THREE.MeshBasicMaterial({ color: 0x000000 }));
        pupil.position.set(x, 0.24, 0.42);
        g.add(pupil);
    });

    // Beak (pointed, horn-coloured)
    const beak = new THREE.Mesh(new THREE.ConeGeometry(0.028, 0.12, 6), mBeak);
    beak.rotation.x = Math.PI * 0.52;
    beak.position.set(0, 0.20, 0.44);
    g.add(beak);
    // Cere
    const cere = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6),
        new THREE.MeshStandardMaterial({ color: 0xd8cfc0, roughness: 0.5 }));
    cere.position.set(0, 0.24, 0.42);
    g.add(cere);

    // Wings (sleek, integrated – swept back)
    function makeWing(side) {
        const wg = new THREE.Group();
        const main = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.04, 0.36), mWing);
        main.position.set(side * 0.20, 0.03, -0.02);
        wg.add(main);
        const bar = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.015, 0.05), mWBar);
        bar.position.set(side * 0.18, 0.05, 0.06);
        wg.add(bar);
        const tip = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.025, 0.26), mWBar);
        tip.position.set(side * 0.42, 0.015, -0.08);
        wg.add(tip);
        wg.position.set(0, 0.02, 0);
        return wg;
    }
    const wingL = makeWing(-1);
    const wingR = makeWing(1);
    g.add(wingL, wingR);
    g.userData.wingL = wingL;
    g.userData.wingR = wingR;

    // Tail (slim, tapered)
    const tail = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.03, 0.26), mWing);
    tail.position.set(0, 0.03, -0.42);
    tail.rotation.x = -0.10;
    g.add(tail);
    const tailTip = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.02, 0.08), mWBar);
    tailTip.position.set(0, 0.025, -0.54);
    tailTip.rotation.x = -0.15;
    g.add(tailTip);

    // Feet (tucked)
    [-0.05, 0.05].forEach(x => {
        const foot = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.08, 0.04), mFoot);
        foot.position.set(x, -0.16, 0.05);
        g.add(foot);
    });

    // NO rotation – head is at +Z, bird flies toward player (+Z direction)
    g.position.y = 3.1;
    enableShadows(g);
    return g;
}

function buildFence() {
    const g = new THREE.Group();
    // Bright white with low roughness for specular highlights + subtle emissive so it pops
    const wMat = new THREE.MeshStandardMaterial({
        color: 0xffffff, roughness: 0.20, metalness: 0.05,
        emissive: 0xffffff, emissiveIntensity: 0.12
    });
    // Dark ground shadow/trim strip
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x1a3a1a, transparent: true, opacity: 0.55 });
    const trimMat = new THREE.MeshStandardMaterial({ color: 0xc8c8c0, roughness: 0.5 });

    // Ground shadow strip (wide, visible contrast)
    const shadowStrip = new THREE.Mesh(new THREE.PlaneGeometry(9.4, 0.7), shadowMat);
    shadowStrip.rotation.x = -Math.PI / 2;
    shadowStrip.position.y = 0.015;
    g.add(shadowStrip);

    // Base trim rail (grey strip at ground level)
    const baseTrim = new THREE.Mesh(new THREE.BoxGeometry(9.2, 0.10, 0.30), trimMat);
    baseTrim.position.y = 0.05; g.add(baseTrim);

    // Top rail (very chunky)
    const topRail = new THREE.Mesh(new THREE.BoxGeometry(9.0, 0.24, 0.26), wMat);
    topRail.position.y = 1.18; g.add(topRail);

    // Bottom rail
    const botRail = new THREE.Mesh(new THREE.BoxGeometry(9.0, 0.22, 0.24), wMat);
    botRail.position.y = 0.50; g.add(botRail);

    // End posts (thick with ball caps)
    [-4.4, 4.4].forEach(x => {
        const post = new THREE.Mesh(new THREE.BoxGeometry(0.34, 1.60, 0.34), wMat);
        post.position.set(x, 0.80, 0); g.add(post);
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10), wMat);
        cap.position.set(x, 1.62, 0); g.add(cap);
    });

    // Pickets (bold, strong silhouette)
    for (let x = -4.05; x <= 4.05; x += 0.55) {
        const picket = new THREE.Mesh(new THREE.BoxGeometry(0.22, 1.40, 0.22), wMat);
        picket.position.set(x, 0.70, 0); g.add(picket);
        const tip = new THREE.Mesh(new THREE.ConeGeometry(0.17, 0.22, 4), wMat);
        tip.position.y = 0.81; tip.rotation.y = Math.PI / 4; picket.add(tip);
    }

    enableShadows(g);
    return g;
}

            ? 'radial-gradient(50% 50% at 50% 50%, rgba(3,169,244,0.7) 0%, rgba(3,169,244,0) 100%)'
            : 'radial-gradient(50% 50% at 50% 50%, rgba(252,232,179,0.7) 0%, rgba(252,232,179,0) 100%)';
    }
}
updateUI();

function showAction(txt) {
    actionInd.textContent = txt;
    actionInd.style.opacity = '1';
    clearTimeout(actionInd._t);
    actionInd._t = setTimeout(() => actionInd.style.opacity = '0', 600);
}

// ─── BANNER SYSTEM ────────────────────────────────────────────────────────────
function showMinimalistLevel(title, subtitle, onDone) {
    const introOverlay = document.getElementById('intro-overlay');
    const introTitle   = document.getElementById('intro-title');
    const introSub     = document.getElementById('intro-subtitle');
    const ringProgress = document.getElementById('ring-progress');
    const CIRCUMFERENCE = 2 * Math.PI * 23;
    const COUNTDOWN_MS = 2000;

    introTitle.innerHTML = title;
    introSub.textContent = subtitle;
    ringProgress.setAttribute('stroke-dashoffset', String(CIRCUMFERENCE));

    canvas.classList.add('blurred');
    introOverlay.classList.add('visible');
    if (scoreGlowEl) scoreGlowEl.style.display = 'none';

    const startTime = performance.now();
    function tickRing(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / COUNTDOWN_MS, 1);
        ringProgress.setAttribute('stroke-dashoffset', String(CIRCUMFERENCE * (1 - progress)));
        if (progress < 1) {
            requestAnimationFrame(tickRing);
        } else {
            introOverlay.classList.remove('visible');
            canvas.classList.remove('blurred');
            if (scoreGlowEl) scoreGlowEl.style.display = '';
            setTimeout(() => { if (onDone) onDone(); }, 450);
        }
    }
    requestAnimationFrame(tickRing);
}

function startStage() {
    gameSpeed    = STAGES[currentStage].speed;
    stageTimer   = 0;
    transitioning = false;
    gameActive   = true;
    updateUI();
}

function advanceStage() {
    transitioning = true;
    gameActive    = false;
    currentStage++;

    if (currentStage >= STAGES.length) {
        // Victory!
        document.getElementById('victory-score').textContent = score;
        document.getElementById('victory-screen').style.display = 'flex';
        return;
    }

    const next = STAGES[currentStage];
    setTimeout(() => {
        showMinimalistLevel(
            next.name.toUpperCase(),
            `Stage ${next.id} of 4`,
            startStage
        );
    }, 400);
}

const stageDescriptions = [
    '',
    'The path winds through the famous grass courts. Keep your eyes peeled — birds are diving!',
    'You\'re passing the exclusive Members Lounge. Fences and birds ahead — jump and duck!',
    'The roar of Centre Court is deafening. Give everything you\'ve got!'
];

// ─── INTRO COUNTDOWN (auto-start) ─────────────────────────────────────────────
showMinimalistLevel('DASH TO<br>THE MATCH', 'Wimbledon 2026', startStage);

// ─── INPUT ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
    if (!gameActive) return;
    if (e.code === 'ArrowLeft'  && currentLaneIndex > 0) { currentLaneIndex--; e.preventDefault(); }
    if (e.code === 'ArrowRight' && currentLaneIndex < 2) { currentLaneIndex++; e.preventDefault(); }
    if (e.code === 'ArrowUp'    && !isJumping && !isDucking) {
        isJumping = true; jumpVel = JUMP_FORCE; showAction('JUMP!'); e.preventDefault();
    }
    if (e.code === 'ArrowDown'  && !isJumping) {
        isDucking = true; showAction('DUCK!'); e.preventDefault();
    }
});
window.addEventListener('keyup', e => {
    if (e.code === 'ArrowDown') isDucking = false;
});

// Touch controls
let tx0 = 0, ty0 = 0, tt0 = 0, duckTimeout = null;
canvas.addEventListener('touchstart', e => {
    tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; tt0 = Date.now();
}, { passive: true });
canvas.addEventListener('touchend', e => {
    if (!gameActive) return;
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    const dt = Date.now() - tt0;
    if (dt > 600) return;
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx < -25 && currentLaneIndex > 0) currentLaneIndex--;
        if (dx >  25 && currentLaneIndex < 2) currentLaneIndex++;
    } else {
        if (dy < -25 && !isJumping && !isDucking) { isJumping = true; jumpVel = JUMP_FORCE; showAction('JUMP!'); }
        if (dy >  25 && !isJumping) {
            isDucking = true; showAction('DUCK!');
            clearTimeout(duckTimeout);
            duckTimeout = setTimeout(() => { isDucking = false; }, 550);
        }
    }
}, { passive: true });

// ─── SPAWN LOGIC ──────────────────────────────────────────────────────────────
// Minimum clear distance: obstacles (especially fences) must not spawn too close together
const MIN_OBSTACLE_GAP = 16; // world units of Z clearance between obstacles

function getMostRecentObstacleZ() {
    let nearest = -Infinity;
    for (let i = 0; i < activeItems.length; i++) {
        const it = activeItems[i];
        if (it.active && (it.type === 'fence' || it.type === 'caddy' || it.type === 'bird' || it.type === 'walker')) {
            // Find the obstacle closest to the spawn point (lowest Z = most recently spawned)
            // But since items move +Z, the most recent one has the lowest Z
            if (nearest === -Infinity || it.mesh.position.z < nearest) {
                nearest = it.mesh.position.z;
            }
        }
    }
    return nearest;
}

function spawnItem() {
    const rand = Math.random();
    const laneIdx = Math.floor(Math.random() * 3);
    let mesh, type;

    // Stage-gated spawn probabilities
    const fenceChance = currentStage >= 2 ? 0.06 + (currentStage-2)*0.05 : 0;
    const birdChance  = currentStage >= 1 ? 0.10 + currentStage*0.05 : 0;
    const caddyChance = 0.16 + currentStage*0.05;

    // Enforce minimum gap: check if the most recently spawned obstacle is still near the spawn point
    const recentZ = getMostRecentObstacleZ();
    const tooClose = recentZ !== -Infinity && recentZ < (-90 + MIN_OBSTACLE_GAP);

    if (rand > 0.97 && !hasHat) {
        mesh = spawnHatProto.clone();
        mesh.scale.set(1.15,1.15,1.15); mesh.position.y = 1.0;
        type = 'hat';
    } else if (rand > 0.93 && !multiplierActive) {
        mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.2,0.2), towelMat);
        mesh.position.y = 1.0;
        const tgl = new THREE.PointLight(0x03a9f4, 1.5, 5); tgl.position.y = -0.5; mesh.add(tgl);
        type = 'towel';
    } else if (rand < fenceChance && !tooClose) {
        mesh = buildFence();
        type = 'fence';
    } else if (rand < fenceChance + birdChance && !tooClose) {
        mesh = buildBird();
        mesh.userData.animPhase = Math.random() * Math.PI * 2;
        mesh.position.y = 2.8 + Math.random() * 0.55;
        type = 'bird';
    } else if (rand < fenceChance + birdChance + caddyChance && !tooClose) {
        mesh = buildWalkerHazard();
        mesh.userData.animPhase = Math.random() * Math.PI * 2;
        mesh.userData.walkSpeed = 0.02 + Math.random() * 0.015;
        type = 'walker';
    } else {
        mesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.50, 14, 14),
            new THREE.MeshStandardMaterial({ map: tennisTex, roughness: 0.55 })
        );
        mesh.rotation.y = Math.random() * Math.PI;
        mesh.position.y = 0.5;
        type = 'ball';
    }

    mesh.castShadow = true;
    mesh.position.z = -90;
    mesh.position.x = (type === 'fence') ? 0 : lanePositions[laneIdx];
    scene.add(mesh);
    activeItems.push({ mesh, type, lane: laneIdx, active: true });
}

// ─── HIT FLASH ────────────────────────────────────────────────────────────────
function flashHit(fatal) {
    mTunic.emissive.setHex(fatal ? 0xff1010 : 0xffffff);
    setTimeout(() => mTunic.emissive.setHex(0x000000), fatal ? 280 : 130);
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);

    if (!gameActive) {
        renderer.render(scene, camera);
        return;
    }

    const delta = clock.getDelta();
    const time  = clock.getElapsedTime();
    const runSpeed = 12;

    // ── Stumble slow-down ──
    if (stumbleTimer > 0) {
        stumbleTimer -= delta;
        if (stumbleTimer <= 0) { stumbleTimer = 0; stumbleSpeedMult = 1; }
    }
    const effectiveSpeed = gameSpeed * stumbleSpeedMult;

    // ── Stage timer ──
    if (!transitioning) {
        stageTimer += delta;
        if (stageTimer >= STAGES[currentStage].duration) advanceStage();
    }

    if (multiplierActive) { multiplierTimer -= delta; if (multiplierTimer <= 0) multiplierActive = false; }
    updateUI();

    // ── Player lane movement ──
    const tX   = lanePositions[currentLaneIndex];
    const diffX = tX - playerGroup.position.x;
    playerGroup.position.x   += diffX * 0.22;
    playerGroup.rotation.z    = -diffX * 0.10;

    // ── Jump physics ──
    if (isJumping) {
        jumpVel += GRAV;
        jumpOffset += jumpVel;
        if (jumpOffset <= 0) { jumpOffset = 0; jumpVel = 0; isJumping = false; }
    }

    // ── Duck squash (smooth) ──
    const targetScaleY = isDucking ? 0.65 : 1.0;
    playerGroup.scale.y += (targetScaleY - playerGroup.scale.y) * 0.18;

    // ── Y position (bob + jump) ──
    const bob = (isJumping || isDucking) ? 0 : Math.abs(Math.sin(time * runSpeed * 2)) * 0.11;
    playerGroup.position.y = jumpOffset + bob;

    // ── Arm / leg animation ──
    if (isDucking) {
        armL.rotation.x = 0; armL.rotation.z =  0.95;
        armR.rotation.x = 0; armR.rotation.z = -0.95;
        legL.rotation.x = 0.6; legR.rotation.x = 0.6;
    } else if (isJumping) {
        armL.rotation.x = -1.15; armL.rotation.z = -0.35;
        armR.rotation.x = -1.15; armR.rotation.z =  0.35;
        legL.rotation.x = 0.40; legR.rotation.x = 0.40;
    } else {
        armL.rotation.x = Math.sin(time * runSpeed) * 1.55; armL.rotation.z = 0;
        armR.rotation.x = -Math.sin(time * runSpeed) * 1.55; armR.rotation.z = 0;
        legL.rotation.x = -Math.sin(time * runSpeed) * 1.25;
        legR.rotation.x =  Math.sin(time * runSpeed) * 1.25;
    }

    // ── Stadium scale (progress indicator – stays in background) ──
    const stageProg = Math.min(stageTimer / STAGES[currentStage].duration, 1);
    const overallProg = (currentStage + stageProg) / STAGES.length;
    const tScale = 0.04 + overallProg * 0.28;  // max ~0.32 instead of 1.0
    const tZ     = -115 + overallProg * 30;     // max ~-85 instead of -43
    stadiumGroup.scale.x += (tScale - stadiumGroup.scale.x) * 0.007;
    stadiumGroup.scale.y = stadiumGroup.scale.x;
    stadiumGroup.scale.z = stadiumGroup.scale.x;
    stadiumGroup.position.z += (tZ - stadiumGroup.position.z) * 0.007;

    // (walker animation handled in item update loop below)

    // ── Spawn ──
    if (Math.random() < STAGES[currentStage].spawnRate) spawnItem();

    // ── Item updates & collision ──
    for (let i = activeItems.length - 1; i >= 0; i--) {
        const item = activeItems[i];
        if (!item.active) continue;

        const spd = (item.type === 'bird') ? effectiveSpeed * 1.15 : effectiveSpeed;
        item.mesh.position.z += spd;

        // Animate birds (natural flapping)
        if (item.type === 'bird') {
            const ph = time * 8 + item.mesh.userData.animPhase;
            if (item.mesh.userData.wingL) {
                // Smooth flap: quick up-stroke, slow down-stroke
                const flap = Math.sin(ph) * 0.55 + Math.sin(ph * 2) * 0.15;
                item.mesh.userData.wingL.rotation.z =  flap;
                item.mesh.userData.wingR.rotation.z = -flap;
            }
            // Gentle body bob synced to wing beat
            item.mesh.position.y += Math.sin(time * 3.5 + item.mesh.userData.animPhase) * 0.004;
            // Slight head-bob tilt
            item.mesh.rotation.x = Math.sin(time * 4 + item.mesh.userData.animPhase) * 0.04;
        }
        // Animate walkers (arm/leg swing + bob)
        if (item.type === 'walker') {
            const wph = time * 6 + item.mesh.userData.animPhase;
            const aL = item.mesh.getObjectByName('armL');
            const aR = item.mesh.getObjectByName('armR');
            const lL = item.mesh.getObjectByName('legL');
            const lR = item.mesh.getObjectByName('legR');
            if (aL) aL.rotation.x = -Math.sin(wph) * 0.4;
            if (aR) aR.rotation.x =  Math.sin(wph) * 0.4;
            if (lL) lL.rotation.x =  Math.sin(wph) * 0.5;
            if (lR) lR.rotation.x = -Math.sin(wph) * 0.5;
            item.mesh.position.y = Math.abs(Math.sin(wph * 2)) * 0.04;
            // Walkers move slightly slower than game speed (they walk toward you)
            item.mesh.position.z += item.mesh.userData.walkSpeed;
        }
        if (item.type === 'hat' || item.type === 'towel') item.mesh.rotation.y += 0.045;
        if (item.type === 'ball') item.mesh.rotation.x += 0.09;

        // Remove if passed
        if (item.mesh.position.z > 12) {
            scene.remove(item.mesh);
            activeItems.splice(i, 1);
            continue;
        }

        // Zone check
        const closeZ = Math.abs(item.mesh.position.z - playerGroup.position.z) < 1.05;
        if (!closeZ) continue;

        const sameLane = (item.type === 'fence')
            ? true
            : Math.abs(playerGroup.position.x - item.mesh.position.x) < 1.0;
        if (!sameLane) continue;

        // Collect items
        if (item.type === 'ball') {
            scene.remove(item.mesh); activeItems.splice(i, 1);
            score += multiplierActive ? 100 : 50;
            scoreValEl.textContent = score;
            continue;
        }
        if (item.type === 'hat') {
            scene.remove(item.mesh); activeItems.splice(i, 1);
            hasHat = true; equippedHatGroup.scale.set(1,1,1);
            score += 150; scoreValEl.textContent = score;
            continue;
        }
        if (item.type === 'towel') {
            scene.remove(item.mesh); activeItems.splice(i, 1);
            multiplierActive = true; multiplierTimer = 10;
            score += 100; scoreValEl.textContent = score;
            continue;
        }

        // Obstacle collision
        let hit = false;

        if (item.type === 'caddy') {
            // Jump to clear (caddy height ~1.4)
            hit = jumpOffset < 1.3;
        }
        if (item.type === 'bird') {
            // Duck to dodge: bird body center at item.mesh.position.y (~3.0-3.5)
            // Player head world Y = playerGroup.position.y + 3.88 * playerGroup.scale.y
            const headY = playerGroup.position.y + 3.42 * playerGroup.scale.y;
            hit = headY > item.mesh.position.y - 0.35;
        }
        if (item.type === 'fence') {
            // Jump to clear (fence top ~1.1)
            hit = jumpOffset < 1.0;
        }
        if (item.type === 'walker') {
            // Walker is tall — must dodge by lane switching
            hit = jumpOffset < 1.8;
        }

        if (hit) {
            scene.remove(item.mesh); activeItems.splice(i, 1);
            if (hasHat) {
                // Hat absorbs the hit — no penalty
                hasHat = false;
                equippedHatGroup.scale.set(0,0,0);
                flashHit(false);
            } else {
                const now = clock.getElapsedTime();
                const isDouble = (now - lastHitTime) < STUMBLE_WINDOW && lastHitTime > 0;
                lastHitTime = now;

                const penalty = isDouble ? DOUBLE_PENALTY : SINGLE_PENALTY;
                score = Math.max(0, score - penalty);
                scoreValEl.textContent = score;

                stumbleTimer = isDouble ? DOUBLE_SLOW_DURATION : SINGLE_SLOW_DURATION;
                stumbleSpeedMult = isDouble ? DOUBLE_SLOW_MULT : SINGLE_SLOW_MULT;

                flashHit(true);
                stumbleIndEl.textContent = isDouble ? 'DOUBLE STUMBLE!' : 'STUMBLE!';
                stumbleIndEl.classList.add('visible');
                clearTimeout(stumbleIndEl._hideT);
                stumbleIndEl._hideT = setTimeout(() => stumbleIndEl.classList.remove('visible'), isDouble ? 2200 : 1400);
            }
        }
    }

    // ── Resize ──
    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
        renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
    }

    renderer.render(scene, camera);
}
animate();
</script>
